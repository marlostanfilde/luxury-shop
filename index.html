<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUXURY SHOP & ADMIN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --gold: #c5a059; 
            --bg-top: #2c2c2c; 
            --bg-bottom: #0f0f0f;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-white: #ffffff;
        }
        
        body { 
            font-family: 'Georgia', serif; 
            margin: 0; padding: 15px; 
            background: radial-gradient(circle at top, var(--bg-top) 0%, var(--bg-bottom) 70%);
            background-attachment: fixed;
            color: var(--text-white); 
            padding-bottom: 100px;
            min-height: 100vh;
        }

        /* Utilitaires */
        .hidden { display: none !important; }

        /* Header & Nav */
        .header { text-align: center; padding: 20px 0; position: relative; }
        .logo { font-size: 28px; letter-spacing: 6px; color: var(--gold); margin: 0; font-weight: bold; }
        .admin-toggle { position: absolute; top: 10px; right: 10px; font-size: 10px; color: #555; cursor: pointer; border: 1px solid #333; padding: 5px; border-radius: 5px; }

        /* Section Shopping */
        .search-box { margin: 20px auto; background: rgba(255,255,255,0.07); border-radius: 12px; display: flex; align-items: center; padding: 12px; border: 1px solid rgba(197, 160, 89, 0.2); max-width: 500px; }
        #search-input { background: none; border: none; color: white; width: 100%; outline: none; }
        #categories-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .cat-card { position: relative; height: 150px; border-radius: 12px; overflow: hidden; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .cat-card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }
        .cat-title { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); text-align: center; color: var(--gold); font-size: 12px; font-weight: bold; }

        /* Section Admin */
        .admin-card { background: #222; padding: 20px; border-radius: 15px; border: 1px solid var(--gold); margin-top: 20px; }
        .admin-input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #444; background: #111; color: var(--gold); box-sizing: border-box; }
        .admin-btn-group { display: grid; gap: 10px; }
        .btn-admin { padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* Modals & Grids */
        #grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-card { background: var(--card-bg); border-radius: 12px; padding: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .product-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #121212; z-index: 9999; padding: 25px; display: none; flex-direction: column; }
        .modal.open { display: flex; }
        .btn-gold { background: var(--gold); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; }
        .size-opt { border: 1px solid #444; padding: 8px; border-radius: 5px; cursor: pointer; flex: 1; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <div class="admin-toggle" onclick="toggleAdmin()">🔧 ADMIN</div>
        <h1 class="logo">LUXURY SHOP</h1>
    </div>

    <div id="client-view">
        <div id="home-page">
            <div style="text-align: center; margin: 10px 0;">
                <h2 style="font-weight: 300; margin-bottom: 5px;">Bienvenue <span id="welcome-name">Invité</span></h2>
            </div>

            <div class="search-box">
                <input type="text" id="search-input" placeholder="Rechercher un modèle...">
            </div>

            <div id="categories-menu">
                <div class="cat-card" onclick="showCategory('Habille')">
                    <img src="https://images.unsplash.com/photo-1441984904996-e0b6ba687e04?w=400">
                    <div class="cat-title">PRÊT-À-PORTER</div>
                </div>
                <div class="cat-card" onclick="showCategory('Accessoire')">
                    <img src="https://images.unsplash.com/photo-1547949003-9792a18a2601?w=400">
                    <div class="cat-title">ACCESSOIRES</div>
                </div>
                <div class="cat-card" onclick="showCategory('Parfum')">
                    <img src="https://images.unsplash.com/photo-1541643600914-78b084683601?w=400">
                    <div class="cat-title">PARFUMS</div>
                </div>
                <div class="cat-card" onclick="showCategory('Chaussures')">
                    <img src="https://images.unsplash.com/photo-1549298916-b41d501d3772?w=400">
                    <div class="cat-title">CHAUSSURES</div>
                </div>
            </div>
        </div>

        <div id="products-section" class="hidden">
            <button onclick="goBack()" style="background:none; border:none; color:var(--gold); margin-bottom:15px; cursor:pointer;">← Retour</button>
            <h3 id="category-label" style="text-transform: uppercase; letter-spacing: 2px;"></h3>
            <div id="grid"></div>
        </div>
    </div>

    <div id="admin-view" class="hidden">
        <h2 style="text-align:center;">Gestion Ventes</h2>
        <div class="admin-card">
            <label>ID Telegram du Client :</label>
            <input type="number" id="clientId" class="admin-input" placeholder="Ex: 123456789">
            
            <div class="admin-btn-group">
                <button class="btn-admin" style="background:#2980b9" onclick="adminNotify('paye', this)">💳 Paiement Reçu</button>
                <button class="btn-admin" style="background:#f39c12" onclick="adminNotify('prep', this)">🛠️ Préparation</button>
                <button class="btn-admin" style="background:#d35400" onclick="adminNotify('exp', this)">✈️ Expédié</button>
                <button class="btn-admin" style="background:#27ae60" onclick="adminNotify('fini', this)">🎁 Livré</button>
            </div>
        </div>
        <p style="text-align:center; color:#666; margin-top:20px;" onclick="toggleAdmin()">← Retour au shop</p>
    </div>

    <div id="product-modal" class="modal">
        <span onclick="closeModal()" style="align-self:flex-end; font-size:30px;">✕</span>
        <div id="product-detail-content"></div>
    </div>

    <div id="cart-modal" class="modal">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>PANIER</h3><span onclick="closeModal()" style="font-size:30px;">✕</span>
        </div>
        <div id="cart-content" style="flex-grow:1; overflow-y:auto;"></div>
        <div style="font-size:1.2em; padding:15px 0; border-top:1px solid #333;">Total: <span id="total-price">0</span> €</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const BOT_TOKEN = 'TON_TOKEN_BOT_ICI'; // À REMPLIR
        const products = [
            { id: 1, category: "Habille", name: "Veste Luxe", price: 280, desc: "Laine italienne.", img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=400", sizes: ["S", "M", "L"] },
            { id: 2, category: "Accessoire", name: "Sac Noir", price: 450, desc: "Cuir véritable.", img: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=400" },
            { id: 3, category: "Parfum", name: "Signature", price: 110, desc: "Notes boisées.", img: "https://images.unsplash.com/photo-1523293182086-7651a899d37f?w=400" },
            { id: 4, category: "Chaussures", name: "Sneakers", price: 320, desc: "Confort premium.", img: "https://images.unsplash.com/photo-1549298916-b41d501d3772?w=400" }
        ];

        let cart = [];
        let selectedSize = null;

        // --- NAVIGATION ---
        function toggleAdmin() {
            document.getElementById('client-view').classList.toggle('hidden');
            document.getElementById('admin-view').classList.toggle('hidden');
            tg.MainButton.hide();
        }

        function showCategory(cat) {
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('products-section').classList.remove('hidden');
            document.getElementById('category-label').innerText = cat;
            renderGrid(products.filter(p => p.category === cat));
        }

        function goBack() {
            document.getElementById('home-page').classList.remove('hidden');
            document.getElementById('products-section').classList.add('hidden');
        }

        // --- SHOP LOGIC ---
        function renderGrid(data) {
            document.getElementById('grid').innerHTML = data.map(p => `
                <div class="product-card" onclick="openProduct(${p.id})">
                    <img src="${p.img}">
                    <div style="font-weight:bold; margin-top:5px;">${p.name}</div>
                    <div style="color:var(--gold);">${p.price} €</div>
                </div>
            `).join('');
        }

        function openProduct(id) {
            const p = products.find(i => i.id === id);
            selectedSize = null;
            document.getElementById('product-detail-content').innerHTML = `
                <img src="${p.img}" style="width:100%; border-radius:10px; height:200px; object-fit:cover;">
                <h2 style="color:var(--gold);">${p.name}</h2>
                <p>${p.desc}</p>
                <div style="font-size:24px; font-weight:bold; margin-bottom:15px;">${p.price} €</div>
                ${p.sizes ? `<div style="display:flex; gap:10px; margin-bottom:20px;">${p.sizes.map(s => `<div onclick="selectSize(this, '${s}')" class="size-opt">${s}</div>`).join('')}</div>` : ''}
                <button onclick="addToCart(${p.id})" class="btn-gold">AJOUTER AU PANIER</button>
            `;
            document.getElementById('product-modal').classList.add('open');
        }

        function selectSize(el, s) {
            document.querySelectorAll('.size-opt').forEach(b => b.style.borderColor = '#444');
            el.style.borderColor = 'var(--gold)';
            selectedSize = s;
        }

        function addToCart(id) {
            const p = products.find(i => i.id === id);
            cart.push({ ...p, size: selectedSize });
            tg.HapticFeedback.notificationOccurred('success');
            closeModal();
            updateMainButton();
        }

        function updateMainButton() {
            if (cart.length > 0) {
                tg.MainButton.setText(`VOIR LE PANIER (${cart.length})`);
                tg.MainButton.show();
            }
        }

        function closeModal() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
        }

        // --- ADMIN LOGIC ---
        async function adminNotify(etape, btn) {
            const id = document.getElementById('clientId').value;
            if (!id) { alert("ID manquant"); return; }
            
            let msg = "";
            if(etape === 'paye') msg = "✅ *Paiement Reçu !* Votre commande est en cours.";
            if(etape === 'prep') msg = "📦 *Préparation !* On s'occupe de votre colis.";
            if(etape === 'exp') {
                let s = prompt("Numéro de suivi :");
                msg = "🚀 *Expédié !* \nSuivi : `" + (s || "En cours") + "`";
            }
            if(etape === 'fini') msg = "🎁 *Livré !* Merci de votre achat.";

            btn.disabled = true;
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: id, text: msg, parse_mode: "Markdown" })
                });
                if(res.ok) tg.showAlert("Message envoyé !");
            } catch(e) { alert("Erreur envoi"); }
            btn.disabled = false;
        }

        // Initialisation Telegram
        tg.onEvent('mainButtonClicked', () => {
            document.getElementById('cart-modal').classList.add('open');
            let total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('total-price').innerText = total;
            document.getElementById('cart-content').innerHTML = cart.map(i => `
                <div style="padding:10px; border-bottom:1px solid #222;">
                    ${i.name} ${i.size ? `(${i.size})` : ''} - ${i.price}€
                </div>
            `).join('');
            tg.MainButton.setText("VALIDER LA COMMANDE");
        });

        // SAV Button
        tg.SecondaryButton.setParams({ text: "CONTACT SAV", is_visible: true, color: "#111", text_color: var(--gold) });
        tg.onEvent('secondaryButtonClicked', () => tg.openTelegramLink("https://t.me/toulouse315"));

    </script>
</body>
</html>
