<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // Affichage du nom de l'utilisateur
    const user = tg.initDataUnsafe?.user;
    if (user?.first_name) document.getElementById('welcome-name').innerText = user.first_name;

    tg.MainButton.setParams({ color: '#c5a059', text_color: '#ffffff' });
    tg.SecondaryButton.setParams({ text: "💬 CONTACT SAV", is_visible: true, color: "#222222" });

    // Ta liste de produits
    const products = [
        { id: 1, category: "Habille", name: "Veste Luxe", price: 280, desc: "Laine italienne premium.", img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=400", sizes: ["S", "M", "L", "XL"] },
        { id: 2, category: "Accessoire", name: "Sac à main Noir", price: 450, desc: "Cuir véritable fait main.", img: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=400" },
        { id: 3, category: "Parfum", name: "Parfum Signature", price: 110, desc: "Notes boisées et cuir.", img: "https://images.unsplash.com/photo-1523293182086-7651a899d37f?w=400" },
        { id: 4, category: "Chaussures", name: "Sneakers Cuir", price: 320, desc: "Confort et élégance.", img: "https://images.unsplash.com/photo-1549298916-b41d501d3772?w=400" }
    ];

    let cart = [];
    let selectedSize = null;

    // Fonctions de navigation
    function showCategory(cat) { 
        document.getElementById('home-page').style.display = 'none'; 
        document.getElementById('products-section').style.display = 'block'; 
        document.getElementById('category-label').innerText = cat; 
        renderGrid(products.filter(p => p.category === cat)); 
        tg.BackButton.show(); 
    }

    function goBack() { 
        document.getElementById('home-page').style.display = 'block'; 
        document.getElementById('products-section').style.display = 'none'; 
        tg.BackButton.hide(); 
    }

    function renderGrid(data) { 
        document.getElementById('grid').innerHTML = data.map(p => { 
            const qte = cart.filter(item => item.id === p.id).reduce((s, i) => s + i.qty, 0); 
            return `<div class="product-card" onclick="openProduct(${p.id})">${qte > 0 ? `<div class="badge">${qte}</div>` : ''}<img src="${p.img}"><div style="margin:12px 0 5px 0; font-weight:bold;">${p.name}</div><div style="color:var(--gold);">${p.price} €</div></div>`; 
        }).join(''); 
    }

    function openProduct(id) {
        const p = products.find(i => i.id === id); 
        selectedSize = null;
        let sizeHtml = p.sizes ? `<div style="display:flex; gap:10px; margin:20px 0; justify-content:center;">${p.sizes.map(s => `<div onclick="selectSize(this, '${s}')" style="border:1px solid #444; padding:10px 15px; border-radius:8px; cursor:pointer;" class="size-opt">${s}</div>`).join('')}</div>` : "";
        document.getElementById('product-detail-content').innerHTML = `<img src="${p.img}" style="width:100%; border-radius:15px; height:280px; object-fit:cover;"> <h2 style="color:var(--gold);">${p.name}</h2><p>${p.desc}</p><div style="font-size:26px; color:var(--gold); margin-bottom:20px;">${p.price} €</div>${sizeHtml}<button onclick="addToCart(${p.id})" class="btn-gold" style="width:100%">AJOUTER AU PANIER</button>`;
        document.getElementById('product-modal').classList.add('open');
        window.selectSize = (el, s) => { document.querySelectorAll('.size-opt').forEach(b => { b.style.background = 'none'; }); el.style.background = 'var(--gold)'; selectedSize = s; };
    }

    function addToCart(id) { 
        const p = products.find(i => i.id === id); 
        if (p.sizes && !selectedSize) { tg.showAlert("Sélectionnez une taille."); return; } 
        const ex = cart.find(it => it.id === id && it.size === selectedSize); 
        if (ex) { ex.qty++; } else { cart.push({ ...p, size: selectedSize, qty: 1 }); } 
        tg.HapticFeedback.notificationOccurred('success'); 
        closeAll(); 
        updateInterface(); 
    }

    function updateCartModal() {
        let total = 0; 
        let html = cart.length ? "" : "<p style='text-align:center;'>Panier vide</p>";
        cart.forEach((item, index) => { 
            total += item.price * item.qty; 
            html += `<div class="cart-item"><img src="${item.img}" style="width:50px; height:50px; border-radius:8px;"><div style="flex-grow:1"><b>${item.name} ${item.size ? `[${item.size}]` : ''}</b><br>${item.price}€ x ${item.qty}</div><button onclick="removeItem(${index})" style="background:none; border:none; color:red;">✕</button></div>`; 
        });
        document.getElementById('cart-content').innerHTML = html; 
        document.getElementById('total-price').innerText = total; 
        tg.MainButton.setText(`COMMANDER (${total}€)`);
    }

    function removeItem(i) { cart.splice(i, 1); updateCartModal(); updateInterface(); }

    function updateInterface() { 
        const count = cart.reduce((s, i) => s + i.qty, 0); 
        if (count > 0) tg.MainButton.show(); else tg.MainButton.hide(); 
        if (!document.getElementById('cart-modal').classList.contains('open')) { 
            tg.MainButton.setText(`VOIR LE PANIER (${count})`); 
        } 
    }

    function closeAll() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('open')); updateInterface(); }

    // --- LE CŒUR DU SYSTÈME ---
    tg.onEvent('mainButtonClicked', () => {
        if (!document.getElementById('cart-modal').classList.contains('open')) {
            document.getElementById('cart-modal').classList.add('open'); 
            updateCartModal();
        } else {
            // Ici on transforme le panier en texte pour l'envoyer au Bot Python
            const dataToSend = JSON.stringify(cart);
            tg.sendData(dataToSend); 
            tg.close();
        }
    });

    tg.onEvent('secondaryButtonClicked', () => tg.openTelegramLink("https://wa.me/33768407533"));
    tg.onEvent('backButtonClicked', goBack);
</script>
