<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boutique</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --primary: #c5a059; 
            --bg: var(--tg-theme-bg_color, #ffffff); 
            --text: var(--tg-theme-text-color, #222); 
            --sec-bg: var(--tg-theme-secondary_bg_color, #f4f4f4);
            --hint: var(--tg-theme-hint_color, #999);
        }
        
        body { font-family: sans-serif; margin: 0; padding: 15px; background: var(--bg); color: var(--text); padding-bottom: 100px; }
        
        /* Grille produits */
        #grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: var(--sec-bg); border-radius: 12px; padding: 10px; text-align: center; border: 1px solid rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; }
        
        /* Boutons de taille */
        .size-container { display: flex; gap: 8px; justify-content: center; margin: 10px 0; flex-wrap: wrap; }
        .size-btn { 
            padding: 6px 12px; border: 1px solid var(--hint); border-radius: 6px; 
            background: none; color: var(--text); cursor: pointer; font-size: 12px;
        }
        .size-btn.active { border: 2px solid var(--primary); color: var(--primary); font-weight: bold; }

        /* Modales */
        .modal { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: var(--bg); z-index: 9999; padding: 20px; 
            display: none; flex-direction: column; 
        }
        .modal.open { display: flex; }

        .btn-main { 
            background: var(--primary); color: white; border: none; 
            border-radius: 8px; width: 100%; padding: 12px; font-weight: bold; margin-top: 10px;
        }

        .cart-item { 
            display: flex; align-items: center; gap: 10px; padding: 10px 0; 
            border-bottom: 1px solid rgba(0,0,0,0.1); 
        }
    </style>
</head>
<body>

    <h2 style="text-align:center; font-weight:300;">Notre Collection</h2>
    <div id="grid"></div>

    <div id="cart-modal" class="modal">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>Mon Panier</h3>
            <span onclick="closeModals()" style="font-size:30px;">✕</span>
        </div>
        <div id="cart-items" style="flex-grow:1; overflow-y:auto;"></div>
        <div id="total-display" style="font-size:1.2rem; font-weight:bold; padding:20px 0;">Total: 0€</div>
    </div>

    <div id="product-modal" class="modal">
        <span onclick="closeModals()" style="align-self:flex-end; font-size:30px;">✕</span>
        <div id="product-detail"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const products = [
            { id: 1, name: "Veste Luxe", price: 280, img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=400", sizes: ["S", "M", "L", "XL"] },
            { id: 2, name: "Chemise Été", price: 120, img: "https://images.unsplash.com/photo-1598033129183-c4f50c717658?w=400", sizes: ["M", "L"] },
            { id: 3, name: "Sac Voyage", price: 450, img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=400" },
            { id: 4, name: "Montre Or", price: 890, img: "https://images.unsplash.com/photo-1524592094713-9487cc757a04?w=400" }
        ];

        let cart = [];
        let selectedSize = null;

        function init() {
            const grid = document.getElementById('grid');
            grid.innerHTML = products.map(p => `
                <div class="card" onclick="openProduct(${p.id})">
                    <img src="${p.img}">
                    <div style="font-weight:bold; margin:5px 0;">${p.name}</div>
                    <div style="color:var(--primary)">${p.price} €</div>
                    <button class="btn-main" style="padding:5px; font-size:12px;">VOIR</button>
                </div>
            `).join('');
        }

        function openProduct(id) {
            const p = products.find(x => x.id === id);
            selectedSize = null;
            
            let html = `
                <img src="${p.img}" style="width:100%; border-radius:15px;">
                <h2>${p.name}</h2>
                <div style="font-size:20px; color:var(--primary); font-weight:bold;">${p.price} €</div>
            `;

            if (p.sizes) {
                html += `<p>Choisir une taille :</p><div class="size-container">`;
                p.sizes.forEach(s => {
                    html += `<button class="size-btn" onclick="selectSize(this, '${s}')">${s}</button>`;
                });
                html += `</div>`;
            }

            html += `<button class="btn-main" onclick="addToCart(${p.id})">AJOUTER AU PANIER</button>`;
            
            document.getElementById('product-detail').innerHTML = html;
            document.getElementById('product-modal').classList.add('open');
            tg.BackButton.show();
        }

        function selectSize(btn, size) {
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedSize = size;
        }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            if (p.sizes && !selectedSize) {
                tg.showAlert("Oups ! Choisis une taille.");
                return;
            }

            // On crée une clé unique (ex: "1_M") pour différencier les tailles
            const itemKey = selectedSize ? `${id}_${selectedSize}` : `${id}`;
            const existing = cart.find(item => item.key === itemKey);

            if (existing) {
                existing.qty++;
            } else {
                cart.push({
                    key: itemKey,
                    name: p.name,
                    price: p.price,
                    size: selectedSize,
                    qty: 1
                });
            }

            tg.HapticFeedback.notificationOccurred('success');
            closeModals();
            updateMainButton();
        }

        function updateMainButton() {
            const count = cart.reduce((a, b) => a + b.qty, 0);
            if (count > 0) {
                tg.MainButton.setText(`VOIR LE PANIER (${count})`);
                tg.MainButton.show();
            } else {
                tg.MainButton.hide();
            }
        }

        function showCart() {
            let total = 0;
            const container = document.getElementById('cart-items');
            
            if (cart.length === 0) {
                container.innerHTML = "<p style='text-align:center;'>Le panier est vide</p>";
            } else {
                container.innerHTML = cart.map((item, index) => {
                    total += item.price * item.qty;
                    return `
                        <div class="cart-item">
                            <div style="flex-grow:1">
                                <strong>${item.name}</strong> ${item.size ? `[${item.size}]` : ''}<br>
                                ${item.price}€ x ${item.qty}
                            </div>
                            <button onclick="removeItem(${index})" style="color:red; background:none; border:none;">Supprimer</button>
                        </div>
                    `;
                }).join('');
            }
            
            document.getElementById('total-display').innerText = `Total : ${total} €`;
            document.getElementById('cart-modal').classList.add('open');
            tg.MainButton.setText("COMMANDER MAINTENANT");
        }

        function removeItem(index) {
            cart.splice(index, 1);
            showCart();
            updateMainButton();
        }

        function closeModals() {
            document.getElementById('product-modal').classList.remove('open');
            document.getElementById('cart-modal').classList.remove('open');
            tg.BackButton.hide();
            updateMainButton();
        }

        tg.onEvent('mainButtonClicked', () => {
            if (document.getElementById('cart-modal').classList.contains('open')) {
                tg.sendData(JSON.stringify(cart));
            } else {
                showCart();
                tg.BackButton.show();
            }
        });

        tg.onEvent('backButtonClicked', closeModals);

        init();
    </script>
</body>
</html>
