<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUXURY SHOP - VERSION FINALE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #c5a059; 
            --bg-top: #2c2c2c; 
            --bg-bottom: #0f0f0f;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-white: #ffffff;
        }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; padding: 15px; 
            background: radial-gradient(circle at top, var(--bg-top) 0%, var(--bg-bottom) 70%);
            background-attachment: fixed;
            color: var(--text-white); 
            padding-bottom: 100px;
            min-height: 100vh;
        }

        /* LOGO & HEADER */
        .header { text-align: center; padding: 30px 0 10px 0; }
        .logo { font-size: 32px; letter-spacing: 6px; color: var(--gold); margin: 0; font-weight: bold; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .slogan { font-size: 11px; letter-spacing: 3px; color: #888; text-transform: uppercase; margin-top: 5px; }

        .welcome-area { text-align: center; margin: 20px 0; }
        #welcome-name { font-weight: bold; color: var(--gold); }
        
        /* RECHERCHE */
        .search-box { 
            margin: 20px auto; background: rgba(255,255,255,0.07); border-radius: 12px; 
            display: flex; align-items: center; padding: 12px; border: 1px solid rgba(197, 160, 89, 0.2);
            max-width: 500px;
        }
        #search-input { background: none; border: none; color: white; width: 100%; outline: none; font-size: 15px; }

        /* ANIMATIONS CATÉGORIES */
        #categories-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 25px; }
        .cat-card { 
            position: relative; height: 180px; border-radius: 15px; overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .cat-card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); transition: transform 0.6s ease; }
        .cat-card:hover img { transform: scale(1.1); }
        .cat-title { 
            position: absolute; bottom: 0; left: 0; right: 0; padding: 12px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8)); text-align: center; 
            font-size: 12px; font-weight: bold; letter-spacing: 2px; color: var(--gold);
        }

        /* SECTION AVIS (Animation Cascade) */
        .reviews-section { margin-top: 50px; padding: 20px 0; border-top: 1px solid rgba(197, 160, 89, 0.2); }
        .review-card { 
            background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05); animation: fadeIn 0.8s ease backwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .review-card:nth-child(1) { animation-delay: 0.2s; }
        .review-card:nth-child(2) { animation-delay: 0.4s; }

        /* GRILLE PRODUITS */
        #products-section { display: none; }
        #grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-card { 
            background: var(--card-bg); border-radius: 12px; padding: 12px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1); position: relative;
        }
        .product-card img { width: 100%; height: 130px; object-fit: cover; border-radius: 8px; }
        .badge { position: absolute; top: -5px; right: -5px; background: var(--gold); color: white; border-radius: 50%; width: 22px; height: 22px; font-size: 11px; display: flex; align-items: center; justify-content: center; }

        /* BOUTON SHINE EFFECT */
        .btn-gold { 
            background: var(--gold); color: white; border: none; padding: 15px; border-radius: 10px; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; 
            position: relative; overflow: hidden; transition: 0.3s;
        }
        .btn-gold::after {
            content: ''; position: absolute; top: -50%; left: -60%; width: 20%; height: 200%;
            background: rgba(255, 255, 255, 0.2); transform: rotate(30deg);
            animation: shine 4s infinite;
        }
        @keyframes shine { 0% { left: -60%; } 15% { left: 120%; } 100% { left: 120%; } }

        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0f0f0f; z-index: 9999; padding: 25px; display: none; flex-direction: column; }
        .modal.open { display: flex; }
        .size-opt { border: 1px solid #444; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="logo">LUXURY SHOP</h1>
        <div class="slogan">L'Art du Luxe</div>
    </div>

    <div id="home-page">
        <div class="welcome-area">
            <h2 style="font-weight:300;">Bienvenue <span id="welcome-name">Invité</span></h2>
        </div>

        <div class="search-box">
            <input type="text" id="search-input" placeholder="Rechercher un modèle..." onkeyup="search()">
        </div>

        <div id="categories-menu">
            <div class="cat-card" onclick="showCategory('Habille')">
                <img src="https://images.unsplash.com/photo-1441984904996-e0b6ba687e04?w=400">
                <div class="cat-title">PRÊT-À-PORTER</div>
            </div>
            <div class="cat-card" onclick="showCategory('Accessoire')">
                <img src="https://images.unsplash.com/photo-1547949003-9792a18a2601?w=400">
                <div class="cat-title">ACCESSOIRES</div>
            </div>
            <div class="cat-card" onclick="showCategory('Parfum')">
                <img src="https://images.unsplash.com/photo-1541643600914-78b084683601?w=400">
                <div class="cat-title">PARFUMS</div>
            </div>
            <div class="cat-card" onclick="showCategory('Chaussures')">
                <img src="https://images.unsplash.com/photo-1549298916-b41d501d3772?w=400">
                <div class="cat-title">CHAUSSURES</div>
            </div>
        </div>

        <section class="reviews-section">
            <h3 style="color:var(--gold); font-size:14px; text-align:center; letter-spacing:2px;">AVIS CLIENTS</h3>
            <div class="review-card">
                <div style="color:var(--gold); margin-bottom:5px;">★★★★★</div>
                <p style="font-size:13px; font-style:italic; margin:0;">"Qualité exceptionnelle, la veste est sublime."</p>
                <div style="text-align:right; font-size:11px; color:var(--gold);">- Jean M.</div>
            </div>
            <div class="review-card">
                <div style="color:var(--gold); margin-bottom:5px;">★★★★★</div>
                <p style="font-size:13px; font-style:italic; margin:0;">"Parfums incroyables, je recommande."</p>
                <div style="text-align:right; font-size:11px; color:var(--gold);">- Elena K.</div>
            </div>
        </section>
    </div>

    <div id="products-section">
        <button onclick="goBack()" style="background:none; border:none; color:white; padding:15px 0; cursor:pointer;">← Retour</button>
        <div id="grid"></div>
    </div>

    <div id="product-modal" class="modal">
        <span onclick="closeAll()" style="align-self:flex-end; font-size:30px; cursor:pointer; color:var(--gold);">✕</span>
        <div id="product-detail-content"></div>
    </div>

    <div id="cart-modal" class="modal">
        <h3 style="color:var(--gold);">MON PANIER</h3>
        <div id="cart-content" style="flex-grow:1; overflow-y:auto;"></div>
        <div style="font-size:1.3em; padding:20px 0; border-top:1px solid var(--gold);">Total : <span id="total-price">0</span> €</div>
        <button onclick="closeAll()" class="btn-gold">Continuer Shopping</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        if (tg.initDataUnsafe?.user?.first_name) document.getElementById('welcome-name').innerText = tg.initDataUnsafe.user.first_name;

        const products = [
            { id: 1, category: "Habille", name: "Veste Laine", price: 280, desc: "Laine italienne premium.", img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=400", sizes: ["S", "M", "L"] },
            { id: 2, category: "Habille", name: "Chemise Soie", price: 195, desc: "Soie 100% naturelle.", img: "https://images.unsplash.com/photo-1596755094514-f87034a26cc1?w=400", sizes: ["S", "M"] },
            { id: 3, category: "Habille", name: "Pantalon Droit", price: 210, desc: "Élégance classique.", img: "https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?w=400", sizes: ["40", "42"] },
            { id: 4, category: "Habille", name: "Manteau Long", price: 450, desc: "Cachemire noble.", img: "https://images.unsplash.com/photo-1539533018447-63fcce2678e3?w=400", sizes: ["M", "L"] },
            { id: 5, category: "Accessoire", name: "Sac Noir", price: 420, desc: "Cuir véritable.", img: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=400" },
            { id: 6, category: "Accessoire", name: "Ceinture Or", price: 145, desc: "Laiton poli.", img: "https://images.unsplash.com/photo-1624222247344-550fbad09490?w=400" },
            { id: 7, category: "Accessoire", name: "Portefeuille", price: 95, desc: "Cuir grainé.", img: "https://images.unsplash.com/photo-1627123430984-705199f74d61?w=400" },
            { id: 8, category: "Accessoire", name: "Lunettes", price: 185, desc: "Monture luxe.", img: "https://images.unsplash.com/photo-1511499767390-90342f5b89a7?w=400" },
            { id: 9, category: "Parfum", name: "Signature", price: 110, desc: "Boisé.", img: "https://images.unsplash.com/photo-1523293182086-7651a899d37f?w=400" },
            { id: 10, category: "Parfum", name: "Nuit", price: 130, desc: "Ambré.", img: "https://images.unsplash.com/photo-1557170334-a7c3a4e22411?w=400" },
            { id: 11, category: "Parfum", name: "Essence", price: 155, desc: "Floral.", img: "https://images.unsplash.com/photo-1594035910387-fea47794261f?w=400" },
            { id: 12, category: "Parfum", name: "Oud", price: 180, desc: "Bois d'oud.", img: "https://images.unsplash.com/photo-1585232351009-aa87416fca90?w=400" },
            { id: 13, category: "Chaussures", name: "Sneakers", price: 310, desc: "Cuir blanc.", img: "https://images.unsplash.com/photo-1549298916-b41d501d3772?w=400" },
            { id: 14, category: "Chaussures", name: "Bottines", price: 385, desc: "Daim marron.", img: "https://images.unsplash.com/photo-1638247025967-b4e38f787b76?w=400" },
            { id: 15, category: "Chaussures", name: "Mocassins", price: 275, desc: "Cuir vernis.", img: "https://images.unsplash.com/photo-1614252235316-8c857d38b5f4?w=400" },
            { id: 16, category: "Chaussures", name: "Derbies", price: 340, desc: "Noir classique.", img: "https://images.unsplash.com/photo-1533867617858-e7b97e060509?w=400" }
        ];

        let cart = [];
        let selectedSize = null;

        function showCategory(cat) {
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('products-section').style.display = 'block';
            renderGrid(products.filter(p => p.category === cat));
            tg.BackButton.show();
        }

        function goBack() {
            document.getElementById('home-page').style.display = 'block';
            document.getElementById('products-section').style.display = 'none';
            tg.BackButton.hide();
        }

        function renderGrid(data) {
            const grid = document.getElementById('grid');
            grid.innerHTML = data.map(p => {
                const qte = cart.filter(item => item.id === p.id).length;
                return `
                <div class="product-card" onclick="openProduct(${p.id})">
                    ${qte > 0 ? `<div class="badge">${qte}</div>` : ''}
                    <img src="${p.img}">
                    <div style="margin:8px 0 3px 0; font-weight:bold; font-size:13px;">${p.name}</div>
                    <div style="color:var(--gold); font-size:13px;">${p.price} €</div>
                </div>`;
            }).join('');
        }

        function openProduct(id) {
            const p = products.find(i => i.id === id);
            selectedSize = null;
            let sizeHtml = p.sizes ? `<div style="display:flex; gap:8px; margin:15px 0; justify-content:center;">${p.sizes.map(s => `<div onclick="selectSize(this, '${s}')" class="size-opt">${s}</div>`).join('')}</div>` : "";

            document.getElementById('product-detail-content').innerHTML = `
                <img src="${p.img}" style="width:100%; border-radius:10px; height:220px; object-fit:cover;">
                <h2 style="color:var(--gold); margin:15px 0 5px 0;">${p.name}</h2>
                <p style="color:#888; font-size:13px;">${p.desc}</p>
                <div style="font-size:22px; color:var(--gold); font-weight:bold; margin-bottom:15px;">${p.price} €</div>
                ${sizeHtml}
                <button onclick="addToCart(${p.id})" class="btn-gold" style="width:100%">AJOUTER</button>`;
            document.getElementById('product-modal').classList.add('open');
        }

        window.selectSize = (el, s) => {
            document.querySelectorAll('.size-opt').forEach(b => b.style.background = 'none');
            el.style.background = 'var(--gold)';
            selectedSize = s;
        };

        function addToCart(id) {
            const p = products.find(i => i.id === id);
            if (p.sizes && !selectedSize) { tg.showAlert("Choisissez une taille"); return; }
            cart.push({ ...p, size: selectedSize });
            tg.HapticFeedback.notificationOccurred('success');
            closeAll();
            updateInterface();
        }

        function updateCartModal() {
            let total = 0;
            let html = cart.map((item, index) => {
                total += item.price;
                return `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #333;">
                    <div style="font-size:13px;">${item.name} ${item.size ? `(${item.size})` : ''}</div>
                    <div style="color:var(--gold);">${item.price}€ <span onclick="removeItem(${index})" style="color:red; margin-left:10px;">✕</span></div>
                </div>`;
            }).join('');
            document.getElementById('cart-content').innerHTML = html || "Panier vide";
            document.getElementById('total-price').innerText = total;
            tg.MainButton.setText(`PAYER (${total}€)`);
        }

        function removeItem(i) { cart.splice(i, 1); updateCartModal(); updateInterface(); }

        function updateInterface() {
            if (cart.length > 0) { tg.MainButton.show(); tg.MainButton.setText(`PANIER (${cart.length})`); } 
            else { tg.MainButton.hide(); }
            if (document.getElementById('products-section').style.display === 'block') {
                const currentCat = document.getElementById('grid').children[0]?.
