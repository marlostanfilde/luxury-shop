<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ma Boutique Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #c5a059; --bg: #ffffff; }
        body { font-family: sans-serif; margin: 0; padding: 15px; background: var(--bg); padding-bottom: 120px; }
        
        #grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { border: 1px solid #eee; border-radius: 12px; padding: 10px; text-align: center; background: white; }
        .card img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; }
        .price { font-weight: bold; color: var(--primary); display: block; margin: 8px 0; }
        .btn-action { background: var(--primary); color: white; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 20px; }
        
        /* BARRE SAV EN BAS */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            display: flex;
            justify-content: center;
            border-top: 1px solid #eee;
            z-index: 90;
        }
        .btn-sav-bottom {
            background: #242424;
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #cart-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: white; z-index: 100; padding: 20px; display: none; flex-direction: column; }
        #cart-modal.open { display: flex; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .total-section { margin-top: auto; padding: 20px 0; font-size: 1.2em; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="text-align:center; margin-bottom: 20px;">Collection Signature</h2>
    
    <div id="grid"></div>

    <div class="bottom-bar" id="sav-bar">
        <a href="https://t.me/TonUsername" class="btn-sav-bottom">
            <span>💬</span> CONTACTER LE SAV
        </a>
    </div>

    <div id="cart-modal">
        <h3>Votre Panier</h3>
        <div id="cart-content"></div>
        <div class="total-section">Total: <span id="total-price">0</span> €</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.setParams({ color: '#c5a059', text_color: '#ffffff' });

        const products = [
            { id: 1, name: "Veste Signature", price: 280, img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=500" },
            { id: 2, name: "Chemise Lin", price: 120, img: "https://images.unsplash.com/photo-1598033129183-c4f50c717658?w=500" },
            { id: 3, name: "Sac Cuir", price: 450, img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=500" },
            { id: 4, name: "Lunettes", price: 320, img: "https://images.unsplash.com/photo-1511499767390-90342f54b207?w=500" }
        ];

        let cart = {};

        function initialRender() {
            const grid = document.getElementById('grid');
            grid.innerHTML = products.map(p => `
                <div class="card">
                    <img src="${p.img}">
                    <h4>${p.name}</h4>
                    <span class="price">${p.price} €</span>
                    <div id="controls-${p.id}">
                        <button class="btn-action" onclick="updateCart(${p.id}, 1)">+</button>
                    </div>
                </div>
            `).join('');
        }

        function updateCart(id, delta) {
            cart[id] = (cart[id] || 0) + delta;
            if (cart[id] <= 0) delete cart[id];
            
            const controlDiv = document.getElementById(`controls-${id}`);
            const count = cart[id] || 0;
            controlDiv.innerHTML = `
                ${count > 0 ? `<button class="btn-action" onclick="updateCart(${id}, -1)">-</button><span style="margin:0 10px">${count}</span>` : ''}
                <button class="btn-action" onclick="updateCart(${id}, 1)">+</button>
            `;
            updateInterface();
        }

        function updateInterface() {
            const count = Object.values(cart).reduce((a, b) => a + b, 0);
            const modalOpen = document.getElementById('cart-modal').classList.contains('open');
            const savBar = document.getElementById('sav-bar');
            
            if (count > 0) {
                // On cache la barre SAV quand le bouton Telegram apparaît pour ne pas chevaucher
                savBar.style.bottom = "60px"; 
                if (modalOpen) {
                    tg.MainButton.setText("VALIDER LA COMMANDE");
                } else {
                    tg.MainButton.setText(`VOIR LE PANIER (${count})`);
                }
                tg.MainButton.show();
            } else {
                savBar.style.bottom = "0";
                tg.MainButton.hide();
                if (modalOpen) closeCart();
            }
        }

        function updateCartModal() {
            const content = document.getElementById('cart-content');
            let total = 0;
            let html = "";
            products.forEach(p => {
                if (cart[p.id]) {
                    const subtotal = p.price * cart[p.id];
                    total += subtotal;
                    html += `<div class="cart-item"><span>${p.name} (x${cart[p.id]})</span><span>${subtotal} €</span></div>`;
                }
            });
            content.innerHTML = html || "<p>Panier vide</p>";
            document.getElementById('total-price').innerText = total;
        }

        function openCart() {
            updateCartModal();
            document.getElementById('cart-modal').classList.add('open');
            tg.BackButton.show();
            updateInterface();
        }

        function closeCart() {
            document.getElementById('cart-modal').classList.remove('open');
            tg.BackButton.hide();
            updateInterface();
        }

        tg.onEvent('mainButtonClicked', function() {
            const modal = document.getElementById('cart-modal');
            if (!modal.classList.contains('open')) {
                openCart();
            } else {
                tg.sendData(JSON.stringify({commande: cart, total: document.getElementById('total-price').innerText}));
            }
        });

        tg.onEvent('backButtonClicked', closeCart);
        window.onload = initialRender;
    </script>
</body>
</html>
