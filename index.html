<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ma Boutique Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #c5a059; --bg: #ffffff; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; 
            padding: 15px; 
            background: var(--bg);
            /* On ajoute un énorme espace en bas pour que le dernier article puisse monter au-dessus des boutons */
            padding-bottom: 180px; 
        }
        
        h2 { text-align: center; margin-bottom: 25px; font-weight: 300; letter-spacing: 1px; }

        #grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }

        .card { 
            border: 1px solid #f0f0f0; 
            border-radius: 15px; 
            padding: 12px; 
            text-align: center; 
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .card img { width: 100%; height: 130px; object-fit: cover; border-radius: 10px; }
        .price { font-weight: bold; color: var(--primary); display: block; margin: 10px 0; }
        
        .controls { display: flex; align-items: center; justify-content: center; gap: 12px; }
        .btn-action { 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            width: 35px; 
            height: 35px; 
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* LA BARRE FIXE EN BAS - LA PROTECTION */
        .bottom-nav-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px; /* Zone réservée */
            background: linear-gradient(to top, white 80%, rgba(255,255,255,0));
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99;
            pointer-events: none; /* Laisse passer le clic sauf sur le bouton */
        }

        .btn-sav-fixed {
            pointer-events: auto; /* Réactive le clic sur le bouton */
            background: #1a1a1a;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s;
        }

        /* Style Panier */
        #cart-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: white; z-index: 1000; padding: 25px; display: none; flex-direction: column; }
        #cart-modal.open { display: flex; }
        .cart-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #f5f5f5; }
        .total-section { margin-top: auto; padding: 25px 0; font-size: 1.4em; font-weight: bold; border-top: 2px solid #eee; }
    </style>
</head>
<body>

    <h2>Collection Exclusive</h2>
    
    <div id="grid"></div>

    <div class="bottom-nav-area" id="nav-area">
        <a href="https://t.me/TonUsername" class="btn-sav-fixed">
            <span>💬</span> BESOIN D'AIDE ?
        </a>
    </div>

    <div id="cart-modal">
        <h3 style="font-size: 24px;">Votre Sélection</h3>
        <div id="cart-content"></div>
        <div class="total-section">
            <span>Total :</span>
            <span id="total-price">0</span> €
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.setParams({ color: '#c5a059', text_color: '#ffffff' });

        const products = [
            { id: 1, name: "Veste Signature", price: 280, img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=500" },
            { id: 2, name: "Chemise Lin", price: 120, img: "https://images.unsplash.com/photo-1598033129183-c4f50c717658?w=500" },
            { id: 3, name: "Sac Cuir", price: 450, img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=500" },
            { id: 4, name: "Lunettes", price: 320, img: "https://images.unsplash.com/photo-1511499767390-90342f54b207?w=500" }
        ];

        let cart = {};

        function initialRender() {
            const grid = document.getElementById('grid');
            grid.innerHTML = products.map(p => `
                <div class="card">
                    <img src="${p.img}">
                    <h4 style="margin: 10px 0 5px 0; font-size: 15px;">${p.name}</h4>
                    <span class="price">${p.price} €</span>
                    <div class="controls" id="controls-${p.id}">
                        <button class="btn-action" onclick="updateCart(${p.id}, 1)">+</button>
                    </div>
                </div>
            `).join('');
        }

        function updateCart(id, delta) {
            cart[id] = (cart[id] || 0) + delta;
            if (cart[id] <= 0) delete cart[id];
            
            const controlDiv = document.getElementById(`controls-${id}`);
            const count = cart[id] || 0;
            controlDiv.innerHTML = `
                ${count > 0 ? `<button class="btn-action" style="background:#eee; color:#333;" onclick="updateCart(${id}, -1)">-</button><span style="font-weight:bold; min-width:20px">${count}</span>` : ''}
                <button class="btn-action" onclick="updateCart(${id}, 1)">+</button>
            `;
            updateInterface();
        }

        function updateInterface() {
            const count = Object.values(cart).reduce((a, b) => a + b, 0);
            const modalOpen = document.getElementById('cart-modal').classList.contains('open');
            const navArea = document.getElementById('nav-area');
            
            if (count > 0) {
                // Le bouton SAV remonte pour laisser la place au bouton de commande de Telegram
                navArea.style.bottom = "65px"; 
                if (modalOpen) {
                    tg.MainButton.setText("VALIDER LA COMMANDE");
                } else {
                    tg.MainButton.setText(`VOIR LE PANIER (${count})`);
                }
                tg.MainButton.show();
            } else {
                navArea.style.bottom = "10px";
                tg.MainButton.hide();
                if (modalOpen) closeCart();
            }
        }

        function updateCartModal() {
            const content = document.getElementById('cart-content');
            let total = 0;
            let html = "";
            products.forEach(p => {
                if (cart[p.id]) {
                    const subtotal = p.price * cart[p.id];
                    total += subtotal;
                    html += `<div class="cart-item"><span>${p.name} (x${cart[p.id]})</span><strong>${subtotal} €</strong></div>`;
                }
            });
            content.innerHTML = html || "<p style='color:#888'>Votre panier est vide...</p>";
            document.getElementById('total-price').innerText = total;
        }

        function openCart() {
            updateCartModal();
            document.getElementById('cart-modal').classList.add('open');
            tg.BackButton.show();
            updateInterface();
        }

        function closeCart() {
            document.getElementById('cart-modal').classList.remove('open');
            tg.BackButton.hide();
            updateInterface();
        }

        tg.onEvent('mainButtonClicked', function() {
            const modal = document.getElementById('cart-modal');
            if (!modal.classList.contains('open')) {
                openCart();
            } else {
                tg.sendData(JSON.stringify({commande: cart, total: document.getElementById('total-price').innerText}));
            }
        });

        tg.onEvent('backButtonClicked', closeCart);
        window.onload = initialRender;
    </script>
</body>
</html>
