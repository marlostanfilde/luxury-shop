<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAISON LUXURY</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #D4AF37; 
            --gold-light: #F9E4B7;
            --black: #050505;
            --dark-grey: #121212;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(212, 175, 55, 0.2);
        }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; padding: 0;
            background-color: var(--black);
            color: white; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- HEADER PRESTIGE --- */
        .header { 
            text-align: center; 
            padding: 50px 20px 20px 20px;
            background: linear-gradient(to bottom, #1a1a1a, var(--black));
        }
        .logo { 
            font-family: 'Cinzel', serif;
            font-size: 38px; 
            letter-spacing: 10px; 
            color: var(--gold); 
            margin: 0; 
            text-transform: uppercase;
        }
        .slogan { 
            font-size: 9px; 
            letter-spacing: 5px; 
            color: var(--gold-light); 
            text-transform: uppercase; 
            margin-top: 10px;
            opacity: 0.8;
        }

        .container { padding: 20px; }

        /* --- SEARCH LUXE --- */
        .search-box { 
            margin: 10px 0 30px 0;
            background: var(--dark-grey);
            border: 1px solid var(--border);
            border-radius: 0px; /* Le luxe aime les angles droits */
            padding: 15px;
            display: flex;
        }
        #search-input { 
            background: none; border: none; color: white; width: 100%; 
            outline: none; font-size: 14px; letter-spacing: 1px;
            font-family: 'Montserrat';
        }

        /* --- CATEGORIES --- */
        #categories-menu { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }
        .cat-card { 
            position: relative; height: 220px; 
            overflow: hidden; border: 1px solid rgba(255,255,255,0.05);
            transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .cat-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; opacity: 0.6; }
        .cat-card:hover img { transform: scale(1.1); opacity: 0.8; }
        .cat-title { 
            position: absolute; bottom: 20px; width: 100%;
            text-align: center; font-family: 'Cinzel';
            font-size: 14px; letter-spacing: 3px; color: var(--gold-light);
        }

        /* --- PRODUCT GRID --- */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .product-card { 
            background: none;
            margin-bottom: 20px;
        }
        .product-card img { 
            width: 100%; height: 200px; object-fit: cover; 
            border: 1px solid var(--border);
        }
        .product-info { padding: 10px 0; text-align: center; }
        .p-name { font-size: 12px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
        .p-price { color: var(--gold); font-weight: 600; font-size: 14px; }

        /* --- MODALS LUXE --- */
        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--black); z-index: 9999; 
            display: none; flex-direction: column;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .modal-content { padding: 30px; overflow-y: auto; flex-grow: 1; }
        .close-btn { align-self: flex-end; padding: 20px; font-size: 24px; color: var(--gold); cursor: pointer; }

        .btn-buy { 
            background: var(--gold); color: black; border: none;
            padding: 18px; font-weight: bold; width: 100%;
            letter-spacing: 2px; font-family: 'Montserrat'; margin-top: 20px;
        }

        /* --- REVIEWS --- */
        .reviews-section { margin-top: 60px; border-top: 1px solid var(--border); padding-top: 40px; }
        .review-card { 
            background: var(--glass); border-left: 2px solid var(--gold);
            padding: 20px; margin-bottom: 20px; font-size: 13px;
        }

        .badge-count {
            background: var(--gold); color: black; font-size: 10px;
            padding: 2px 6px; border-radius: 50%; position: absolute; top: 10px; right: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="logo">MAISON LUXE</h1>
        <div class="slogan">L'Excellence Absolue</div>
    </div>

    <div class="container" id="main-view">
        <p style="text-align: center; font-weight: 200; font-size: 14px; letter-spacing: 2px;">
            BIENVENU, <span id="user-name" style="color: var(--gold);">EXCELLENCE</span>
        </p>

        <div class="search-box">
            <input type="text" id="search-input" placeholder="RECHERCHER UNE PIÈCE..." onkeyup="search()">
        </div>

        <div id="categories-menu">
            <div class="cat-card" onclick="showCategory('Habille')">
                <img src="https://images.unsplash.com/photo-1539109136881-3be0616acf4b?w=800">
                <div class="cat-title">VESTIAIRE</div>
            </div>
            <div class="cat-card" onclick="showCategory('Accessoire')">
                <img src="https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=800">
                <div class="cat-title">MAROQUINERIE</div>
            </div>
            <div class="cat-card" onclick="showCategory('Parfum')">
                <img src="https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?w=800">
                <div class="cat-title">FRAGRANCES</div>
            </div>
            <div class="cat-card" onclick="showCategory('Chaussures')">
                <img src="https://images.unsplash.com/photo-1543163521-1bf539c55dd2?w=800">
                <div class="cat-title">SOULIERS</div>
            </div>
        </div>

        <div class="reviews-section">
            <h2 style="font-family: 'Cinzel'; text-align: center; font-size: 16px; margin-bottom: 30px; letter-spacing: 4px;">Témoignages</h2>
            <div id="reviews-container"></div>
        </div>
    </div>

    <div class="container" id="products-view" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h3 id="category-title" style="font-family: 'Cinzel'; letter-spacing: 3px; color: var(--gold);"></h3>
            <button onclick="goBack()" style="background:none; border:none; color:white; border-bottom:1px solid white; padding-bottom:5px; font-size:10px; letter-spacing:2px;">RETOUR</button>
        </div>
        <div class="product-grid" id="grid"></div>
    </div>

    <div id="product-modal" class="modal">
        <span class="close-btn" onclick="closeModal()">✕</span>
        <div class="modal-content" id="modal-body"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Personnalisation au nom de l'utilisateur
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name.toUpperCase();
        }

        const products = [
            { id: 1, category: "Habille", name: "Blazer Cachemire", price: 890, desc: "Laine et cachemire précieux. Coupe italienne.", img: "https://images.unsplash.com/photo-1594932224010-74f43a18652b?w=600" },
            { id: 2, category: "Accessoire", name: "Sac Signature Noir", price: 1250, desc: "Cuir pleine fleur, bouclerie or 24k.", img: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=600" },
            { id: 9, category: "Parfum", name: "Oud Impérial", price: 245, desc: "Notes de bois d'agar et de rose noire.", img: "https://images.unsplash.com/photo-1541643600914-78b084683601?w=600" },
            { id: 13, category: "Chaussures", name: "Mocassins de Soirée", price: 560, desc: "Daim noir, montage Blake traditionnel.", img: "https://images.unsplash.com/photo-1614252235316-8c857d38b5f4?w=600" }
        ];

        const reviews = [
            { name: "Marc-Antoine D.", text: "Une qualité inégalée. Le service client est d'une discrétion et d'une efficacité rare.", stars: "★★★★★" },
            { name: "Sophie H.", text: "Le sac est une merveille. La livraison à Monaco a été parfaite.", stars: "★★★★★" }
        ];

        function initReviews() {
            document.getElementById('reviews-container').innerHTML = reviews.map(r => `
                <div class="review-card">
                    <div style="color:var(--gold); margin-bottom:10px;">${r.stars}</div>
                    <p style="margin:0; font-style:italic; line-height:1.6;">"${r.text}"</p>
                    <p style="text-align:right; font-size:10px; margin-top:15px; letter-spacing:1px;">— ${r.name}</p>
                </div>
            `).join('');
        }
        initReviews();

        function showCategory(cat) {
            tg.HapticFeedback.impactOccurred('medium');
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('products-view').style.display = 'block';
            document.getElementById('category-title').innerText = cat.toUpperCase();
            
            const filtered = products.filter(p => p.category === cat);
            const grid = document.getElementById('grid');
            grid.innerHTML = filtered.map(p => `
                <div class="product-card" onclick="openProduct(${p.id})">
                    <img src="${p.img}">
                    <div class="product-info">
                        <div class="p-name">${p.name}</div>
                        <div class="p-price">${p.price} €</div>
                    </div>
                </div>
            `).join('');
        }

        function goBack() {
            document.getElementById('main-view').style.display = 'block';
            document.getElementById('products-view').style.display = 'none';
        }

        function openProduct(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('modal-body').innerHTML = `
                <img src="${p.img}" style="width:100%; border:1px solid var(--border);">
                <h2 style="font-family:'Cinzel'; color:var(--gold); margin-top:30px;">${p.name}</h2>
                <p style="font-weight:200; line-height:1.8; color:#ccc;">${p.desc}</p>
                <div style="font-size:24px; color:var(--gold); margin:30px 0;">${p.price} €</div>
                <button class="btn-buy" onclick="addToCart('${p.name}', ${p.price})">AJOUTER À LA SÉLECTION</button>
            `;
            document.getElementById('product-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('product-modal').style.display = 'none';
        }

        function addToCart(name, price) {
            tg.HapticFeedback.notificationOccurred('success');
            tg.MainButton.setText(`COMMANDER : ${name} (${price}€)`);
            tg.MainButton.show();
            tg.MainButton.setParams({ color: "#D4AF37", text_color: "#000000" });
            closeModal();
        }

        tg.onEvent('mainButtonClicked', () => {
            tg.showConfirm("Voulez-vous confirmer cette acquisition ?", (ok) => {
                if(ok) tg.close();
            });
        });

    </script>
</body>
</html>
