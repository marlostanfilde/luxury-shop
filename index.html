<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MAISON LUXE | HAUTE PERFORMANCE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A059; --black: #050505; --dark: #121212; --border: rgba(197, 160, 89, 0.2); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Montserrat', sans-serif; background: var(--black); color: white; margin: 0; padding-bottom: 140px; }

        /* HEADER */
        .header { padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Cinzel', serif; font-size: 26px; letter-spacing: 10px; color: var(--gold); margin: 0; }
        
        /* CATEGORIES */
        .nav-tabs { display: flex; overflow-x: auto; padding: 15px; gap: 20px; sticky; top: 0; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid var(--border); }
        .tab-btn { background: none; border: none; color: #666; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; white-space: nowrap; cursor: pointer; }
        .tab-btn.active { color: var(--gold); border-bottom: 1px solid var(--gold); }

        /* GRID */
        .container { padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: var(--dark); border: 1px solid var(--border); padding: 10px; text-align: center; transition: 0.3s; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 2px; }
        .p-brand { font-size: 8px; color: var(--gold); letter-spacing: 1px; margin-top: 10px; text-transform: uppercase; }
        .p-name { font-size: 10px; font-weight: 300; margin: 5px 0; height: 25px; overflow: hidden; }
        .p-price { font-size: 11px; font-weight: 700; }

        /* MODALE PRODUIT (ZOOM PHOTO) */
        .modal { position: fixed; inset: 0; background: var(--black); z-index: 2000; display: none; flex-direction: column; overflow-y: auto; }
        .modal.open { display: flex; }
        .modal-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-bottom: 1px solid var(--border); }
        .modal-info { padding: 30px; text-align: center; }
        .btn-add { background: var(--gold); color: black; border: none; padding: 20px; width: 100%; font-weight: 700; letter-spacing: 2px; cursor: pointer; margin-top: 20px; }

        /* PANIER VISUEL */
        .cart-box { margin: 20px 0; padding: 15px; border: 1px dashed var(--gold); background: #0a0a0a; display: none; }
        .cart-box.active { display: block; }
        .cart-item { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 8px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .del-btn { color: #ff4444; font-weight: bold; margin-left: 10px; }

        /* FOOTER & AVIS */
        .reviews { margin-top: 30px; padding: 15px; background: rgba(197, 160, 89, 0.05); font-size: 10px; border-radius: 5px; }
        .footer-nav { position: fixed; bottom: 0; width: 100%; background: #080808; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 15px; z-index: 1000; }
        .nav-link { color: #555; text-decoration: none; font-size: 8px; text-align: center; cursor: pointer; }
        .nav-link i { display: block; font-size: 18px; color: var(--gold); margin-bottom: 5px; font-style: normal; }
    </style>
</head>
<body>

    <header class="header">
        <h1 class="logo">MAISON LUXE</h1>
        <div id="user-tag" style="font-size: 9px; color: #444; margin-top: 10px; letter-spacing: 3px;">MEMBRE PRIVILÈGE</div>
    </header>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="filter('all', this)">Tous</button>
        <button class="tab-btn" onclick="filter('Horlogerie', this)">Horlogerie</button>
        <button class="tab-btn" onclick="filter('Maroquinerie', this)">Maroquinerie</button>
        <button class="tab-btn" onclick="filter('Joaillerie', this)">Joaillerie</button>
    </div>

    <div class="container">
        <div id="product-grid" class="grid"></div>

        <div id="cart-recap" class="cart-box">
            <h3 style="font-family:'Cinzel'; font-size:11px; color:var(--gold); margin-top:0;">VOTRE PANIER</h3>
            <div id="cart-list"></div>
            <div id="cart-total" style="text-align:right; font-weight:700; margin-top:10px; color:var(--gold);"></div>
        </div>

        <div class="reviews">
            <p><i>"Une expérience d'achat fluide. Ma Rolex est arrivée certifiée en 24h."</i> - Marc-Antoine.</p>
        </div>
    </div>

    <div class="footer-nav">
        <div class="nav-link" onclick="tg.openTelegramLink('https://t.me/ton_pseudo')"><i>👤</i>CONCIERGE</div>
        <div class="nav-link" onclick="tg.showAlert('Livraison sécurisée sous 24-48h par transporteur privé.')"><i>📦</i>DÉLAIS</div>
        <div class="nav-link" onclick="clearCart()"><i>🗑️</i>VIDER</div>
    </div>

    <div id="modal" class="modal">
        <img id="modal-img" src="" class="modal-img">
        <div class="modal-info">
            <div id="modal-brand" class="p-brand"></div>
            <h2 id="modal-name" style="font-family:'Cinzel'; color:var(--gold); margin:10px 0;"></h2>
            <div id="modal-price" style="font-size:20px; font-weight:700; margin-bottom:20px;"></div>
            <p style="font-size:12px; color:#888;">Certificat d'authenticité et écrin d'origine inclus.</p>
            <button id="add-to-cart-btn" class="btn-add">AJOUTER À LA SÉLECTION</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let cart = [];
        const products = [
            { id: 1, cat: "Horlogerie", brand: "Rolex", name: "Daytona Panda", price: 38500, img: "https://images.unsplash.com/photo-1523170335258-f5ed11844a49?w=800" },
            { id: 2, cat: "Maroquinerie", brand: "Hermès", name: "Sac Birkin 30", price: 22000, img: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=800" },
            { id: 3, cat: "Joaillerie", brand: "Cartier", name: "Bracelet Love Or", price: 7500, img: "https://images.unsplash.com/photo-1611591437281-460bfbe1220a?w=800" },
            { id: 4, cat: "Horlogerie", brand: "Patek Philippe", name: "Nautilus 5712", price: 98000, img: "https://images.unsplash.com/photo-1614164185128-e4ec99c436d7?w=800" }
        ];

        function render(cat = 'all') {
            const grid = document.getElementById('product-grid');
            const items = cat === 'all' ? products : products.filter(p => p.cat === cat);
            grid.innerHTML = items.map(p => `
                <div class="card" onclick="openProduct(${p.id})">
                    <img src="${p.img}">
                    <div class="p-brand">${p.brand}</div>
                    <div class="p-name">${p.name}</div>
                    <div class="p-price">${p.price.toLocaleString()} €</div>
                </div>
            `).join('');
        }

        function filter(cat, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render(cat);
        }

        function openProduct(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('modal-img').src = p.img;
            document.getElementById('modal-brand').innerText = p.brand;
            document.getElementById('modal-name').innerText = p.name;
            document.getElementById('modal-price').innerText = p.price.toLocaleString() + " €";
            
            document.getElementById('add-to-cart-btn').onclick = () => {
                cart.push({...p, uid: Date.now()});
                tg.HapticFeedback.notificationOccurred('success');
                closeModal();
                updateUI();
            };
            
            document.getElementById('modal').classList.add('open');
            tg.BackButton.show();
        }

        function closeModal() { document.getElementById('modal').classList.remove('open'); tg.BackButton.hide(); }
        tg.onEvent('backButtonClicked', closeModal);

        function remove(uid) {
            cart = cart.filter(i => i.uid !== uid);
            updateUI();
        }

        function updateUI() {
            const recap = document.getElementById('cart-recap');
            const list = document.getElementById('cart-list');
            const totalTxt = document.getElementById('cart-total');
            
            if(cart.length > 0) {
                recap.classList.add('active');
                list.innerHTML = cart.map(i => `
                    <div class="cart-item">
                        <span>${i.brand} - ${i.name}</span>
                        <span>${i.price.toLocaleString()}€ <span class="del-btn" onclick="remove(${i.uid})">✕</span></span>
                    </div>
                `).join('');
                const total = cart.reduce((s, i) => s + i.price, 0);
                totalTxt.innerText = "TOTAL : " + total.toLocaleString() + " €";
                
                tg.MainButton.setText(`VALIDER L'ACQUISITION (${total.toLocaleString()} €)`);
                tg.MainButton.show();
            } else {
                recap.classList.remove('active');
                tg.MainButton.hide();
            }
        }

        function clearCart() { cart = []; updateUI(); tg.showAlert('Panier vidé.'); }

        // --- ENVOI DE LA COMMANDE AU BOT ---
        tg.onEvent('mainButtonClicked', () => {
            const total = cart.reduce((s, i) => s + i.price, 0);
            const data = {
                client: tg.initDataUnsafe?.user?.first_name || "Client Privé",
                panier: cart.map(i => `${i.brand} ${i.name} (${i.price.toLocaleString()}€)`),
                total: total.toLocaleString() + " €",
                raw_total: total
            };

            // Envoi des données complètes au Bot
            tg.sendData(JSON.stringify(data));
        });

        if(tg.initDataUnsafe?.user) {
            document.getElementById('user-tag').innerText = `BIENVENUE, ${tg.initDataUnsafe.user.first_name.toUpperCase()}`;
        }
        render();
    </script>
</body>
</html>
