<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUXURY SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --gold: #c5a059; 
            --bg-top: #2c2c2c; 
            --bg-bottom: #0f0f0f;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-white: #ffffff;
        }
        
        body { 
            font-family: 'Georgia', serif; 
            margin: 0; padding: 15px; 
            background: radial-gradient(circle at top, var(--bg-top) 0%, var(--bg-bottom) 70%);
            background-attachment: fixed;
            color: var(--text-white); 
            padding-bottom: 100px;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease forwards; }

        .header { text-align: center; padding: 20px 0 10px 0; }
        .logo { font-size: 28px; letter-spacing: 5px; color: var(--gold); margin: 0; font-weight: bold; text-transform: uppercase; }
        .slogan { font-size: 10px; letter-spacing: 3px; color: #888; text-transform: uppercase; margin-top: 5px; }

        .search-box { 
            margin: 20px auto; background: rgba(255,255,255,0.07); border-radius: 12px; 
            display: flex; align-items: center; padding: 12px; border: 1px solid rgba(197, 160, 89, 0.2);
        }
        #search-input { background: none; border: none; color: white; width: 100%; outline: none; font-size: 15px; }

        #categories-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .cat-card { 
            position: relative; height: 160px; border-radius: 12px; overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer;
        }
        .cat-card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); transition: 0.3s; }
        .cat-card:active img { transform: scale(1.1); }
        .cat-title { 
            position: absolute; bottom: 0; left: 0; right: 0; padding: 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9)); text-align: center; 
            font-size: 11px; font-weight: bold; letter-spacing: 1px; color: var(--gold);
        }

        #grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-card { 
            background: var(--card-bg); border-radius: 12px; padding: 10px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1); position: relative;
        }
        .product-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; }
        .badge { 
            position: absolute; top: -5px; right: -5px; background: var(--gold); color: black; 
            border-radius: 50%; width: 22px; height: 22px; font-size: 11px; font-weight: bold;
            display: flex; align-items: center; justify-content: center; border: 2px solid #1a1a1a; 
        }

        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0f0f0f; z-index: 9999; padding: 20px; display: none; flex-direction: column; }
        .modal.open { display: flex; animation: fadeIn 0.3s ease; }
        
        .btn-gold { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; margin-top: 15px; }
        .size-opt { border: 1px solid #444; padding: 8px; border-radius: 5px; cursor: pointer; flex: 1; text-align: center; }
        .selected-size { background: var(--gold); color: black; border-color: var(--gold); }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="logo">Luxury Shop</h1>
        <div class="slogan">L'Excellence à votre portée</div>
    </div>

    <div id="home-page" class="fade-in">
        <div class="search-box">
            <span style="margin-right: 10px; opacity: 0.6;">🔍</span>
            <input type="text" id="search-input" placeholder="Rechercher un modèle..." oninput="handleSearch(this.value)">
        </div>

        <div id="categories-menu">
            <div class="cat-card" onclick="showCategory('Habille')">
                <img src="https://images.unsplash.com/photo-1441984904996-e0b6ba687e04?w=400">
                <div class="cat-title">PRÊT-À-PORTER</div>
            </div>
            <div class="cat-card" onclick="showCategory('Accessoire')">
                <img src="https://images.unsplash.com/photo-1547949003-9792a18a2601?w=400">
                <div class="cat-title">ACCESSOIRES</div>
            </div>
            <div class="cat-card" onclick="showCategory('Parfum')">
                <img src="https://images.unsplash.com/photo-1541643600914-78b084683601?w=400">
                <div class="cat-title">PARFUMS</div>
            </div>
            <div class="cat-card" onclick="showCategory('Chaussures')">
                <img src="https://images.unsplash.com/photo-1549298916-b41d501d3772?w=400">
                <div class="cat-title">CHAUSSURES</div>
            </div>
        </div>
    </div>

    <div id="products-section" style="display:none;" class="fade-in">
        <h3 id="category-label" style="text-align:center; color: var(--gold); letter-spacing: 2px;"></h3>
        <div id="grid"></div>
    </div>

    <div id="product-modal" class="modal">
        <div id="product-detail-content" style="overflow-y:auto; flex-grow:1;"></div>
    </div>

    <div id="cart-modal" class="modal">
        <h3 style="color:var(--gold); border-bottom: 1px solid #333; padding-bottom:10px;">VOTRE PANIER</h3>
        <div id="cart-content" style="flex-grow:1; overflow-y:auto;"></div>
        <div id="cart-total" style="padding: 15px 0; font-size: 18px; font-weight: bold; border-top: 1px solid #333;">
            Total: <span id="total-price" style="color:var(--gold)">0</span> €
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const products = [
            { id: 1, category: "Habille", name: "Veste Laine Italienne", price: 280, desc: "Coupe ajustée, laine vierge.", img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=400", sizes: ["S", "M", "L"] },
            { id: 2, category: "Accessoire", name: "Sac Cuir Noir", price: 450, desc: "Finition or, cuir pleine fleur.", img: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=400" },
            { id: 3, category: "Parfum", name: "Éclat d'Ambre", price: 115, desc: "Notes de tête : Bergamote.", img: "https://images.unsplash.com/photo-1523293182086-7651a899d37f?w=400" },
            { id: 4, category: "Chaussures", name: "Derbies Vernis", price: 320, desc: "Élégance intemporelle.", img: "https://images.unsplash.com/photo-1549298916-b41d501d3772?w=400" }
        ];

        let cart = [];
        let currentCategory = null;
        let tempSelectedSize = null;

        // Configuration Initiale
        tg.MainButton.setParams({ color: '#c5a059', text_color: '#000000' });
        tg.SecondaryButton.setParams({ text: "CONTACT SAV", is_visible: true, color: "#1a1a1a", text_color: "#c5a059" });

        function showCategory(cat) {
            currentCategory = cat;
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('products-section').style.display = 'block';
            document.getElementById('category-label').innerText = cat === 'Habille' ? 'PRÊT-À-PORTER' : cat.toUpperCase();
            renderGrid(products.filter(p => p.category === cat));
            tg.BackButton.show();
        }

        function handleSearch(query) {
            if(!query) {
                if(currentCategory) showCategory(currentCategory);
                else {
                    document.getElementById('products-section').style.display = 'none';
                    document.getElementById('home-page').style.display = 'block';
                }
                return;
            }
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('products-section').style.display = 'block';
            document.getElementById('category-label').innerText = "RÉSULTATS";
            const filtered = products.filter(p => p.name.toLowerCase().includes(query.toLowerCase()));
            renderGrid(filtered);
            tg.BackButton.show();
        }

        function renderGrid(data) {
            const grid = document.getElementById('grid');
            grid.innerHTML = data.map(p => {
                const count = cart.filter(i => i.id === p.id).reduce((s, i) => s + i.qty, 0);
                return `
                <div class="product-card" onclick="openProduct(${p.id})">
                    ${count > 0 ? `<div class="badge">${count}</div>` : ''}
                    <img src="${p.img}">
                    <div style="margin:8px 0 3px 0; font-size:13px; font-weight:bold;">${p.name}</div>
                    <div style="color:var(--gold); font-size:14px;">${p.price} €</div>
                </div>`;
            }).join('');
        }

        function openProduct(id) {
            const p = products.find(i => i.id === id);
            tempSelectedSize = null;
            let sizeHtml = p.sizes ? `<div style="display:flex; gap:10px; margin:15px 0;">${p.sizes.map(
