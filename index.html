<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ma Boutique Telegram</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary-color: #c5a059;
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            -webkit-user-select: none;
        }
        h2 { text-align: center; font-weight: 300; }
        
        /* Grille de produits */
        #grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 80px;
        }
        .card {
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            background: #fff;
        }
        .img-container img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
        }
        .price { font-weight: bold; color: var(--primary-color); display: block; margin: 8px 0; }
        
        /* Boutons */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 40px;
        }
        .btn-action {
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 18px;
            cursor: pointer;
        }

        /* Panier (Modal) */
        #cart-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: white;
            z-index: 100;
            padding: 20px;
            display: none; /* Caché par défaut */
            flex-direction: column;
        }
        #cart-modal.open { display: flex; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .total-section {
            margin-top: auto;
            padding: 20px 0;
            font-size: 1.2em;
            font-weight: bold;
            text-align: right;
        }
    </style>
</head>
<body>

    <h2>Collection Signature</h2>
    <div id="grid">
        </div>

    <div id="cart-modal">
        <h3>Votre Panier</h3>
        <div id="cart-content"></div>
        <div class="total-section">
            Total: <span id="total-price">0</span> €
        </div>
        <p style="font-size: 12px; color: #888; text-align: center;">
            Appuyez sur le bouton principal pour commander
        </p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.setParams({ color: '#c5a059', text_color: '#ffffff' });

        const products = [
            { id: 1, name: "Veste Signature", price: 280, img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=500" },
            { id: 2, name: "Chemise Lin", price: 120, img: "https://images.unsplash.com/photo-1598033129183-c4f50c717658?w=500" },
            { id: 3, name: "Sac Cuir", price: 450, img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=500" },
            { id: 4, name: "Lunettes", price: 320, img: "https://images.unsplash.com/photo-1511499767390-90342f54b207?w=500" }
        ];

        let cart = {};

        // 1. Initialisation : On crée le HTML des produits UNE SEULE FOIS
        function initialRender() {
            const grid = document.getElementById('grid');
            grid.innerHTML = products.map(p => `
                <div class="card">
                    <div class="img-container"><img src="${p.img}" loading="lazy"></div>
                    <h3 style="font-size: 14px;">${p.name}</h3>
                    <span class="price">${p.price} €</span>
                    <div class="controls" id="controls-${p.id}">
                        <button class="btn-action" onclick="updateCart(${p.id}, 1)">+</button>
                    </div>
                </div>
            `).join('');
        }

        // 2. Mise à jour du panier (sans recharger toute la page)
        function updateCart(id, delta) {
            cart[id] = (cart[id] || 0) + delta;
            if (cart[id] <= 0) delete cart[id];
            
            // On met à jour uniquement les boutons de la carte concernée
            const controlDiv = document.getElementById(`controls-${id}`);
            const count = cart[id] || 0;
            
            controlDiv.innerHTML = `
                ${count > 0 ? `<button class="btn-action" onclick="updateCart(${id}, -1)">-</button><span style="font-weight:600; margin: 0 10px;">${count}</span>` : ''}
                <button class="btn-action" onclick="updateCart(${id}, 1)">+</button>
            `;

            updateInterface();
            updateCartModal();
        }

        // 3. Bouton principal Telegram
        function updateInterface() {
            const count = Object.values(cart).reduce((a, b) => a + b, 0);
            if (count > 0) {
                tg.MainButton.setText(`VOIR LE PANIER (${count})`);
                tg.MainButton.show();
            } else {
                tg.MainButton.hide();
            }
        }

        // 4. Contenu de la fenêtre Panier
        function updateCartModal() {
            const content = document.getElementById('cart-content');
            let total = 0;
            let html = "";
            products.forEach(p => {
                if (cart[p.id]) {
                    const subtotal = p.price * cart[id = p.id];
                    total += subtotal;
                    html += `<div class="cart-item"><span>${p.name} (x${cart[p.id]})</span><span>${subtotal} €</span></div>`;
                }
            });
            content.innerHTML = html || "<p>Votre panier est vide</p>";
            document.getElementById('total-price').innerText = total;
        }

        function openCart() {
            document.getElementById('cart-modal').classList.add('open');
            tg.MainButton.setText("VALIDER LA COMMANDE");
            tg.BackButton.show(); 
        }

        function closeCart() {
            document.getElementById('cart-modal').classList.remove('open');
            tg.BackButton.hide();
            updateInterface();
        }

        // 5. Événements Telegram
        tg.onEvent('mainButtonClicked', function() {
            const modal = document.getElementById('cart-modal');
            if (!modal.classList.contains('open')) {
                openCart();
            } else {
                // Envoyer les données au bot et fermer
                tg.sendData(JSON.stringify({cart: cart}));
            }
        });

        tg.onEvent('backButtonClicked', function() {
            closeCart();
        });

        // Sécurité : On attend que le DOM soit prêt
        window.onload = initialRender;
    </script>
</body>
</html>
