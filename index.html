<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUXURY 31</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --gold: #c5a059; 
            --dark-bg: #1a1a1a; 
            --card-bg: #262626;
            --text-white: #ffffff;
            --text-gold: #d4af37;
        }
        
        body { 
            font-family: 'Georgia', serif; 
            margin: 0; padding: 15px; 
            background: var(--dark-bg); 
            color: var(--text-white); 
            padding-bottom: 100px;
        }

        /* HEADER & LOGO */
        .header { text-align: center; padding: 20px 0; border-bottom: 1px solid rgba(197, 160, 89, 0.2); }
        .logo { font-size: 28px; letter-spacing: 4px; color: var(--gold); margin: 0; font-weight: bold; }
        .slogan { font-size: 12px; letter-spacing: 2px; color: var(--text-gold); text-transform: uppercase; margin-top: 5px; }

        /* BIENVENUE & RECHERCHE */
        .welcome-area { text-align: center; margin-top: 25px; }
        #welcome-name { font-weight: bold; color: var(--gold); }
        
        .search-box { 
            margin: 20px 0; background: #333; border-radius: 8px; 
            display: flex; align-items: center; padding: 10px; border: 1px solid #444;
        }
        #search-input { 
            background: none; border: none; color: white; width: 100%; outline: none; font-size: 14px;
        }

        /* MENU DES RUBRIQUES */
        #categories-menu { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; 
        }
        .cat-card { 
            position: relative; height: 160px; border-radius: 12px; overflow: hidden;
            border: 1px solid rgba(197, 160, 89, 0.3); cursor: pointer;
        }
        .cat-card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }
        .cat-title { 
            position: absolute; bottom: 0; left: 0; right: 0; padding: 10px;
            background: rgba(0,0,0,0.6); text-align: center; font-size: 14px;
            font-weight: bold; letter-spacing: 1px; color: var(--gold);
        }

        /* GRILLE PRODUITS (Cachée) */
        #products-section { display: none; }
        #grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-card { 
            background: var(--card-bg); border-radius: 10px; padding: 10px; text-align: center;
            border: 1px solid #333; position: relative;
        }
        .product-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 6px; }
        .badge { 
            position: absolute; top: -5px; right: -5px; background: #ff4444; 
            color: white; border-radius: 50%; width: 22px; height: 22px; 
            font-size: 12px; display: flex; align-items: center; justify-content: center;
        }

        /* MODALES */
        .modal { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: var(--dark-bg); z-index: 9999; padding: 20px; 
            display: none; flex-direction: column; 
        }
        .modal.open { display: flex; }
        .size-box { display: flex; gap: 10px; margin: 15px 0; justify-content: center; }
        .size-opt { 
            border: 1px solid var(--gold); padding: 8px 12px; border-radius: 5px; 
            color: white; background: #333; cursor: pointer;
        }
        .size-opt.active { background: var(--gold); font-weight: bold; }

        .btn-gold { 
            background: var(--gold); color: white; border: none; padding: 12px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
        
        .cart-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="logo">LUXURY 31</h1>
        <div class="slogan">L'Art du Luxe</div>
    </div>

    <div id="home-page">
        <div class="welcome-area">
            <h2 style="font-weight: 300;">Bienvenue chez <span id="welcome-name">Invité</span></h2>
            <p style="color: #999; font-size: 13px;">Découvrez nos pièces exclusives.</p>
        </div>

        <div class="search-box">
            <span style="margin-right: 10px;">🔍</span>
            <input type="text" id="search-input" placeholder="Rechercher un modèle..." oninput="filterProducts()">
        </div>

        <div id="categories-menu">
            <div class="cat-card" onclick="showCategory('Habille')">
                <img src="https://images.unsplash.com/photo-1594932224030-94042867f0f7?w=400">
                <div class="cat-title">PRÊT-À-PORTER</div>
            </div>
            <div class="cat-card" onclick="showCategory('Accessoire')">
                <img src="https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=400">
                <div class="cat-title">ACCESSOIRES</div>
            </div>
            <div class="cat-card" onclick="showCategory('Montre')">
                <img src="https://images.unsplash.com/photo-1524592094713-9487cc757a04?w=400">
                <div class="cat-title">HORLOGERIE</div>
            </div>
            <div class="cat-card" onclick="showCategory('Voyage')">
                <img src="https://images.unsplash.com/photo-1547949003-9792a18a2601?w=400">
                <div class="cat-title">SACS VOYAGE</div>
            </div>
        </div>
    </div>

    <div id="products-section">
        <div style="display:flex; align-items:center; gap:10px; margin: 20px 0;">
            <button onclick="goBack()" style="background:none; border:none; color:var(--gold); font-size:16px; cursor:pointer;">← Retour</button>
            <h3 id="category-label" style="margin:0; text-transform: uppercase; letter-spacing: 2px;"></h3>
        </div>
        <div id="grid"></div>
    </div>

    <div id="cart-modal" class="modal">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 style="color:var(--gold)">MON PANIER</h3>
            <span onclick="closeAll()" style="font-size:30px; cursor:pointer;">✕</span>
        </div>
        <div id="cart-content" style="flex-grow:1; overflow-y:auto; margin-top:20px;"></div>
        <div style="font-size:1.3em; padding:20px 0; border-top:1px solid var(--gold);">
            Total : <span id="total-price" style="color:var(--gold)">0</span> €
        </div>
    </div>

    <div id="product-modal" class="modal">
        <span onclick="closeAll()" style="align-self:flex-end; font-size:30px; cursor:pointer;">✕</span>
        <div id="product-detail-content"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const user = tg.initDataUnsafe?.user;
        if (user?.first_name) document.getElementById('welcome-name').innerText = user.first_name;

        tg.MainButton.setParams({ color: '#c5a059', text_color: '#ffffff' });
        tg.SecondaryButton.setParams({ text: "💬 CONTACT SAV", is_visible: true, color: "#222222" });

        const products = [
            { id: 1, category: "Habille", name: "Veste Luxe", price: 280, desc: "Laine italienne premium.", img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=400", sizes: ["S", "M", "L", "XL"] },
            { id: 2, category: "Habille", name: "Chemise Été", price: 120, desc: "Lin naturel respirant.", img: "https://images.unsplash.com/photo-1598033129183-c4f50c717658?w=400", sizes: ["M", "L", "XL"] },
            { id: 3, category: "Accessoire", name: "Sac à main", price: 450, desc: "Cuir véritable fait main.", img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=400" },
            { id: 4, category: "Montre", name: "Montre Or", price: 890, desc: "Automatique précision.", img: "https://images.unsplash.com/photo-1524592094713-9487cc757a04?w=400" }
        ];

        let cart = [];
        let selectedSize = null;

        function showCategory(cat) {
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('products-section').style.display = 'block';
            document.getElementById('category-label').innerText = cat;
            renderGrid(products.filter(p => p.category === cat));
            tg.BackButton.show();
        }

        function goBack() {
            document.getElementById('home-page').style.display = 'block';
            document.getElementById('products-section').style.display = 'none';
            tg.BackButton.hide();
        }

        function renderGrid(data) {
            const grid = document.getElementById('grid');
            grid.innerHTML = data.map(p => {
                const qte = cart.filter(item => item.id === p.id).reduce((s, i) => s + i.qty, 0);
                return `
                <div class="product-card" onclick="openProduct(${p.id})">
                    ${qte > 0 ? `<div class="badge">${qte}</div>` : ''}
                    <img src="${p.img}">
                    <div style="margin:10px 0; font-weight:bold;">${p.name}</div>
                    <div style="color:var(--gold);">${p.price} €</div>
                </div>`;
            }).join('');
        }

        function openProduct(id) {
            const p = products.find(i => i.id === id);
            selectedSize = null;
            let sizeHtml = p.sizes ? `<div class="size-box">${p.sizes.map(s => `<div class="size-opt" onclick="selectSize(this, '${s}')">${s}</div>`).join('')}</div>` : "";

            document.getElementById('product-detail-content').innerHTML = `
                <img src="${p.img}" style="width:100%; border-radius:10px; height:250px; object-fit:cover; border:1px solid var(--gold);">
                <h2 style="color:var(--gold); margin-top:20px;">${p.name}</h2>
                <p style="color:#ccc; font-size:14px;">${p.desc}</p>
                <div style="font-size:24px; color:var(--gold); margin-bottom:15px;">${p.price} €</div>
                ${sizeHtml}
                <button onclick="addToCart(${p.id})" class="btn-gold" style="width:100%">Ajouter au panier</button>
            `;
            document.getElementById('product-modal').classList.add('open');
        }

        function selectSize(el, size) {
            document.querySelectorAll('.size-opt').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            selectedSize = size;
        }

        function addToCart(id) {
            const p = products.find(i => i.id === id);
            if (p.sizes && !selectedSize) { tg.showAlert("Sélectionnez une taille"); return; }
            const existing = cart.find(item => item.id === id && item.size === selectedSize);
            if (existing) { existing.qty++; } else { cart.push({ ...p, size: selectedSize, qty: 1 }); }
            tg.HapticFeedback.notificationOccurred('success');
            closeAll();
            updateInterface();
        }

        function updateCartModal() {
            let total = 0;
            let html = cart.length ? "" : "<p style='text-align:center;'>Votre panier est vide</p>";
            cart.forEach((item, index) => {
                total += item.price * item.qty;
                html += `
                <div class="cart-item">
                    <img src="${item.img}" style="width:50px; border-radius:5px;">
                    <div style="flex-grow:1">
                        <div style="font-weight:bold;">${item.name} ${item.size ? `[${item.size}]` : ''}</div>
                        <div style="color:var(--gold)">${item.price}€ x ${item.qty}</div>
                    </div>
                    <button onclick="removeItem(${index})" style="background:none; border:none; color:#ff4444;">✕</button>
                </div>`;
            });
            document.getElementById('cart-content').innerHTML = html;
            document.getElementById('total-price').innerText = total;
            tg.MainButton.setText(`VALIDER LA COMMANDE (${total}€)`);
        }

        function removeItem(i) { cart.splice(i, 1); updateCartModal(); updateInterface(); }

        function updateInterface() {
            const count = cart.reduce((s, i) => s + i.qty, 0);
            if (count > 0) tg.MainButton.show(); else tg.MainButton.hide();
            if (!document.getElementById('cart-modal').classList.contains('open')) {
                tg.MainButton.setText(`VOIR LE PANIER (${count})`);
            }
        }

        function closeAll() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
            updateInterface();
        }

        tg.onEvent('mainButtonClicked', () => {
            if (!document.getElementById('cart-modal').classList.contains('open')) {
                document.getElementById('cart-modal').classList.add('open');
                updateCartModal();
            } else {
                tg.showConfirm("Envoyer la commande ?", ok => ok && tg.sendData(JSON.stringify(cart)));
            }
        });

        tg.onEvent('secondaryButtonClicked', () => tg.openTelegramLink("https://t.me/toulouse315"));
        tg.onEvent('backButtonClicked', goBack);
    </script>
</body>
</html>
