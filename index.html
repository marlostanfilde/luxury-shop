<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Boutique Officielle</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --primary: #c5a059; 
            --bg: var(--tg-theme-bg_color, #ffffff); 
            --text: var(--tg-theme-text-color, #222); 
            --sec-bg: var(--tg-theme-secondary_bg_color, #f4f4f4);
        }
        
        body { font-family: sans-serif; margin: 0; padding: 15px; background: var(--bg); color: var(--text); padding-bottom: 120px; }
        
        #grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .card { background: var(--sec-bg); border-radius: 12px; padding: 10px; text-align: center; position: relative; border: 1px solid rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 110px; object-fit: cover; border-radius: 8px; cursor: pointer; }
        
        .badge { position: absolute; top: 5px; right: 5px; background: #ff4444; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 5; }
        
        .btn-add { background: var(--primary); color: white; border: none; border-radius: 6px; width: 100%; padding: 8px; margin-top: 8px; font-weight: bold; cursor: pointer; }

        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 9999; padding: 20px; display: none; flex-direction: column; overflow-y: auto; }
        .modal.open { display: flex; }
        
        .cart-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.1); gap: 10px; }
        .cart-img { width: 50px; height: 50px; border-radius: 5px; object-fit: cover; }
        .cart-info { flex-grow: 1; text-align: left; }
        
        .cart-controls { display: flex; align-items: center; gap: 8px; }
        .btn-qty { background: #333; color: #fff; border: none; border-radius: 4px; width: 28px; height: 28px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h2 style="text-align:center; font-weight:300;">Ma Boutique</h2>
    <div id="grid"></div>

    <div id="cart-modal" class="modal">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>Mon Panier</h3>
            <span onclick="closeAll()" style="font-size:30px; cursor:pointer;">✕</span>
        </div>
        <div id="cart-content" style="flex-grow:1;"></div>
        <div style="font-size:1.2em; font-weight:bold; padding-top:10px; border-top: 2px solid var(--primary);">
            TOTAL : <span id="total-price">0</span> €
        </div>
    </div>

    <div id="product-modal" class="modal">
        <div style="display:flex; justify-content:flex-end;">
            <span onclick="closeAll()" style="font-size:30px; cursor:pointer;">✕</span>
        </div>
        <div id="product-detail-content"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        tg.MainButton.setParams({ color: '#c5a059' });
        tg.SecondaryButton.setParams({ text: "💬 CONTACT SAV", is_visible: true, color: "#222" });

        const products = [
            { id: 1, name: "Veste Luxe", price: 280, desc: "Laine italienne, coupe ajustée.", img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=300" },
            { id: 2, name: "Chemise Été", price: 120, desc: "Lin naturel respirant.", img: "https://images.unsplash.com/photo-1598033129183-c4f50c717658?w=300" },
            { id: 3, name: "Sac Voyage", price: 450, desc: "Cuir fait main.", img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=300" },
            { id: 4, name: "Montre Or", price: 890, desc: "Mouvement automatique.", img: "https://images.unsplash.com/photo-1524592094713-9487cc757a04?w=300" }
        ];

        let cart = {};

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = products.map(p => {
                const qte = cart[p.id] || 0;
                return `
                <div class="card">
                    ${qte > 0 ? `<div class="badge">${qte}</div>` : ''}
                    <img src="${p.img}" onclick="openProduct(${p.id})">
                    <div style="margin:5px 0; font-weight:bold; font-size:14px;">${p.name}</div>
                    <div style="color:var(--primary); font-weight:bold;">${p.price} €</div>
                    <button class="btn-add" onclick="updateCart(${p.id}, 1)">AJOUTER</button>
                </div>`;
            }).join('');
        }

        function updateCart(id, delta) {
            tg.HapticFeedback.impactOccurred('medium');
            cart[id] = (cart[id] || 0) + delta;
            if (cart[id] <= 0) delete cart[id];
            renderGrid();
            updateInterface();
            if (document.getElementById('cart-modal').classList.contains('open')) updateCartModal();
        }

        function openProduct(id) {
            const p = products.find(i => i.id === id);
            document.getElementById('product-detail-content').innerHTML = `
                <img src="${p.img}" style="width:100%; border-radius:10px;">
                <h2>${p.name}</h2>
                <p>${p.desc}</p>
                <div style="font-size:20px; font-weight:bold; color:var(--primary);">${p.price} €</div>
                <button onclick="updateCart(${p.id}, 1); closeAll();" style="width:100%; background:var(--primary); color:white; border:none; padding:15px; border-radius:10px; margin-top:15px; font-weight:bold;">AJOUTER</button>
            `;
            document.getElementById('product-modal').classList.add('open');
            tg.BackButton.show();
        }

        function updateInterface() {
            const count = Object.values(cart).reduce((a, b) => a + b, 0);
            if (count > 0) {
                const isCart = document.getElementById('cart-modal').classList.contains('open');
                tg.MainButton.setText(isCart ? "COMMANDER" : "VOIR PANIER (" + count + ")");
                tg.MainButton.show();
            } else { tg.MainButton.hide(); }
        }

        function updateCartModal() {
            let total = 0; let html = "";
            products.forEach(p => {
                if (cart[p.id]) {
                    const qte = cart[p.id];
                    const st = p.price * qte;
                    total += st;
                    html += `
                    <div class="cart-item">
                        <img src="${p.img}" class="cart-img">
                        <div class="cart-info">
                            <b>${p.name}</b><br>
                            <small>${p.price}€ x ${qte} = ${st}€</small>
                        </div>
                        <div class="cart-controls">
                            <button class="btn-qty" onclick="updateCart(${p.id}, -1)">-</button>
                            <b>${qte}</b>
                            <button class="btn-qty" onclick="updateCart(${p.id}, 1)">+</button>
                        </div>
                    </div>`;
                }
            });
            document.getElementById('cart-content').innerHTML = html || "Vide";
            document.getElementById('total-price').innerText = total;
        }

        function closeAll() {
            document.getElementById('cart-modal').classList.remove('open');
            document.getElementById('product-modal').classList.remove('open');
            tg.BackButton.hide();
            updateInterface();
        }

        tg.onEvent('mainButtonClicked', () => {
            if (!document.getElementById('cart-modal').classList.contains('open')) {
                document.getElementById('cart-modal').classList.add('open');
                tg.BackButton.show();
                updateCartModal();
                updateInterface();
            } else {
                tg.showConfirm("Envoyer la commande ?", (ok) => {
                    if (ok) { tg.sendData(JSON.stringify(cart)); }
                });
            }
        });

        tg.onEvent('secondaryButtonClicked', () => {
            tg.openTelegramLink("https://t.me/toulouse315");
        });

        tg.onEvent('backButtonClicked', closeAll);
        window.onload = renderGrid;
    </script>
</body>
</html>
