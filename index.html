<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luxury Shop Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c5a059; /* Or Sablé */
            --bg: #ffffff;
            --secondary-bg: #f9f9f9;
            --text: #1a1a1a;
            --btn-bg: #1a1a1a;
            --btn-text: #ffffff;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0; padding-bottom: 100px;
        }

        /* HEADER & LOGO */
        .header { padding: 40px 20px; text-align: center; background: #fff; }
        .logo-box { border: 2px solid var(--text); display: inline-block; padding: 10px 25px; }
        .logo-box h1 { 
            font-family: 'Playfair Display', serif; 
            margin: 0; font-size: 26px; letter-spacing: 5px; text-transform: uppercase; 
        }
        .header p { font-size: 10px; letter-spacing: 4px; color: var(--primary); font-weight: 600; margin-top: 5px; }

        /* GRILLE DE PRODUITS */
        .container { padding: 0 15px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: var(--bg); text-align: center; }
        .img-container { background: var(--secondary-bg); aspect-ratio: 3/4; overflow: hidden; margin-bottom: 12px; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card h3 { font-size: 12px; font-weight: 400; text-transform: uppercase; margin: 10px 0 5px; }
        .price { font-weight: 600; color: var(--primary); display: block; margin-bottom: 12px; }

        /* CONTRÔLES */
        .controls { display: flex; justify-content: center; align-items: center; gap: 15px; }
        .btn-action { 
            background: var(--btn-bg); color: var(--btn-text); border: none;
            width: 32px; height: 32px; border-radius: 50%; font-weight: bold; font-size: 18px;
        }

        /* PANIER MODAL */
        #cart-modal {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 75%;
            background: var(--bg); border-top: 2px solid var(--primary);
            border-radius: 25px 25px 0 0; transition: 0.4s ease-out; z-index: 100;
            padding: 25px; box-sizing: border-box; box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
        }
        #cart-modal.open { bottom: 0; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }

        /* SAV */
        .sav-section { margin-top: 50px; text-align: center; padding: 30px 15px; background: var(--secondary-bg); }
        .sav-link { 
            color: #fff; text-decoration: none; font-weight: bold; background: #0088cc; 
            padding: 12px 30px; border-radius: 50px; display: inline-block; font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-box"><h1>LUXURY</h1></div>
        <p>Est. 2026 • Paris</p>
    </div>

    <div class="container">
        <div class="product-grid" id="grid"></div>
    </div>

    <div id="cart-modal">
        <h2 style="font-family: 'Playfair Display', serif; border-bottom: 2px solid var(--primary); display: inline-block;">Mon Panier</h2>
        <div id="cart-content" style="margin-top: 20px;"></div>
        <div style="display: flex; justify-content: space-between; font-weight: 600; font-size: 20px; margin-top: 25px; color: var(--primary);">
            <span>TOTAL :</span>
            <span id="total-price">0 €</span>
        </div>
        <button onclick="closeCart()" style="width: 100%; padding: 15px; margin-top: 25px; background: #eee; border: none; border-radius: 8px; font-weight: 600;">RETOUR À LA BOUTIQUE</button>
    </div>

    <div class="sav-section">
        <a href="https://t.me/TON_PSEUDO" class="sav-link">ASSISTANCE TELEGRAM</a>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.setParams({ color: '#1a1a1a', text_color: '#ffffff' });

        const products = [
            { id: 1, name: "Veste Signature", price: 280, img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=500" },
            { id: 2, name: "Chemise Lin", price: 120, img: "https://images.unsplash.com/photo-1598033129183-c4f50c717658?w=500" },
            { id: 3, name: "Sac Cuir", price: 450, img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=500" },
            { id: 4, name: "Lunettes", price: 320, img: "https://images.unsplash.com/photo-1511499767390-90342f54b207?w=500" }
        ];

        let cart = {};

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = products.map(p => `
                <div class="card">
                    <div class="img-container"><img src="${p.img}"></div>
                    <h3>${p.name}</h3>
                    <span class="price">${p.price} €</span>
                    <div class="controls">
                        ${cart[p.id] ? `<button class="btn-action" onclick="updateCart(${p.id}, -1)">-</button><span style="font-weight:600">${cart[p.id]}</span>` : ''}
                        <button class="btn-action" onclick="updateCart(${p.id}, 1)">+</button>
                    </div>
                </div>
            `).join('');
            updateMainButton();
        }

        function updateCart(id, delta) {
            cart[id] = (cart[id] || 0) + delta;
            if (cart[id] <= 0) delete cart[id];
            render();
            updateCartModal();
        }

        function updateMainButton() {
            const count = Object.values(cart).reduce((a, b) => a + b, 0);
            if (count > 0) {
                tg.MainButton.setText(`VOIR LE PANIER (${count})`);
                tg.MainButton.show();
            } else {
                tg.MainButton.hide();
            }
        }

        function updateCartModal() {
            const content = document.getElementById('cart-content');
            let total = 0;
            let html = "";
            products.forEach(p => {
                if (cart[p.id]) {
                    const subtotal = p.price * cart[p.id];
                    total += subtotal;
                    html += `<div class="cart-item"><span>${p.name} (x${cart[p.id]})</span><span>${subtotal} €</span></div>`;
                }
            });
            content.innerHTML = html || "<p>Votre panier est vide</p>";
            document.getElementById('total-price').innerText = total + " €";
        }

        function closeCart() {
            document.getElementById('cart-modal').classList.remove('open');
            updateMainButton();
        }

        tg.onEvent('mainButtonClicked', function() {
            const modal = document.getElementById('cart-modal');
            if (!modal.classList.contains('open')) {
                modal.classList.add('open');
                tg.MainButton.setText("CONFIRMER ET PAYER");
            } else {
                tg.sendData(JSON.stringify({panier: cart, total: document.getElementById('total-price').innerText}));
            }
        });

        render();
    </script>
</body>
</html>
