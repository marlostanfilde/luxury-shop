<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUXURY SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --gold: #c5a059; 
            --bg-top: #2c2c2c; 
            --bg-bottom: #0f0f0f;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-white: #ffffff;
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding: 15px; 
            background: radial-gradient(circle at top, var(--bg-top) 0%, var(--bg-bottom) 70%);
            background-attachment: fixed;
            color: var(--text-white); 
            padding-bottom: 100px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .hidden { display: none !important; }

        /* Header */
        .header { text-align: center; padding: 20px 0; position: relative; }
        .logo { font-size: 24px; letter-spacing: 5px; color: var(--gold); margin: 0; font-weight: bold; text-transform: uppercase; }
        .admin-toggle { position: absolute; top: 0; right: 0; font-size: 10px; color: #444; padding: 10px; cursor: pointer; }

        /* Categories */
        #categories-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .cat-card { position: relative; height: 160px; border-radius: 15px; overflow: hidden; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .cat-card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); transition: 0.3s; }
        .cat-card:active img { transform: scale(1.05); }
        .cat-title { position: absolute; bottom: 0; left: 0; right: 0; padding: 15px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); text-align: center; color: var(--gold); font-size: 11px; font-weight: bold; letter-spacing: 1px; }

        /* Grid Produits */
        #grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .product-card { background: var(--card-bg); border-radius: 12px; padding: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .product-card img { width: 100%; height: 130px; object-fit: cover; border-radius: 8px; }
        .prod-name { font-size: 14px; margin: 8px 0 4px; font-weight: 500; }
        .prod-price { color: var(--gold); font-weight: bold; font-size: 15px; }

        /* Modals */
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0f0f0f; z-index: 9999; padding: 20px; display: none; flex-direction: column; }
        .modal.open { display: flex; }
        .close-btn { align-self: flex-end; font-size: 30px; color: var(--gold); padding: 10px; cursor: pointer; }
        
        .btn-gold { background: var(--gold); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; width: 100%; margin-top: auto; cursor: pointer; }
        .size-opt { border: 1px solid #444; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; text-align: center; }

        /* Admin */
        .admin-card { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid var(--gold); }
        .admin-input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        .admin-btn { width: 100%; padding: 12px; margin-bottom: 8px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="admin-toggle" onclick="toggleAdmin()">⚙️</div>
        <h1 class="logo">LUXURY SHOP</h1>
    </div>

    <div id="client-view">
        <div id="home-page">
            <h2 style="text-align: center; font-weight: 300; font-size: 18px;">Collections Exclusives</h2>
            <div id="categories-menu">
                <div class="cat-card" onclick="showCategory('Habille')">
                    <img src="https://images.unsplash.com/photo-1441984904996-e0b6ba687e04?w=400">
                    <div class="cat-title">PRÊT-À-PORTER</div>
                </div>
                <div class="cat-card" onclick="showCategory('Accessoire')">
                    <img src="https://images.unsplash.com/photo-1547949003-9792a18a2601?w=400">
                    <div class="cat-title">ACCESSOIRES</div>
                </div>
                <div class="cat-card" onclick="showCategory('Parfum')">
                    <img src="https://images.unsplash.com/photo-1523293182086-7651a899d37f?w=400">
                    <div class="cat-title">PARFUMS</div>
                </div>
                <div class="cat-card" onclick="showCategory('Chaussures')">
                    <img src="https://images.unsplash.com/photo-1549298916-b41d501d3772?w=400">
                    <div class="cat-title">CHAUSSURES</div>
                </div>
            </div>
        </div>

        <div id="products-section" class="hidden">
            <div onclick="goBack()" style="color:var(--gold); margin-bottom:20px; cursor:pointer; font-size: 14px;">← RETOUR</div>
            <h3 id="category-label" style="text-transform: uppercase; letter-spacing: 2px; border-left: 3px solid var(--gold); padding-left: 10px;"></h3>
            <div id="grid"></div>
        </div>
    </div>

    <div id="admin-view" class="hidden">
        <h2 style="text-align:center;">PANNEAU ADMIN</h2>
        <div class="admin-card">
            <input type="number" id="clientId" class="admin-input" placeholder="ID Telegram du client">
            <button class="admin-btn" style="background:#2980b9" onclick="adminNotify('paye')">✅ PAIEMENT REÇU</button>
            <button class="admin-btn" style="background:#f39c12" onclick="adminNotify('prep')">📦 PRÉPARATION</button>
            <button class="admin-btn" style="background:#d35400" onclick="adminNotify('exp')">✈️ EXPÉDIÉ</button>
            <button class="admin-btn" style="background:#27ae60" onclick="adminNotify('fini')">🎁 LIVRÉ</button>
        </div>
        <p style="text-align:center; color:#666; margin-top:30px;" onclick="toggleAdmin()">Quitter le mode admin</p>
    </div>

    <div id="product-modal" class="modal">
        <span class="close-btn" onclick="closeModal()">✕</span>
        <div id="product-detail-content" style="display: flex; flex-direction: column; height: 100%;"></div>
    </div>

    <div id="cart-modal" class="modal">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 style="color:var(--gold)">VOTRE PANIER</h3>
            <span class="close-btn" onclick="closeModal()">✕</span>
        </div>
        <div id="cart-content" style="flex-grow:1; overflow-y:auto; margin-top:20px;"></div>
        <div style="font-size:1.4em; padding:20px 0; border-top:1px solid #333; text-align: right;">
            TOTAL: <span id="total-price" style="color:var(--gold)">0</span>€
        </div>
        <button class="btn-gold" onclick="sendOrder()">COMMANDER VIA TELEGRAM</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // --- CONFIGURATION ---
        const BOT_TOKEN = 'TON_TOKEN_BOT_ICI'; // À remplir avec ton token @BotFather
        const products = [
            { id: 1, category: "Habille", name: "Veste Signature", price: 280, desc: "Laine italienne haute qualité.", img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=400", sizes: ["S", "M", "L", "XL"] },
            { id: 2, category: "Accessoire", name: "Pochette Cuir", price: 450, desc: "Cuir pleine fleur noir mat.", img: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=400" },
            { id: 3, category: "Parfum", name: "Élixir N°1", price: 110, desc: "Notes de bois de santal et ambre.", img: "https://images.unsplash.com/photo-1523293182086-7651a899d37f?w=400" },
            { id: 4, category: "Chaussures", name: "Sneaker Luxe", price: 320, desc: "Semelle confort, cuir blanc.", img: "https://images.unsplash.com/photo-1549298916-b41d501d3772?w=400" }
        ];

        let cart = [];
        let selectedSize = null;

        // --- NAVIGATION ---
        function toggleAdmin() {
            document.getElementById('client-view').classList.toggle('hidden');
            document.getElementById('admin-view').classList.toggle('hidden');
        }

        function showCategory(cat) {
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('products-section').classList.remove('hidden');
            document.getElementById('category-label').innerText = cat;
            const filtered = products.filter(p => p.category === cat);
            
            const grid = document.getElementById('grid');
            grid.innerHTML = filtered.map(p => `
                <div class="product-card" onclick="openProduct(${p.id})">
                    <img src="${p.img}">
                    <div class="prod-name">${p.name}</div>
                    <div class="prod-price">${p.price} €</div>
                </div>
            `).join('');
        }

        function goBack() {
            document.getElementById('home-page').classList.remove('hidden');
            document.getElementById('products-section').classList.add('hidden');
        }

        // --- PRODUITS ---
        function openProduct(id) {
            const p = products.find(i => i.id === id);
            selectedSize = null;
            document.getElementById('product-detail-content').innerHTML = `
                <img src="${p.img}" style="width:100%; border-radius:15px; height:250px; object-fit:cover;">
                <h2 style="color:var(--gold); margin:20px 0 10px;">${p.name}</h2>
                <p style="color:#aaa; line-height:1.6;">${p.desc}</p>
                <div style="font-size:26px; font-weight:bold; margin:15px 0;">${p.price} €</div>
                ${p.sizes ? `
                    <p>Choisir une taille :</p>
                    <div style="display:flex; gap:10px; margin-bottom:20px;">
                        ${p.sizes.map(s => `<div onclick="selectSize(this, '${s}')" class="size-opt">${s}</div>`).join('')}
                    </div>` : ''}
                <button onclick="addToCart(${p.id})" class="btn-gold">AJOUTER AU PANIER</button>
            `;
            document.getElementById('product-modal').classList.add('open');
        }

        function selectSize(el, s) {
            document.querySelectorAll('.size-opt').forEach(b => b.style.borderColor = '#444');
            el.style.borderColor = '#c5a059';
            selectedSize = s;
        }

        function addToCart(id) {
            const p = products.find(i => i.id === id);
            cart.push({ ...p, size: selectedSize });
            tg.HapticFeedback.notificationOccurred('success');
            closeModal();
            updateMainButton();
        }

        function updateMainButton() {
            if (cart.length > 0) {
                tg.MainButton.setText(`VOIR LE PANIER (${cart.length})`);
                tg.MainButton.show();
            }
        }

        function closeModal() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
        }

        // --- PANIER ET COMMANDE ---
        tg.onEvent('mainButtonClicked', () => {
            document.getElementById('cart-modal').classList.add('open');
            let total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('total-price').innerText = total;
            document.getElementById('cart-content').innerHTML = cart.map((i, index) => `
                <div style="display:flex; justify-content:space-between; padding:15px 0; border-bottom:1px solid #222;">
                    <div>
                        <b>${i.name}</b><br>
                        <small style="color:#888;">${i.size ? 'Taille: '+i.size : 'Unique'}</small>
                    </div>
                    <span>${i.price}€</span>
                </div>
            `).join('');
        });

        function sendOrder() {
            const text = "Nouvelle commande !"; // Logique simplifiée
            tg.sendData(JSON.stringify({order: cart})); 
        }

        // --- SAV & INITIALISATION ---
        tg.SecondaryButton.setParams({
            text: "CONTACT SAV",
            is_visible: true,
            color: "#111111",
            text_color: "#c5a059"
        });

        tg.onEvent('secondaryButtonClicked', () => {
            tg.openTelegramLink("https://t.me/toulouse315");
        });

        // --- ADMIN NOTIF ---
        async function adminNotify(etape) {
            const id = document.getElementById('clientId').value;
            if (!id) { tg.showAlert("Entrez un ID Client"); return; }
            
            let msg = "";
            if(etape === 'paye') msg = "✅ *Paiement Reçu !*";
            if(etape === 'prep') msg = "📦 *Commande en préparation...*";
            if(etape === 'exp') msg = "🚀 *Colis expédié !*";
            if(etape === 'fini') msg = "🎁 *Livré !* Merci de votre confiance.";

            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: id, text: msg, parse_mode: "Markdown" })
                });
                tg.showAlert("Notification envoyée !");
            } catch(e) { tg.showAlert("Erreur d'envoi"); }
        }

    </script>
</body>
</html>
