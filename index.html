<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MAISON LUXE | SYSTÈME AVANCÉ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A059; --black: #050505; --dark: #121212; --border: rgba(197, 160, 89, 0.3); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Montserrat', sans-serif; background: var(--black); color: white; margin: 0; padding-bottom: 160px; overflow-x: hidden; }

        .header { padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Cinzel', serif; font-size: 24px; letter-spacing: 10px; color: var(--gold); text-transform: uppercase; margin: 0; }

        .nav-tabs { display: flex; overflow-x: auto; padding: 15px; gap: 20px; sticky; top: 0; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid var(--border); scrollbar-width: none; }
        .tab-item { color: #666; font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; border: none; background: none; white-space: nowrap; }
        .tab-item.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border-top: 1px solid var(--border); }
        .product { background: var(--black); padding: 20px 10px; text-align: center; }
        .product img { width: 100%; aspect-ratio: 1/1; object-fit: cover; margin-bottom: 10px; background: #111; border: 1px solid rgba(255,255,255,0.05); }
        .p-brand { font-size: 8px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }
        .p-name { font-size: 10px; font-weight: 200; margin: 5px 0; height: 24px; overflow: hidden; }
        .p-price { font-size: 11px; font-weight: 700; color: #fff; }

        /* PANIER VISUEL FIXE */
        .cart-summary { position: fixed; bottom: 85px; left: 10px; right: 10px; background: #111; border: 1px solid var(--gold); padding: 12px; z-index: 999; display: none; border-radius: 5px; box-shadow: 0 -10px 20px rgba(0,0,0,0.5); }
        .cart-summary.active { display: block; }
        .cart-row { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 5px; }

        .footer { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 15px 10px; z-index: 1000; }
        .nav-link { color: #555; text-decoration: none; font-size: 9px; text-align: center; cursor: pointer; }
        .nav-link i { display: block; font-size: 18px; color: var(--gold); margin-bottom: 5px; font-style: normal; }
    </style>
</head>
<body>

    <header class="header">
        <h1 class="logo">Maison Luxe</h1>
    </header>

    <div class="nav-tabs">
        <button class="tab-item active" onclick="filter('all', this)">Collection</button>
        <button class="tab-item" onclick="filter('habille', this)">Habille Luxe</button>
        <button class="tab-item" onclick="filter('chaussures', this)">Souliers</button>
        <button class="tab-item" onclick="filter('horlogerie', this)">Horlogerie</button>
    </div>

    <div class="container">
        <div id="grid" class="grid"></div>
        
        <div id="cart-ui" class="cart-summary">
            <div style="font-size:9px; color:var(--gold); margin-bottom:8px; font-weight:700;">PANIER :</div>
            <div id="cart-list"></div>
            <div id="cart-total" style="text-align:right; margin-top:8px; font-weight:700; color:var(--gold); border-top:1px solid #333; padding-top:5px;"></div>
        </div>
    </div>

    <nav class="footer">
        <div class="nav-link" onclick="tg.openTelegramLink('https://t.me/ton_pseudo')"><i>👤</i>CONCIERGE</div>
        <div class="nav-link" onclick="tg.showAlert('LIVRAISON :\n🇫🇷 France : 24h\n🇪🇺 Europe : 48h\n🌎 Monde : 4 jours')"><i>📦</i>LIVRAISON</div>
        <div class="nav-link" onclick="clearCart()"><i>🗑️</i>VIDER</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let cart = [];
        // IMAGES CORRIGÉES (S'AFFICHENT PARTOUT)
        const products = [
            { id: 1, cat: 'habille', b: 'HERMÈS', n: 'Manteau Cachemire', p: 4200, i: 'https://images.unsplash.com/photo-1539533018447-63fcce2678e3?auto=format&fit=crop&w=400&q=80' },
            { id: 2, cat: 'chaussures', b: 'BERLUTI', n: 'Alessandro Edge', p: 1850, i: 'https://images.unsplash.com/photo-1549298916-b41d501d3772?auto=format&fit=crop&w=400&q=80' },
            { id: 3, cat: 'horlogerie', b: 'ROLEX', n: 'Daytona Panda', p: 38500, i: 'https://images.unsplash.com/photo-1523170335258-f5ed11844a49?auto=format&fit=crop&w=400&q=80' },
            { id: 4, cat: 'habille', b: 'DIOR', n: 'Blazer de Luxe', p: 2600, i: 'https://images.unsplash.com/photo-1594932224010-74f43a18652b?auto=format&fit=crop&w=400&q=80' }
        ];

        function render(cat = 'all') {
            const grid = document.getElementById('grid');
            const items = cat === 'all' ? products : products.filter(x => x.cat === cat);
            grid.innerHTML = items.map(p => `
                <div class="product" onclick="add(${p.id})">
                    <img src="${p.i}" onerror="this.src='https://placehold.co/400x400/000/D4AF37?text=IMAGE'">
                    <div class="p-brand">${p.b}</div>
                    <div class="p-name">${p.n}</div>
                    <div class="p-price">${p.p.toLocaleString()} €</div>
                </div>
            `).join('');
        }

        function filter(cat, el) {
            document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            render(cat);
        }

        function add(id) {
            const p = products.find(x => x.id === id);
            cart.push(p);
            tg.HapticFeedback.notificationOccurred('success');
            updateUI();
        }

        function updateUI() {
            const ui = document.getElementById('cart-ui');
            const list = document.getElementById('cart-list');
            const totalDisplay = document.getElementById('cart-total');

            if (cart.length > 0) {
                ui.classList.add('active');
                list.innerHTML = cart.map(i => `
                    <div class="cart-row"><span>${i.b} ${i.n}</span><span>${i.p.toLocaleString()}€</span></div>
                `).join('');
                
                const total = cart.reduce((s, x) => s + x.p, 0);
                totalDisplay.innerText = "TOTAL : " + total.toLocaleString() + " €";
                
                tg.MainButton.setText("COMMANDER (" + total.toLocaleString() + " €)");
                tg.MainButton.show();
            } else {
                ui.classList.remove('active');
                tg.MainButton.hide();
            }
        }

        function clearCart() { cart = []; updateUI(); }

        tg.onEvent('mainButtonClicked', () => {
            const total = cart.reduce((s, x) => s + x.p, 0);
            const order = {
                client: tg.initDataUnsafe?.user?.first_name || "Client Privé",
                panier: cart.map(x => `${x.b} ${x.n}`),
                prix_total: total.toLocaleString() + " €"
            };

            // ALERTE DE SÉCURITÉ : Affiche les données si le bot ne répond pas
            try {
                tg.sendData(JSON.stringify(order));
                tg.showAlert("Commande envoyée au bot !");
            } catch(e) {
                tg.showAlert("Erreur d'envoi. Assurez-vous d'avoir ouvert l'app depuis le bouton menu du bot.");
            }
        });

        render(); // Force l'affichage immédiat
    </script>
</body>
</html>
