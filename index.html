<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boutique</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --primary: #c5a059; 
            --bg: var(--tg-theme-bg_color, #ffffff); 
            --text: var(--tg-theme-text-color, #222); 
            --sec-bg: var(--tg-theme-secondary_bg_color, #f4f4f4);
            --hint: var(--tg-theme-hint_color, #999);
        }
        
        body { font-family: sans-serif; margin: 0; padding: 15px; background: var(--bg); color: var(--text); padding-bottom: 120px; }
        #grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .card { background: var(--sec-bg); border-radius: 12px; padding: 10px; text-align: center; position: relative; border: 1px solid rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 110px; object-fit: cover; border-radius: 8px; cursor: pointer; }
        
        .badge { position: absolute; top: -5px; right: -5px; background: #ff4444; color: white; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid var(--bg); }
        
        .btn-add { background: var(--primary); color: white; border: none; border-radius: 8px; width: 100%; padding: 10px; margin-top: 10px; font-weight: bold; cursor: pointer; }

        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 9999; padding: 20px; display: none; flex-direction: column; }
        .modal.open { display: flex; }
        
        /* Correction visibilité Tailles */
        .size-box { display: flex; gap: 10px; margin: 15px 0; justify-content: center; }
        .size-btn-opt { 
            border: 1px solid var(--hint); 
            padding: 8px 15px; 
            border-radius: 8px; 
            cursor: pointer; 
            color: var(--text) !important; /* Force la couleur du texte */
            background-color: var(--sec-bg);
            font-weight: bold;
        }
        .size-btn-opt.active { border: 2px solid var(--primary); color: var(--primary) !important; background: var(--bg); }

        .cart-item { display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(0,0,0,0.1); gap: 12px; }
        .cart-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        .cart-info { flex-grow: 1; text-align: left; }
        .btn-remove { background: #ff4444; color: white; border: none; border-radius: 5px; padding: 5px 8px; font-size: 12px; cursor: pointer; }
        .detail-img { width: 100%; height: 250px; object-fit: cover; border-radius: 15px; }
    </style>
</head>
<body>

    <h2 style="text-align:center; font-weight:300;">Notre Collection</h2>
    <div id="grid"></div>

    <div id="cart-modal" class="modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 style="margin:0">Mon Panier</h3>
            <span onclick="closeAll()" style="font-size:30px; cursor:pointer;">✕</span>
        </div>
        <div id="cart-content" style="flex-grow:1; overflow-y:auto;"></div>
        <div style="font-size:1.3em; font-weight:bold; padding-top:15px; border-top: 2px solid var(--primary); margin-top:10px;">
            Total : <span id="total-price">0</span> €
        </div>
    </div>

    <div id="product-modal" class="modal">
        <div style="display:flex; justify-content:flex-end;">
            <span onclick="closeAll()" style="font-size:30px; cursor:pointer;">✕</span>
        </div>
        <div id="product-detail-content"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const products = [
            { id: 1, name: "Veste Luxe", price: 280, desc: "Laine italienne premium.", img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=400", sizes: ["S", "M", "L", "XL"] },
            { id: 2, name: "Chemise Été", price: 120, desc: "Lin naturel ultra respirant.", img: "https://images.unsplash.com/photo-1598033129183-c4f50c717658?w=400", sizes: ["M", "L", "XL"] },
            { id: 3, name: "Sac Voyage", price: 450, desc: "Cuir véritable fait main.", img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=400" },
            { id: 4, name: "Montre Or", price: 890, desc: "Mouvement automatique.", img: "https://images.unsplash.com/photo-1524592094713-9487cc757a04?w=400" }
        ];

        let cart = []; // Liste d'objets {id, name, price, size, qty}
        let selectedSize = null;

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = products.map(p => {
                const totalQty = cart.filter(item => item.id === p.id).reduce((sum, item) => sum + item.qty, 0);
                return `
                <div class="card">
                    ${totalQty > 0 ? `<div class="badge">${totalQty}</div>` : ''}
                    <img src="${p.img}" onclick="openProduct(${p.id})">
                    <div style="margin:8px 0; font-size:14px; font-weight:bold;">${p.name}</div>
                    <div style="color:var(--primary); font-weight:bold;">${p.price} €</div>
                    <button class="btn-add" onclick="openProduct(${p.id})">AJOUTER</button>
                </div>`;
            }).join('');
        }

        function openProduct(id) {
            const p = products.find(i => i.id === id);
            selectedSize = null;
            let sizeHtml = p.sizes ? `<div class="size-box">${p.sizes.map(s => `<div class="size-btn-opt" onclick="selectSize(this, '${s}')">${s}</div>`).join('')}</div>` : "";

            document.getElementById('product-detail-content').innerHTML = `
                <img src="${p.img}" class="detail-img">
                <h2>${p.name}</h2>
                <p style="color:var(--hint);">${p.desc}</p>
                <div style="font-size:22px; font-weight:bold; color:var(--primary);">${p.price} €</div>
                ${sizeHtml}
                <button onclick="addToCart(${p.id})" class="btn-add" style="padding:15px; font-size:16px;">AJOUTER AU PANIER</button>
            `;
            document.getElementById('product-modal').classList.add('open');
            tg.BackButton.show();
        }

        function selectSize(el, size) {
            document.querySelectorAll('.size-btn-opt').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            selectedSize = size;
        }

        function addToCart(id) {
            const p = products.find(i => i.id === id);
            if (p.sizes && !selectedSize) {
                tg.showAlert("Merci de choisir une taille");
                return;
            }

            const existing = cart.find(item => item.id === id && item.size === selectedSize);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ id: p.id, name: p.name, price: p.price, size: selectedSize, img: p.img, qty: 1 });
            }

            tg.HapticFeedback.notificationOccurred('success');
            closeAll();
            renderGrid();
        }

        function updateCartModal() {
            let total = 0;
            let html = "";
            cart.forEach((item, index) => {
                const subtotal = item.price * item.qty;
                total += subtotal;
                html += `
                <div class="cart-item">
                    <img src="${item.img}" class="cart-img">
                    <div class="cart-info">
                        <div style="font-weight:bold;">${item.name} ${item.size ? '['+item.size+']' : ''}</div>
                        <div style="font-size:13px;">${item.price}€ x ${item.qty} = ${subtotal}€</div>
                    </div>
                    <button class="btn-remove" onclick="removeFromCart(${index})">Supprimer</button>
                </div>`;
            });
            document.getElementById('cart-content').innerHTML = html || "<p style='text-align:center; margin-top:40px;'>Panier vide</p>";
            document.getElementById('total-price').innerText = total;
            
            if (cart.length > 0) {
                tg.MainButton.setText("COMMANDER (" + total + "€)");
                tg.MainButton.show();
            } else {
                tg.MainButton.hide();
            }
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartModal();
            renderGrid();
        }

        function closeAll() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
            tg.BackButton.hide();
            const count = cart.reduce((a, b) => a + b.qty, 0);
            if(count > 0) {
                tg.MainButton.setText("VOIR LE PANIER (" + count + ")");
                tg.MainButton.show();
            } else { tg.MainButton.hide(); }
        }

        tg.onEvent('mainButtonClicked', () => {
            if (!document.getElementById('cart-modal').classList.contains('open')) {
                document.getElementById('cart-modal').classList.add('open');
                tg.BackButton.show();
                updateCartModal();
            } else {
                tg.showConfirm("Envoyer la commande ?", (ok) => {
                    if (ok) tg.sendData(JSON.stringify(cart));
                });
            }
        });

        tg.onEvent('backButtonClicked', closeAll);
        window.onload = renderGrid;
    </script>
</body>
</html>
