<script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.setParams({ color: '#c5a059', text_color: '#ffffff' });

        const products = [
            { id: 1, name: "Veste Signature", price: 280, img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=500" },
            { id: 2, name: "Chemise Lin", price: 120, img: "https://images.unsplash.com/photo-1598033129183-c4f50c717658?w=500" },
            { id: 3, name: "Sac Cuir", price: 450, img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=500" },
            { id: 4, name: "Lunettes", price: 320, img: "https://images.unsplash.com/photo-1511499767390-90342f54b207?w=500" }
        ];

        let cart = {};

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = products.map(p => `
                <div class="card">
                    <div class="img-container"><img src="${p.img}"></div>
                    <h3>${p.name}</h3>
                    <span class="price">${p.price} €</span>
                    <div class="controls">
                        ${cart[p.id] ? `<button class="btn-action" onclick="updateCart(${p.id}, -1)">-</button><span style="font-weight:600; margin: 0 10px;">${cart[p.id]}</span>` : ''}
                        <button class="btn-action" onclick="updateCart(${p.id}, 1)">+</button>
                    </div>
                </div>
            `).join('');
            updateInterface();
        }

        function updateCart(id, delta) {
            cart[id] = (cart[id] || 0) + delta;
            if (cart[id] <= 0) delete cart[id];
            render();
            updateCartModal();
        }

        function updateInterface() {
            const count = Object.values(cart).reduce((a, b) => a + b, 0);
            if (count > 0) {
                tg.MainButton.setText(`VOIR LE PANIER (${count})`);
                tg.MainButton.show();
            } else {
                tg.MainButton.hide();
            }
        }

        function updateCartModal() {
            const content = document.getElementById('cart-content');
            let total = 0;
            let html = "";
            products.forEach(p => {
                if (cart[p.id]) {
                    const subtotal = p.price * cart[p.id];
                    total += subtotal;
                    html += `<div class="cart-item"><span>${p.name} (x${cart[p.id]})</span><span>${subtotal} €</span></div>`;
                }
            });
            content.innerHTML = html || "<p>Votre panier est vide</p>";
            document.getElementById('total-price').innerText = total + " €";
        }

        function openCart() {
            document.getElementById('cart-modal').classList.add('open');
            tg.MainButton.setText("VALIDER LA COMMANDE");
        }

        function closeCart() {
            document.getElementById('cart-modal').classList.remove('open');
            updateInterface();
        }

        // --- NOUVELLE FONCTION DE CONFIRMATION SANS FERMETURE ---
        function confirmPayment() {
            if (Object.keys(cart).length === 0) return;

            // Au lieu de quitter, on affiche un message de succès dans le panier
            const modal = document.getElementById('cart-modal');
            modal.innerHTML = `
                <div style="text-align: center; padding: 40px 0;">
                    <div style="font-size: 50px; color: #c5a059; margin-bottom: 20px;">✓</div>
                    <h2 style="font-family: 'Playfair Display', serif;">Commande Enregistrée</h2>
                    <p style="color: #777; font-size: 14px; margin-bottom: 30px;">
                        Votre demande a été transmise au bot.<br>Revenez dans la discussion pour finaliser.
                    </p>
                    <button onclick="location.reload()" style="width: 100%; padding: 18px; background: #1a1a1a; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">RETOUR AU CATALOGUE</button>
                </div>
            `;
            
            // On cache le bouton principal Telegram
            tg.MainButton.hide();

            // Note : Pour envoyer les données SANS fermer, il faudrait passer par une API externe (WebHook).
            // Mais pour un bot simple, l'utilisateur devra quand même fermer manuellement pour voir sa facture.
        }

        tg.onEvent('mainButtonClicked', function() {
            const modal = document.getElementById('cart-modal');
            if (!modal.classList.contains('open')) {
                openCart();
            } else {
                confirmPayment();
            }
        });

        render();
    </script>
