<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Boutique Officielle</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --primary: #c5a059; 
            --bg: var(--tg-theme-bg_color, #ffffff); 
            --text: var(--tg-theme-text-color, #222); 
            --sec-bg: var(--tg-theme-secondary_bg_color, #f4f4f4);
            --hint: var(--tg-theme-hint_color, #999);
        }
        
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 15px; background: var(--bg); color: var(--text); padding-bottom: 120px; }
        #grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        /* ZONE DE CLIC CARTE */
        .card { background: var(--sec-bg); border-radius: 15px; padding: 10px; text-align: center; position: relative; border: 1px solid rgba(0,0,0,0.05); }
        .card-click-zone { cursor: pointer; display: block; }
        .card img { width: 100%; height: 110px; object-fit: cover; border-radius: 10px; }
        
        .badge { position: absolute; top: 5px; right: 5px; background: #ff4444; color: white !important; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid var(--bg); z-index: 10; }
        
        .btn-add-main { background: var(--primary); color: white; border: none; border-radius: 8px; width: 100%; padding: 10px; margin-top: 8px; font-weight: bold; cursor: pointer; }

        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 9999; padding: 20px; display: none; flex-direction: column; overflow-y: auto; }
        .modal.open { display: flex; }
        
        /* STYLE PANIER AMÉLIORÉ */
        .cart-item { display: flex; align-items: center; padding: 15px 0; border-bottom: 2px solid var(--sec-bg); gap: 12px; }
        .cart-img { width: 65px; height: 65px; border-radius: 8px; object-fit: cover; }
        .cart-info { flex-grow: 1; text-align: left; }
        .cart-title { font-weight: bold; font-size: 15px; color: var(--text); margin-bottom: 4px; }
        .cart-sub { font-size: 13px; color: var(--hint); margin-bottom: 4px; }
        .cart-price-line { color: var(--primary); font-weight: bold; font-size: 14px; }
        
        .cart-controls { display: flex; align-items: center; gap: 10px; background: var(--sec-bg); padding: 5px 10px; border-radius: 10px; }
        .btn-qty { background: #222 !important; color: #fff !important; border: none; border-radius: 6px; width: 30px; height: 30px; font-weight: bold; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .qty-num { font-weight: bold; color: var(--text); min-width: 20px; text-align: center; }

        .detail-img { width: 100%; height: 250px; object-fit: cover; border-radius: 15px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <h2 style="text-align:center; font-weight:300;">Ma Collection</h2>
    <div id="grid"></div>

    <div id="cart-modal" class="modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 style="margin:0">Mon Panier</h3>
            <span onclick="closeAll()" style="font-size:28px; color:var(--hint); cursor:pointer;">✕</span>
        </div>
        <div id="cart-content" style="flex-grow:1;"></div>
        <div style="font-size:1.4em; font-weight:bold; padding-top:15px; border-top: 3px solid var(--primary); margin-top:20px;">
            TOTAL : <span id="total-price">0</span> €
        </div>
    </div>

    <div id="product-modal" class="modal">
        <div style="display:flex; justify-content:flex-end;">
            <span onclick="closeAll()" style="font-size:30px; color:var(--hint); cursor:pointer;">✕</span>
        </div>
        <div id="product-detail-content"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        tg.MainButton.setParams({ color: '#c5a059', text_color: '#ffffff' });
        tg.SecondaryButton.setParams({ text: "💬 CONTACT SAV", is_visible: true, color: "#222222" });

        const products = [
            { id: 1, name: "Veste Luxe", price: 280, desc: "Laine italienne, coupe ajustée premium.", img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=400" },
            { id: 2, name: "Chemise Été", price: 120, desc: "Lin naturel ultra respirant.", img: "https://images.unsplash.com/photo-1598033129183-c4f50c717658?w=400" },
            { id: 3, name: "Sac Voyage", price: 450, desc: "Cuir véritable fait à la main.", img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=400" },
            { id: 4, name: "Montre Or", price: 890, desc: "Mouvement automatique de précision.", img: "https://images.unsplash.com/photo-1524592094713-9487cc757a04?w=400" }
        ];

        let cart = {};

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = products.map(p => {
                const qte = cart[p.id] || 0;
                return `
                <div class="card">
                    ${qte > 0 ? `<div class="badge">${qte}</div>` : ''}
                    <div class="card-click-zone" onclick="openProduct(${p.id})">
                        <img src="${p.img}">
                        <div style="margin:8px 0; font-size:14px; font-weight:bold;">${p.name}</div>
                        <div style="color:var(--primary); font-weight:bold; margin-bottom:5px;">${p.price} €</div>
                    </div>
                    <button class="btn-add-main" onclick="updateCart(${p.id}, 1)">AJOUTER</button>
                </div>`;
            }).join('');
        }

        function updateCart(id, delta) {
            tg.HapticFeedback.impactOccurred('medium');
            cart[id] = (cart[id] || 0) + delta;
            if (cart[id] <= 0) delete cart[id];
            renderGrid();
            updateInterface();
            if (document.getElementById('cart-modal').classList.contains('open')) updateCartModal();
        }

        function openProduct(id) {
            const p = products.find(i => i.id === id);
            document.getElementById('product-detail-content').innerHTML = `
                <img src="${p.img}" class="detail-img">
                <h2 style="margin-top:0;">${p.name}</h2>
                <p style="color:var(--hint); line-height:1.5;">${p.desc}</p>
                <div style="font-size:24px; font-weight:bold; color:var(--primary); margin: 20px 0;">${p.price} €</div>
                <button onclick="updateCart(${p.id}, 1); closeAll();" style="width:100%; background:var(--primary); color:white; border:none; padding:18px; border-radius:12px; font-weight:bold; cursor:pointer;">
                    AJOUTER AU PANIER
                </button>
            `;
            document.getElementById('product-modal').classList.add('open');
            tg.BackButton.show();
        }

        function updateInterface() {
            const count = Object.values(cart).reduce((a, b) => a + b, 0);
            const isCart = document.getElementById('cart-modal').classList.contains('open');
            if (count > 0) {
                tg.MainButton.setText(isCart ? "CONFIRMER L'ENVOI" : `VOIR LE PANIER (${count})`);
                tg.MainButton.show();
            } else { tg.MainButton.hide(); }
        }

        function updateCartModal() {
            let total = 0; let html = "";
            products.forEach(p => {
                if (cart[p.id]) {
                    const qte = cart[p.id];
                    const st = p.price * qte;
                    total += st;
                    html += `
                    <div class="cart-item">
                        <img src="${p.img}" class="cart-img">
                        <div class="cart
