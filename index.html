<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Boutique</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #c5a059; --bg: var(--tg-theme-bg_color, #ffffff); --text: var(--tg-theme-text-color, #222); --secondary: var(--tg-theme-secondary_bg_color, #f4f4f4); }
        body { font-family: sans-serif; margin: 0; padding: 15px; background: var(--bg); color: var(--text); padding-bottom: 120px; }
        #grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: var(--secondary); border-radius: 12px; padding: 10px; text-align: center; position: relative; }
        .card img { width: 100%; height: 110px; object-fit: cover; border-radius: 8px; }
        .badge { position: absolute; top: 5px; right: 5px; background: #ff4444; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .btn-action { background: var(--primary); color: white; border: none; border-radius: 8px; width: 100%; padding: 8px; margin-top: 10px; font-weight: bold; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 999; padding: 20px; display: none; flex-direction: column; }
        .modal.open { display: flex; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>

    <h2 style="text-align:center">Ma Boutique</h2>
    <div id="grid"></div>

    <div id="cart-modal" class="modal">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>Mon Panier</h3>
            <b onclick="closeAll()" style="font-size:24px; cursor:pointer;">✕</b>
        </div>
        <div id="cart-content" style="flex-grow:1; overflow-y:auto;"></div>
        <div style="font-size:1.2em; font-weight:bold; padding-top:10px;">Total : <span id="total-price">0</span> €</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.setParams({ color: '#c5a059' });
        
        // Configuration du SAV toulouse315
        tg.SecondaryButton.setParams({ text: "💬 CONTACT SAV", is_visible: true, color: "#222222" });

        const products = [
            { id: 1, name: "Veste Luxe", price: 280, img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=300" },
            { id: 2, name: "Chemise Été", price: 120, img: "https://images.unsplash.com/photo-1598033129183-c4f50c717658?w=300" },
            { id: 3, name: "Sac Voyage", price: 450, img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=300" },
            { id: 4, name: "Montre Or", price: 890, img: "https://images.unsplash.com/photo-1524592094713-9487cc757a04?w=300" }
        ];

        let cart = {};

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = products.map(p => {
                const qte = cart[p.id] || 0;
                return `
                <div class="card">
                    ${qte > 0 ? `<div class="badge">${qte}</div>` : ''}
                    <img src="${p.img}">
                    <div style="margin:8px 0; font-size:14px;">${p.name}</div>
                    <div style="color:var(--primary); font-weight:bold;">${p.price} €</div>
                    <button class="btn-action" onclick="updateCart(${p.id}, 1)">AJOUTER</button>
                </div>`;
            }).join('');
        }

        function updateCart(id, delta) {
            // Vibration uniquement (plus stable que le son)
            tg.HapticFeedback.impactOccurred('medium');
            
            cart[id] = (cart[id] || 0) + delta;
            if (cart[id] <= 0) delete cart[id];
            
            render();
            updateInterface();
            if (document.getElementById('cart-modal').classList.contains('open')) updateCartModal();
        }

        function updateInterface() {
            const count = Object.values(cart).reduce((a, b) => a + b, 0);
            if (count > 0) {
                const isCart = document.getElementById('cart-modal').classList.contains('open');
                tg.MainButton.setText(isCart ? "VALIDER LA COMMANDE" : `VOIR PANIER (${count})`);
                tg.MainButton.show();
            } else { tg.MainButton.hide(); }
        }

        function updateCartModal() {
            let total = 0; let html = "";
            products.forEach(p => {
                if (cart[p.id]) {
                    const st = p.price * cart[p.id];
                    total += st;
                    html += `<div class="cart-item">
                        <span>${p.name} (x${cart[p.id]})</span>
                        <b>${st}€ <i onclick="updateCart(${p.id}, -1)" style="color:red; margin-left:10px; font-style:normal; cursor:pointer;">[X]</i></b>
                    </div>`;
                }
            });
            document.getElementById('cart-content').innerHTML = html || "Vide";
            document.getElementById('total-price').innerText = total;
        }

        function closeAll() {
            document.getElementById('cart-modal').classList.remove('open');
            tg.BackButton.hide();
            updateInterface();
        }

        tg.onEvent('mainButtonClicked', () => {
            if (!document.getElementById('cart-modal').classList.contains('open')) {
                document.getElementById('cart-modal').classList.add('open');
                tg.BackButton.show();
                updateCartModal();
                updateInterface();
            } else {
                tg.showConfirm("Confirmer commande ?", (ok) => {
                    if (ok) { tg.sendData(JSON.stringify(cart)); tg.close(); }
                });
            }
        });

        tg.onEvent('secondaryButtonClicked', () => {
            tg.openTelegramLink("https://t.me/toulouse315");
        });

        tg.onEvent('backButtonClicked', closeAll);
        
        window.onload = render;
    </script>
</body>
</html>
