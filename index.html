<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxuryShop App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; text-align: center; }
        .container { padding: 20px; }
        .item { border: 1px solid #c5a059; border-radius: 15px; padding: 15px; margin-bottom: 20px; background: #1a1a1a; }
        .price { color: #c5a059; font-weight: bold; font-size: 1.2em; }
        button { background: #c5a059; color: black; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        h1 { color: #c5a059; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💎 LUXURY SHOP</h1>
        <p>Sélection Sport & Luxe</p>

        <div class="item">
            <h3>👟 Ensemble On Cloud</h3>
            <p class="price">130€</p>
            <button onclick="sendOrder('Ensemble On Cloud', 130)">🛒 Commander</button>
        </div>

        <div class="item">
            <h3>👕 T-shirt Luxe</h3>
            <p class="price">60€</p>
            <button onclick="sendOrder('T-shirt Luxe', 60)">🛒 Commander</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function sendOrder(name, price) {
            const data = { product: name, price: price };
            tg.sendData(JSON.stringify(data)); // Envoie les infos au bot
        }
    </script>
</body>
</html>
