<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MAISON LUXE</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --gold:#C5A059;
    --black:#050505;
    --grey:#1a1a1a;
}

body{
    margin:0;
    font-family:'Montserrat',sans-serif;
    background:var(--black);
    color:white;
}

.header{
    padding:30px;
    text-align:center;
    border-bottom:1px solid rgba(197,160,89,0.2);
}

.logo{
    font-family:'Cinzel',serif;
    letter-spacing:8px;
    color:var(--gold);
}

.tabs{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:15px;
    position:sticky;
    top:0;
    background:var(--black);
}

.tab{
    padding:8px 14px;
    border-radius:20px;
    border:1px solid #333;
    font-size:10px;
    text-transform:uppercase;
    cursor:pointer;
}

.tab.active{
    background:var(--gold);
    color:black;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    padding:12px;
}

.card{
    background:var(--grey);
    border-radius:10px;
    padding:12px;
    text-align:center;
    cursor:pointer;
}

.card img{
    width:100%;
    border-radius:6px;
}

.card-brand{
    font-size:9px;
    color:var(--gold);
    margin-top:6px;
}

.card-name{
    font-size:11px;
    margin:6px 0;
}

.card-price{
    font-weight:600;
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
}

.modal-content{
    background:#111;
    padding:20px;
    width:90%;
    border-radius:12px;
    text-align:center;
}

.size-select button{
    margin:5px;
    padding:8px 12px;
    border:1px solid var(--gold);
    background:transparent;
    color:var(--gold);
    border-radius:4px;
}

.size-select button.active{
    background:var(--gold);
    color:black;
}

.add-btn{
    margin-top:10px;
    padding:10px;
    width:100%;
    background:var(--gold);
    border:none;
    color:black;
    font-weight:600;
    border-radius:6px;
}

.cart-badge{
    position:fixed;
    bottom:20px;
    right:20px;
    background:var(--gold);
    color:black;
    padding:10px 18px;
    border-radius:30px;
    font-weight:600;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">MAISON LUXE</div>
</div>

<div class="tabs">
    <div class="tab active" data-cat="all">Tous</div>
    <div class="tab" data-cat="horlogerie">Horlogerie</div>
    <div class="tab" data-cat="maroquinerie">Maroquinerie</div>
    <div class="tab" data-cat="joaillerie">Joaillerie</div>
    <div class="tab" data-cat="vetements">Vêtements</div>
</div>

<div class="grid" id="grid"></div>
<div class="cart-badge" id="cartBadge">0</div>

<!-- MODAL PRODUIT -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h3 id="modalName"></h3>
        <p id="modalPrice"></p>
        <div class="size-select" id="sizeSelect"></div>
        <button class="add-btn" onclick="confirmAdd()">Ajouter au panier</button>
    </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const PRODUCTS = [
{ id:1, cat:"horlogerie", brand:"ROLEX", name:"Submariner Date", price:14500, img:"https://images.unsplash.com/photo-1547996160-81dfa63595dd?w=400" },
{ id:2, cat:"maroquinerie", brand:"HERMÈS", name:"Birkin 30", price:22000, img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=400" },
{ id:3, cat:"joaillerie", brand:"CARTIER", name:"Bracelet Love", price:7800, img:"https://images.unsplash.com/photo-1611591437281-460bfbe1220a?w=400" },

{ id:10, cat:"vetements", brand:"MAISON LUXE", name:"Veste Premium Noir", price:890, img:"https://images.unsplash.com/photo-1520975916090-3105956dac38?w=400", sizes:["S","M","L","XL"] },
{ id:11, cat:"vetements", brand:"MAISON LUXE", name:"Pantalon Tailoring", price:490, img:"https://images.unsplash.com/photo-1593032465171-8c2dcb9fdf73?w=400", sizes:["S","M","L","XL"] }
];

let state={
    cart:[],
    category:"all",
    selectedProduct:null,
    selectedSize:null
};

function formatPrice(p){
    return p.toLocaleString("fr-FR")+" €";
}

function renderProducts(){
    const grid=document.getElementById("grid");
    grid.innerHTML="";

    const list=state.category==="all"?PRODUCTS:PRODUCTS.filter(p=>p.cat===state.category);

    list.forEach(p=>{
        grid.innerHTML+=`
        <div class="card" onclick="openProduct(${p.id})">
            <img src="${p.img}">
            <div class="card-brand">${p.brand}</div>
            <div class="card-name">${p.name}</div>
            <div class="card-price">${formatPrice(p.price)}</div>
        </div>
        `;
    });
}

function openProduct(id){
    const product=PRODUCTS.find(p=>p.id===id);
    state.selectedProduct=product;
    state.selectedSize=null;

    document.getElementById("modalName").innerText=product.name;
    document.getElementById("modalPrice").innerText=formatPrice(product.price);

    const sizeBox=document.getElementById("sizeSelect");
    sizeBox.innerHTML="";

    if(product.sizes){
        product.sizes.forEach(size=>{
            sizeBox.innerHTML+=`<button onclick="selectSize('${size}',this)">${size}</button>`;
        });
    }

    document.getElementById("modal").style.display="flex";
}

function selectSize(size,btn){
    state.selectedSize=size;
    document.querySelectorAll(".size-select button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
}

function confirmAdd(){
    if(state.selectedProduct.sizes && !state.selectedSize){
        alert("Choisissez une taille");
        return;
    }

    state.cart.push({
        ...state.selectedProduct,
        size:state.selectedSize||null
    });

    updateCart();
    document.getElementById("modal").style.display="none";
}

function updateCart(){
    const badge=document.getElementById("cartBadge");
    const total=state.cart.reduce((s,i)=>s+i.price,0);
    badge.innerText=state.cart.length+" • "+formatPrice(total);
}

document.querySelectorAll(".tab").forEach(tab=>{
    tab.addEventListener("click",()=>{
        document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
        tab.classList.add("active");
        state.category=tab.dataset.cat;
        renderProducts();
    });
});

renderProducts();
</script>

</body>
</html>
