<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ma Boutique Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #c5a059; --bg: #ffffff; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; 
            padding: 15px; 
            background: var(--bg);
            /* Important : on laisse de la place pour que le contenu ne soit pas caché par le bouton fixe */
            padding-bottom: 100px; 
        }
        
        #grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .card { 
            border: 1px solid #f0f0f0; 
            border-radius: 15px; 
            padding: 12px; 
            text-align: center; 
            background: white;
        }

        .card img { width: 100%; height: 130px; object-fit: cover; border-radius: 10px; }
        .price { font-weight: bold; color: var(--primary); display: block; margin: 10px 0; }
        
        .btn-action { 
            background: var(--primary); color: white; border: none; 
            border-radius: 8px; width: 35px; height: 35px; font-size: 20px;
        }

        /* LE BOUTON SAV - FIXÉ STRICTEMENT EN BAS */
        .sav-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px;
            background: linear-gradient(to top, white, rgba(255,255,255,0.8));
            text-align: center;
            z-index: 999;
        }

        .btn-sav-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #1a1a1a;
            color: white;
            padding: 12px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
        }

        /* Style Panier */
        #cart-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: white; z-index: 10000; padding: 25px; display: none; flex-direction: column; }
        #cart-modal.open { display: flex; }
        .cart-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <h2 style="text-align:center; font-weight:300;">Collection</h2>
    
    <div id="grid"></div>

    <div class="sav-footer">
        <a href="https://t.me/TonUsername" class="btn-sav-link">
            <span>💬</span> CONTACTER LE SAV
        </a>
    </div>

    <div id="cart-modal">
        <h3>Votre Panier</h3>
        <div id="cart-content"></div>
        <div style="margin-top:auto; padding:20px; font-weight:bold; font-size:1.2em; border-top:1px solid #eee;">
            Total : <span id="total-price">0</span> €
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        // On règle le bouton Telegram sans animation de mouvement
        tg.MainButton.setParams({ color: '#c5a059', text_color: '#ffffff' });

        const products = [
            { id: 1, name: "Veste Signature", price: 280, img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=500" },
            { id: 2, name: "Chemise Lin", price: 120, img: "https://images.unsplash.com/photo-1598033129183-c4f50c717658?w=500" },
            { id: 3, name: "Sac Cuir", price: 450, img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=500" },
            { id: 4, name: "Lunettes", price: 320, img: "https://images.unsplash.com/photo-1511499767390-90342f54b207?w=500" }
        ];

        let cart = {};

        function initialRender() {
            const grid = document.getElementById('grid');
            grid.innerHTML = products.map(p => `
                <div class="card">
                    <img src="${p.img}">
                    <h4>${p.name}</h4>
                    <span class="price">${p.price} €</span>
                    <div id="controls-${p.id}">
                        <button class="btn-action" onclick="updateCart(${p.id}, 1)">+</button>
                    </div>
                </div>
            `).join('');
        }

        function updateCart(id, delta) {
            cart[id] = (cart[id] || 0) + delta;
            if (cart[id] <= 0) delete cart[id];
            
            const controlDiv = document.getElementById(`controls-${id}`);
            const count = cart[id] || 0;
            controlDiv.innerHTML = `
                ${count > 0 ? `<button class="btn-action" style="background:#f0f0f0;color:#000" onclick="updateCart(${id}, -1)">-</button><span style="margin:0 10px">${count}</span>` : ''}
                <button class="btn-action" onclick="updateCart(${id}, 1)">+</button>
            `;
            updateInterface();
        }

        function updateInterface() {
            const count = Object.values(cart).reduce((a, b) => a + b, 0);
            const modalOpen = document.getElementById('cart-modal').classList.contains('open');
            
            if (count > 0) {
                tg.MainButton.setText(modalOpen ? "VALIDER LA COMMANDE" : `VOIR LE PANIER (${count})`);
                tg.MainButton.show();
            } else {
                tg.MainButton.hide();
                if (modalOpen) closeCart();
            }
        }

        function updateCartModal() {
            const content = document.getElementById('cart-content');
            let total = 0;
            let html = "";
            products.forEach(p => {
                if (cart[p.id]) {
                    const subtotal = p.price * cart[p.id];
                    total += subtotal;
                    html += `<div class="cart-item"><span>${p.name} (x${cart[p.id]})</span><span>${subtotal} €</span></div>`;
                }
            });
            content.innerHTML = html || "<p>Panier vide</p>";
            document.getElementById('total-price').innerText = total;
        }

        function openCart() {
            updateCartModal();
            document.getElementById('cart-modal').classList.add('open');
            tg.BackButton.show();
            updateInterface();
        }

        function closeCart() {
            document.getElementById('cart-modal').classList.remove('open');
            tg.BackButton.hide();
            updateInterface();
        }

        tg.onEvent('mainButtonClicked', function() {
            if (!document.getElementById('cart-modal').classList.contains('open')) {
                openCart();
            } else {
                tg.sendData(JSON.stringify({cart: cart}));
            }
        });

        tg.onEvent('backButtonClicked', closeCart);
        window.onload = initialRender;
    </script>
</body>
</html>
