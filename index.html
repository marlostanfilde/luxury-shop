<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MAISON LUXE | Officiel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A059; --black: #080808; --gray: #1a1a1a; --border: rgba(197, 160, 89, 0.2); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; background: var(--black); color: white; padding-bottom: 120px; }

        /* HEADER */
        .header { padding: 50px 20px 20px; text-align: center; background: linear-gradient(to bottom, #151515, var(--black)); }
        .logo { font-family: 'Cinzel', serif; font-size: 30px; letter-spacing: 10px; color: var(--gold); margin: 0; }
        
        /* NAV & FILTRES */
        .nav-container { position: sticky; top: 0; z-index: 100; background: rgba(8,8,8,0.9); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); }
        .categories { display: flex; gap: 20px; overflow-x: auto; padding: 15px 20px; scrollbar-width: none; }
        .cat-btn { background: none; border: none; color: #666; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; cursor: pointer; }
        .cat-btn.active { color: var(--gold); }

        /* GRILLE PRODUITS */
        .container { padding: 20px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .product-card { background: var(--gray); border: 1px solid var(--border); padding: 10px; transition: 0.3s; }
        .product-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; margin-bottom: 10px; }
        .p-brand { font-size: 8px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }
        .p-name { font-size: 11px; margin: 5px 0; font-weight: 300; height: 30px; overflow: hidden; }
        .p-price { font-size: 12px; font-weight: 700; }

        /* BARRE DE CONCIERGERIE (SAV) */
        .concierge-bar { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: rgba(10,10,10,0.98); border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; padding: 20px; z-index: 500;
        }
        .sav-link { text-decoration: none; color: #fff; font-size: 9px; letter-spacing: 2px; text-align: center; opacity: 0.8; }
        .sav-link i { display: block; font-size: 18px; color: var(--gold); margin-bottom: 5px; font-style: normal; }

        /* MODALE PRODUIT */
        .modal { position: fixed; inset: 0; background: var(--black); z-index: 1000; display: none; flex-direction: column; }
        .modal.open { display: flex; }
        .modal-content { padding: 30px; text-align: center; flex-grow: 1; }
        .btn-add { background: var(--gold); color: black; border: none; padding: 20px; width: 100%; font-weight: 700; letter-spacing: 2px; cursor: pointer; }
    </style>
</head>
<body>

    <header class="header">
        <h1 class="logo">MAISON LUXE</h1>
        <div id="user-greeting" style="font-size: 9px; letter-spacing: 3px; color: var(--gold); margin-top: 10px;">CHARGEMENT...</div>
    </header>

    <div class="nav-container">
        <div class="categories">
            <button class="cat-btn active" onclick="filterCat('all', this)">Tous les modèles</button>
            <button class="cat-btn" onclick="filterCat('Horlogerie', this)">Horlogerie</button>
            <button class="cat-btn" onclick="filterCat('Maroquinerie', this)">Maroquinerie</button>
        </div>
    </div>

    <div class="container">
        <div id="grid" class="product-grid"></div>
    </div>

    <div class="concierge-bar">
        <a href="https://wa.me/33600000000" class="sav-link"><i>💬</i> WHATSAPP</a>
        <a href="https://t.me/ton_pseudo" class="sav-link"><i>👤</i> CONCIERGE</a>
        <div class="sav-link" onclick="tg.showAlert('Garantie internationale de 24 mois incluse.')"><i>🛡️</i> GARANTIE</div>
    </div>

    <div id="product-modal" class="modal">
        <div id="modal-body" class="modal-content"></div>
        <button id="add-btn" class="btn-add">AJOUTER À LA SÉLECTION</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let cart = [];
        const products = [
            { id: 1, cat: "Horlogerie", brand: "Rolex", name: "Submariner Date", price: 14500, img: "https://images.unsplash.com/photo-1523170335258-f5ed11844a49?w=600" },
            { id: 2, cat: "Maroquinerie", brand: "Hermès", name: "Sac Birkin 30", price: 22000, img: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=600" },
            { id: 3, cat: "Horlogerie", brand: "Audemars Piguet", name: "Royal Oak", price: 45000, img: "https://images.unsplash.com/photo-1614164185128-e4ec99c436d7?w=600" }
        ];

        function renderGrid(filter = 'all') {
            const grid = document.getElementById('grid');
            const filtered = filter === 'all' ? products : products.filter(p => p.cat === filter);
            grid.innerHTML = filtered.map(p => `
                <div class="product-card" onclick="openProduct(${p.id})">
                    <img src="${p.img}">
                    <div class="p-brand">${p.brand}</div>
                    <div class="p-name">${p.name}</div>
                    <div class="p-price">${p.price.toLocaleString()} €</div>
                </div>
            `).join('');
        }

        function filterCat(cat, el) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            renderGrid(cat);
        }

        function openProduct(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('modal-body').innerHTML = `
                <img src="${p.img}" style="width:100%; margin-bottom:20px; border: 1px solid var(--border);">
                <div class="p-brand">${p.brand}</div>
                <h2 style="font-family:'Cinzel'; color:var(--gold);">${p.name}</h2>
                <div style="font-size:24px; margin:20px 0;">${p.price.toLocaleString()} €</div>
                <p style="font-size:12px; color:#888;">Pièce d'exception disponible immédiatement.</p>
            `;
            document.getElementById('add-btn').onclick = () => addToCart(p);
            document.getElementById('product-modal').classList.add('open');
            tg.BackButton.show();
        }

        tg.onEvent('backButtonClicked', () => {
            document.getElementById('product-modal').classList.remove('open');
            tg.BackButton.hide();
        });

        function addToCart(product) {
            cart.push(product);
            tg.HapticFeedback.notificationOccurred('success');
            document.getElementById('product-modal').classList.remove('open');
            tg.BackButton.hide();
            updateMainButton();
        }

        function updateMainButton() {
            const total = cart.reduce((sum, i) => sum + i.price, 0);
            tg.MainButton.setText(`VALIDER LA COMMANDE (${total.toLocaleString()} €)`);
            tg.MainButton.setParams({ color: "#C5A059", text_color: "#000000" });
            tg.MainButton.show();
        }

        // ENVOI COMPLET AU BOT
        tg.onEvent('mainButtonClicked', () => {
            const total = cart.reduce((sum, i) => sum + i.price, 0);
            const recapCommande = {
                client: tg.initDataUnsafe?.user?.first_name || "Client",
                username: tg.initDataUnsafe?.user?.username || "N/A",
                articles: cart.map(item => ({
                    nom: item.name,
                    marque: item.brand,
                    prix: item.price.toLocaleString() + " €"
                })),
                total_a_payer: total.toLocaleString() + " €",
                date: new Date().toLocaleString('fr-FR')
            };

            tg.sendData(JSON.stringify(recapCommande));
        });

        if (tg.initDataUnsafe?.user) {
            document.getElementById('user-greeting').innerText = `BIENVENUE, ${tg.initDataUnsafe.user.first_name.toUpperCase()}`;
        }
        renderGrid();
    </script>
</body>
</html>
