<script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // --- CONFIGURATION DES BOUTONS ---
        tg.MainButton.setParams({ color: '#c5a059', text_color: '#ffffff' });
        
        // On remet le bouton SAV (Secondary Button)
        tg.SecondaryButton.setParams({ 
            text: "💬 CONTACT SAV", 
            is_visible: true, 
            color: "#222222",
            text_color: "#c5a059"
        });

        const products = [
            { id: 1, category: "Habille", name: "Veste Luxe", price: 280, img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=400", sizes: ["S", "M", "L"] },
            { id: 2, category: "Accessoire", name: "Sac à main Noir", price: 450, img: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=400" },
            { id: 3, category: "Parfum", name: "Parfum Signature", price: 110, img: "https://images.unsplash.com/photo-1523293182086-7651a899d37f?w=400" },
            { id: 4, category: "Chaussures", name: "Sneakers Cuir", price: 320, img: "https://images.unsplash.com/photo-1549298916-b41d501d3772?w=400" }
        ];

        let cart = [];
        let selectedSize = null;

        function showCategory(cat) {
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('products-section').style.display = 'block';
            document.getElementById('cat-label').innerText = cat.toUpperCase();
            renderGrid(products.filter(p => p.category === cat));
            tg.BackButton.show();
        }

        function goBack() {
            document.getElementById('home-page').style.display = 'block';
            document.getElementById('products-section').style.display = 'none';
            tg.BackButton.hide();
        }

        function renderGrid(data) {
            document.getElementById('grid').innerHTML = data.map(p => {
                const qte = cart.filter(i => i.id === p.id).reduce((s, i) => s + i.qty, 0);
                return `<div class="product-card" onclick="openProduct(${p.id})">${qte > 0 ? `<div class="badge">${qte}</div>` : ''}<img src="${p.img}"><h4>${p.name}</h4><p style="color:var(--gold)">${p.price}€</p></div>`;
            }).join('');
        }

        function openProduct(id) {
            const p = products.find(i => i.id === id);
            selectedSize = null;
            let sizes = p.sizes ? `<div style="display:flex; gap:10px; margin:15px 0; justify-content:center;">${p.sizes.map(s => `<div class="size-opt" onclick="selSize(this, '${s}')">${s}</div>`).join('')}</div>` : '';
            document.getElementById('product-detail').innerHTML = `<img src="${p.img}" style="width:100%; border-radius:10px;"><h2>${p.name}</h2><p>${p.price}€</p>${sizes}<button class="btn-gold" onclick="add(${p.id})">AJOUTER AU PANIER</button>`;
            document.getElementById('product-modal').classList.add('open');
        }

        window.selSize = (el, s) => { document.querySelectorAll('.size-opt').forEach(b => b.style.background = 'none'); el.style.background = 'var(--gold)'; selectedSize = s; };

        function add(id) {
            const p = products.find(i => i.id === id);
            if (p.sizes && !selectedSize) { tg.showAlert("Choisis une taille !"); return; }
            const ex = cart.find(it => it.id === id && it.size === selectedSize);
            if (ex) ex.qty++; else cart.push({ ...p, size: selectedSize, qty: 1 });
            closeModal(); updateUI();
        }

        function updateUI() {
            const count = cart.reduce((s, i) => s + i.qty, 0);
            if (count > 0) { 
                tg.MainButton.setText(`VOIR LE PANIER (${count})`); 
                tg.MainButton.show(); 
            } else {
                tg.MainButton.hide();
            }
        }

        function showCart() {
            let total = 0;
            let html = cart.length ? "" : "<p style='text-align:center;'>Panier vide</p>";
            cart.forEach((item, index) => {
                total += item.price * item.qty;
                html += `<div class="cart-item"><div><b>${item.name} ${item.size ? `[${item.size}]` : ''}</b><br>${item.price}€ x ${item.qty}</div><button onclick="remove(${index})" style="background:none; border:none; color:red;">✕</button></div>`;
            });
            document.getElementById('cart-content').innerHTML = html;
            document.getElementById('total-price').innerText = total;
            document.getElementById('cart-modal').classList.add('open');
            tg.MainButton.setText(`COMMANDER (${total}€)`);
        }

        function remove(i) { cart.splice(i, 1); showCart(); updateUI(); }
        function closeModal() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('open')); updateUI(); }

        // --- GESTION DES CLICS SUR LES BOUTONS DU BAS ---
        
        // Clic sur "VOIR PANIER" ou "COMMANDER"
        tg.onEvent('mainButtonClicked', () => {
            if (!document.getElementById('cart-modal').classList.contains('open')) {
                showCart();
            } else {
                tg.sendData(JSON.stringify(cart)); // Envoi au bot
                tg.close();
            }
        });

        // Clic sur "CONTACT SAV"
        tg.onEvent('secondaryButtonClicked', () => {
            tg.openTelegramLink("https://t.me/toulouse315"); 
        });

        tg.onEvent('backButtonClicked', goBack);
    </script>
