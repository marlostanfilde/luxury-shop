<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MAISON LUXE PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A059; --black: #050505; }
        body { font-family: 'Montserrat', sans-serif; background: var(--black); color: white; margin: 0; padding-bottom: 100px; }
        .header { padding: 30px; text-align: center; border-bottom: 1px solid rgba(197,160,89,0.2); }
        .logo { font-family: 'Cinzel', serif; letter-spacing: 8px; color: var(--gold); }
        
        /* Nav ultra-rapide */
        .nav { display: flex; overflow-x: auto; padding: 10px; gap: 15px; position: sticky; top: 0; background: rgba(5,5,5,0.9); z-index: 10; border-bottom: 1px solid #222; }
        .nav button { background: none; border: none; color: #666; font-size: 10px; letter-spacing: 1px; white-space: nowrap; cursor: pointer; }
        .nav button.active { color: var(--gold); font-weight: bold; }

        /* Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .item { background: #111; padding: 10px; border: 1px solid #222; text-align: center; }
        .item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .item-name { font-size: 10px; margin: 5px 0; height: 25px; overflow: hidden; }
        .item-price { color: var(--gold); font-weight: bold; font-size: 11px; }

        /* Panier */
        .cart-ui { margin: 15px; padding: 15px; border: 1px dashed var(--gold); display: none; font-size: 11px; }
        .cart-ui.show { display: block; }
    </style>
</head>
<body>

    <div class="header"><div class="logo">MAISON LUXE</div></div>

    <div class="nav" id="cat-nav">
        <button class="active" onclick="render('all')">TOUT</button>
        <button onclick="render('Habille')">HABILLEMENT</button>
        <button onclick="render('Chaussures')">SOULIERS</button>
        <button onclick="render('Horlogerie')">HORLOGERIE</button>
    </div>

    <div id="grid" class="grid"></div>

    <div id="cart-box" class="cart-ui">
        <div style="color:var(--gold); margin-bottom:10px;">VOTRE SÉLECTION :</div>
        <div id="cart-list"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let cart = [];
        const products = [
            { cat: 'Habille', b: 'Dior', n: 'Manteau Cachemire', p: 4500, i: 'https://images.unsplash.com/photo-1539533018447-63fcce2678e3?w=400' },
            { cat: 'Chaussures', b: 'Berluti', n: 'Alessandro Edge', p: 1800, i: 'https://images.unsplash.com/photo-1549298916-b41d501d3772?w=400' },
            { cat: 'Horlogerie', b: 'Rolex', n: 'Daytona Panda', p: 38500, i: 'https://images.unsplash.com/photo-1523170335258-f5ed11844a49?w=400' }
        ];

        function render(filter) {
            // Gestion visuelle des boutons
            const btns = document.querySelectorAll('#cat-nav button');
            btns.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            const items = filter === 'all' ? products : products.filter(x => x.cat === filter);
            document.getElementById('grid').innerHTML = items.map((x, idx) => `
                <div class="item" onclick="add(${idx})">
                    <img src="${x.i}">
                    <div style="font-size:8px; color:var(--gold)">${x.b}</div>
                    <div class="item-name">${x.n}</div>
                    <div class="item-price">${x.p.toLocaleString()} €</div>
                </div>
            `).join('');
        }

        function add(idx) {
            const p = products[idx];
            cart.push(p);
            tg.HapticFeedback.impactOccurred('medium');
            
            // Mise à jour Panier
            document.getElementById('cart-box').classList.add('show');
            document.getElementById('cart-list').innerHTML = cart.map(c => `• ${c.n} (${c.p}€)`).join('<br>');
            
            // Bouton Telegram
            const total = cart.reduce((s, x) => s + x.p, 0);
            tg.MainButton.setText(`ACQUÉRIR (${total.toLocaleString()} €)`);
            tg.MainButton.show();
        }

        tg.onEvent('mainButtonClicked', () => {
            const total = cart.reduce((s, x) => s + x.p, 0);
            const data = {
                user: tg.initDataUnsafe?.user?.first_name || "Client",
                items: cart.map(c => c.n),
                total: total + "€"
            };
            tg.sendData(JSON.stringify(data));
        });

        render('all');
    </script>
</body>
</html>
