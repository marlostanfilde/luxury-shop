<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUXURY SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #c5a059; --bg: #0f0f0f; --card: rgba(255,255,255,0.05); }
        body { font-family: 'Georgia', serif; margin: 0; padding: 15px; background: #0f0f0f; color: white; padding-bottom: 100px; }
        
        /* HEADER AVEC TES PHRASES D'ACCROCHE */
        .header { text-align: center; padding: 25px 0; }
        .logo { font-size: 30px; letter-spacing: 6px; color: var(--gold); font-weight: bold; margin: 0; }
        .phrase-1 { font-size: 11px; letter-spacing: 3px; color: #888; text-transform: uppercase; margin-top: 5px; }
        .phrase-2 { font-style: italic; color: #aaa; margin-top: 10px; font-size: 14px; }
        .phrase-3 { color: var(--gold); font-size: 12px; margin-top: 5px; opacity: 0.8; }

        /* BOUTON SAV */
        .sav-button { display: block; width: fit-content; margin: 15px auto; border: 1px solid var(--gold); padding: 8px 20px; border-radius: 20px; color: var(--gold); text-decoration: none; font-size: 11px; letter-spacing: 1px; font-weight: bold; }

        /* RUBRIQUES */
        #categories-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .cat-card { position: relative; height: 160px; border-radius: 12px; overflow: hidden; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .cat-card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); transition: 0.3s; }
        .cat-title { position: absolute; bottom: 12px; width: 100%; text-align: center; font-size: 12px; font-weight: bold; color: var(--gold); letter-spacing: 1.5px; }

        /* GRILLE PRODUITS */
        #products-section { display: none; }
        #grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .product-card { background: var(--card); border-radius: 12px; padding: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .product-card img { width: 100%; height: 130px; object-fit: cover; border-radius: 8px; }
        .badge { position: absolute; top: -5px; right: -5px; background: #ff4444; color: white; border-radius: 50%; width: 22px; height: 22px; font-size: 11px; display: flex; align-items: center; justify-content: center; }

        /* BOUTONS DE TAILLES */
        .size-container { display: flex; gap: 10px; margin: 20px 0; justify-content: center; flex-wrap: wrap; }
        .size-opt { border: 1px solid var(--gold); padding: 10px 18px; border-radius: 8px; cursor: pointer; color: white; background: rgba(197, 160, 89, 0.1); font-weight: bold; }
        .size-opt.selected { background: var(--gold); color: black; }

        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0c0c0c; z-index: 9999; padding: 25px; display: none; flex-direction: column; overflow-y: auto; }
        .modal.open { display: flex; }
        .btn-gold { background: var(--gold); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; width: 100%; margin-top: 25px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="logo">LUXURY SHOP</h1>
        <div class="phrase-1">L'Art du Luxe à portée de main</div>
        <div class="phrase-2">"L'élégance n'est pas de se faire remarquer, mais de se faire retenir."</div>
        <div class="phrase-3">Sélection exclusive de pièces rares</div>
    </div>
    
    <div id="home-page">
        <a href="https://t.me/toulouse315" class="sav-button">💬 CONTACTER LE SAV DIRECTEMENT</a>

        <div id="categories-menu">
            <div class="cat-card" onclick="showCategory('Habille')">
                <img src="https://images.unsplash.com/photo-1441984904996-e0b6ba687e04?w=400"><div class="cat-title">PRÊT-À-PORTER</div>
            </div>
            <div class="cat-card" onclick="showCategory('Accessoire')">
                <img src="https://images.unsplash.com/photo-1547949003-9792a18a2601?w=400"><div class="cat-title">ACCESSOIRES</div>
            </div>
            <div class="cat-card" onclick="showCategory('Parfum')">
                <img src="https://images.unsplash.com/photo-1541643600914-78b084683601?w=400"><div class="cat-title">PARFUMS</div>
            </div>
            <div class="cat-card" onclick="showCategory('Chaussures')">
                <img src="https://images.unsplash.com/photo-1549298916-b41d501d3772?w=400"><div class="cat-title">CHAUSSURES</div>
            </div>
        </div>
    </div>

    <div id="products-section">
        <button onclick="goBack()" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:8px 15px; border-radius:8px; cursor:pointer;">← RETOUR</button>
        <h3 id="cat-label" style="color:var(--gold); text-align:center; letter-spacing:3px;"></h3>
        <div id="grid"></div>
    </div>

    <div id="cart-modal" class="modal">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="color:var(--gold);">MON PANIER</h2>
            <span onclick="closeModal()" style="font-size:35px; cursor:pointer;">✕</span>
        </div>
        <div id="cart-content" style="flex-grow:1; margin-top:20px;"></div>
        <div style="font-size:1.4em; padding:20px 0; border-top:1px solid var(--gold);">Total : <span id="total-price" style="color:var(--gold);">0</span> €</div>
    </div>

    <div id="product-modal" class="modal">
        <span onclick="closeModal()" style="align-self:flex-end; font-size:35px; cursor:pointer;">✕</span>
        <div id="product-detail"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand(); tg.ready();
        tg.MainButton.setParams({ color: '#c5a059', text_color: '#ffffff' });

        const products = [
            { id: 1, category: "Habille", name: "Veste Luxe", price: 280, img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=400", sizes: ["S", "M", "L", "XL"] },
            { id: 2, category: "Accessoire", name: "Sac à main Noir", price: 450, img: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=400" },
            { id: 3, category: "Parfum", name: "Parfum Signature", price: 110, img: "https://images.unsplash.com/photo-1523293182086-7651a899d37f?w=400" },
            { id: 4, category: "Chaussures", name: "Sneakers Cuir", price: 320, img: "https://images.unsplash.com/photo-1549298916-b41d501d3772?w=400", sizes: ["40", "41", "42", "43", "44"] }
        ];

        let cart = [];
        let selectedSize = null;

        function showCategory(cat) {
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('products-section').style.display = 'block';
            document.getElementById('cat-label').innerText = cat.toUpperCase();
            renderGrid(products.filter(p => p.category === cat));
            tg.BackButton.show();
        }

        function goBack() {
            document.getElementById('home-page').style.display = 'block';
            document.getElementById('products-section').style.display = 'none';
            tg.BackButton.hide();
        }

        function renderGrid(data) {
            document.getElementById('grid').innerHTML = data.map(p => {
                const qte = cart.filter(i => i.id === p.id).reduce((s, i) => s + i.qty, 0);
                return `<div class="product-card" onclick="openProduct(${p.id})">
                    ${qte > 0 ? `<div class="badge">${qte}</div>` : ''}
                    <img src="${p.img}">
                    <h4>${p.name}</h4><p style="color:var(--gold)">${p.price}€</p>
                </div>`;
            }).join('');
        }

        function openProduct(id) {
            const p = products.find(i => i.id === id);
            selectedSize = null;
            let sizes = p.sizes ? `<div class="size-container">${p.sizes.map(s => `<div class="size-opt" onclick="selSize(this, '${s}')">${s}</div>`).join('')}</div>` : '';
            document.getElementById('product-detail').innerHTML = `<img src="${p.img}" style="width:100%; border-radius:12px; height:280px; object-fit:cover;"><h2 style="color:var(--gold);">${p.name}</h2><div style="font-size:24px; font-weight:bold;">${p.price}€</div>${sizes}<button class="btn-gold" onclick="add(${p.id})">AJOUTER AU PANIER</button>`;
            document.getElementById('product-modal').classList.add('open');
        }

        window.selSize = (el, s) => { document.querySelectorAll('.size-opt').forEach(b => b.classList.remove('selected')); el.classList.add('selected'); selectedSize = s; };

        function add(id) {
            const p = products.find(i => i.id === id);
            if (p.sizes && !selectedSize) { tg.showAlert("Sélectionnez votre taille."); return; }
            const ex = cart.find(it => it.id === id && it.size === selectedSize);
            if (ex) ex.qty++; else cart.push({ ...p, size: selectedSize, qty: 1 });
            closeModal(); updateUI();
        }

        function updateUI() {
            const count = cart.reduce((s, i) => s + i.qty, 0);
            if (count > 0) { tg.MainButton.setText(`VOIR LE PANIER (${count})`); tg.MainButton.show(); } else { tg.MainButton.hide(); }
        }

        function showCart() {
            let total = 0;
            let html = cart.length ? "" : "<p>Votre panier est vide.</p>";
            cart.forEach((item, index) => {
                total += item.price * item.qty;
                html += `<div style="display:flex; align-items:center; gap:15px; padding:15px 0; border-bottom:1px solid rgba(255,255,255,0.05);">
                    <div style="flex-grow:1"><b>${item.name}</b> ${item.size ? `[${item.size}]` : ''}<br>${item.price}€ x ${item.qty}</div>
                    <button onclick="remove(${index})" style="background:none; border:none; color:red; font-size:22px;">✕</button>
                </div>`;
            });
            document.getElementById('cart-content').innerHTML = html;
            document.getElementById('total-price').innerText = total;
            document.getElementById('cart-modal').classList.add('open');
            tg.MainButton.setText(`VALIDER LA COMMANDE (${total}€)`);
        }

        function remove(i) { cart.splice(i, 1); showCart(); updateUI(); }
        function closeModal() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('open')); updateUI(); }

        tg.onEvent('mainButtonClicked', () => {
            if (!document.getElementById('cart-modal').classList.contains('open')) showCart();
            else { tg.sendData(JSON.stringify(cart)); tg.close(); }
        });
        tg.onEvent('backButtonClicked', goBack);
    </script>
</body>
</html>
