<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MAISON LUXE</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --gold: #C5A059;
    --black: #050505;
    --grey: #1a1a1a;
}

body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: var(--black);
    color: white;
}

.header {
    padding: 40px 20px;
    text-align: center;
    border-bottom: 1px solid rgba(197,160,89,0.2);
}

.logo {
    font-family: 'Cinzel', serif;
    letter-spacing: 8px;
    font-size: 20px;
    color: var(--gold);
}

.tabs {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    padding: 15px;
    position: sticky;
    top: 0;
    background: var(--black);
    z-index: 10;
}

.tab {
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid #333;
    font-size: 10px;
    text-transform: uppercase;
    cursor: pointer;
}

.tab.active {
    background: var(--gold);
    color: black;
    border-color: var(--gold);
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 12px;
}

.card {
    background: var(--grey);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
}

.card img {
    width: 100%;
    border-radius: 6px;
}

.card-brand {
    font-size: 9px;
    color: var(--gold);
    letter-spacing: 2px;
    margin-top: 6px;
}

.card-name {
    font-size: 11px;
    margin: 6px 0;
    min-height: 28px;
}

.card-price {
    font-weight: 600;
}

.add-btn {
    margin-top: 8px;
    padding: 8px;
    width: 100%;
    border: 1px solid var(--gold);
    background: transparent;
    color: var(--gold);
    font-size: 10px;
    border-radius: 4px;
}

.cart-badge {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--gold);
    color: black;
    padding: 10px 18px;
    border-radius: 30px;
    font-weight: 600;
    display: none;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">MAISON LUXE</div>
    <div id="greeting" style="font-size:10px;color:#777;margin-top:8px;">CHARGEMENT...</div>
</div>

<div class="tabs">
    <div class="tab active" data-cat="all">Tous</div>
    <div class="tab" data-cat="horlogerie">Horlogerie</div>
    <div class="tab" data-cat="maroquinerie">Maroquinerie</div>
    <div class="tab" data-cat="joaillerie">Joaillerie</div>
    <div class="tab" data-cat="parfumerie">Parfumerie</div>
    <div class="tab" data-cat="edition">Éditions Limitées</div>
</div>

<div class="grid" id="grid"></div>
<div class="cart-badge" id="cartBadge"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

/* PRODUITS COMPLETS */

const PRODUCTS = [

{ id:1, cat:"horlogerie", brand:"ROLEX", name:"Submariner Date", price:14500, img:"https://images.unsplash.com/photo-1547996160-81dfa63595dd?w=400" },
{ id:2, cat:"maroquinerie", brand:"HERMÈS", name:"Birkin 30 Togo", price:22000, img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=400" },
{ id:3, cat:"joaillerie", brand:"CARTIER", name:"Bracelet Love Or", price:7800, img:"https://images.unsplash.com/photo-1611591437281-460bfbe1220a?w=400" },
{ id:4, cat:"horlogerie", brand:"AUDEMARS PIGUET", name:"Royal Oak Blue", price:55000, img:"https://images.unsplash.com/photo-1614164185128-e4ec99c436d7?w=400" },

{ id:5, cat:"parfumerie", brand:"DIOR", name:"Sauvage Elixir", price:210, img:"https://images.unsplash.com/photo-1594035910387-fea47794261f?w=400" },
{ id:6, cat:"parfumerie", brand:"CHANEL", name:"Bleu de Chanel Parfum", price:185, img:"https://images.unsplash.com/photo-1619994403073-2cec3f3e4b04?w=400" },

{ id:7, cat:"maroquinerie", brand:"LOUIS VUITTON", name:"Keepall 50", price:2450, img:"https://images.unsplash.com/photo-1593032465171-8c0e9c6cbb3f?w=400" },
{ id:8, cat:"joaillerie", brand:"BVLGARI", name:"B.Zero1 Ring", price:3200, img:"https://images.unsplash.com/photo-1605100804763-247f67b3557e?w=400" },

{ id:9, cat:"horlogerie", brand:"PATEK PHILIPPE", name:"Nautilus 5711", price:120000, img:"https://images.unsplash.com/photo-1518544801976-3e159e50e5bb?w=400" },

{ id:10, cat:"edition", brand:"RICHARD MILLE", name:"RM 07-01 Limited", price:380000, img:"https://images.unsplash.com/photo-1523170335258-f5ed11844a49?w=400" },
{ id:11, cat:"edition", brand:"HERMÈS", name:"Birkin Himalaya", price:450000, img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=400" }

];

let state = {
    cart: JSON.parse(localStorage.getItem("cart")) || [],
    category: "all"
};

function formatPrice(p){
    return p.toLocaleString("fr-FR") + " €";
}

function renderProducts(){
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    const list = state.category === "all"
        ? PRODUCTS
        : PRODUCTS.filter(p => p.cat === state.category);

    list.forEach(p=>{
        grid.innerHTML += `
        <div class="card">
            <img src="${p.img}">
            <div class="card-brand">${p.brand}</div>
            <div class="card-name">${p.name}</div>
            <div class="card-price">${formatPrice(p.price)}</div>
            <button class="add-btn" onclick="addToCart(${p.id})">ACQUÉRIR</button>
        </div>
        `;
    });
}

function updateCartUI(){
    const badge = document.getElementById("cartBadge");
    const total = state.cart.reduce((s,i)=>s+i.price,0);

    if(state.cart.length === 0){
        badge.style.display="none";
        tg.MainButton.hide();
        return;
    }

    badge.style.display="block";
    badge.innerText = `${state.cart.length} PIÈCE(S) • ${formatPrice(total)}`;

    tg.MainButton.text = `FINALISER (${formatPrice(total)})`;
    tg.MainButton.setParams({color:"#C5A059",text_color:"#000000"});
    tg.MainButton.show();
}

function addToCart(id){
    const product = PRODUCTS.find(p=>p.id===id);
    state.cart.push(product);
    localStorage.setItem("cart", JSON.stringify(state.cart));
    tg.HapticFeedback.notificationOccurred("success");
    updateCartUI();
}

document.querySelectorAll(".tab").forEach(tab=>{
    tab.addEventListener("click", ()=>{
        document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
        tab.classList.add("active");
        state.category = tab.dataset.cat;
        renderProducts();
    });
});

tg.onEvent("mainButtonClicked", ()=>{
    const total = state.cart.reduce((s,i)=>s+i.price,0);

    tg.showConfirm(`Confirmer la demande pour ${formatPrice(total)} ?`, ok=>{
        if(ok){
            tg.sendData(JSON.stringify({
                user_id: tg.initDataUnsafe?.user?.id,
                items: state.cart.map(i=>({id:i.id})),
                total: total
            }));
        }
    });
});

function init(){
    if(tg.initDataUnsafe?.user){
        document.getElementById("greeting").innerText =
        "BIENVENUE, " + tg.initDataUnsafe.user.first_name.toUpperCase();
    }
    renderProducts();
    updateCartUI();
}

init();
</script>

</body>
</html>
