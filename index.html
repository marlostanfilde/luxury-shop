<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MAISON LUXE | SYSTÈME AVANCÉ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A059; --black: #050505; --dark-grey: #121212; --border: rgba(197, 160, 89, 0.2); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Montserrat', sans-serif; background: var(--black); color: white; margin: 0; padding-bottom: 150px; overflow-x: hidden; }

        /* HEADER */
        .header { padding: 50px 20px 30px; border-bottom: 1px solid var(--border); text-align: center; background: linear-gradient(180deg, #111 0%, var(--black) 100%); }
        .logo { font-family: 'Cinzel', serif; font-size: 24px; letter-spacing: 12px; color: var(--gold); text-transform: uppercase; margin: 0; }

        /* NAVIGATION */
        .nav-scroller { position: sticky; top: 0; z-index: 100; background: rgba(5,5,5,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .nav-tabs { display: flex; overflow-x: auto; padding: 15px 20px; gap: 25px; scrollbar-width: none; }
        .nav-tabs::-webkit-scrollbar { display: none; }
        .tab-item { color: #666; font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; border: none; background: none; transition: 0.3s; padding-bottom: 5px; cursor: pointer; white-space: nowrap; }
        .tab-item.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        /* GRID */
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: var(--border); border-top: 1px solid var(--border); }
        .product-item { background: var(--black); padding: 25px 15px; text-align: center; }
        .product-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .p-brand { font-size: 8px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
        .p-name { font-size: 10px; font-weight: 200; height: 24px; overflow: hidden; margin-bottom: 10px; }
        .p-price { font-size: 12px; font-weight: 600; color: #fff; }

        /* PANIER VISUEL (RÉCAPITULATIF) */
        .cart-container { margin: 20px; padding: 15px; background: var(--dark-grey); border: 1px dashed var(--gold); display: none; }
        .cart-container.active { display: block; }
        .cart-title { font-family: 'Cinzel', serif; font-size: 12px; color: var(--gold); margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; font-size: 10px; margin-bottom: 10px; }
        .cart-item-info { flex-grow: 1; }
        .remove-btn { color: #ff4444; margin-left: 15px; font-weight: bold; cursor: pointer; padding: 5px; }

        /* FOOTER */
        .footer-nav { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 15px 10px; z-index: 1000; }
        .nav-link { color: #555; text-decoration: none; font-size: 9px; text-align: center; cursor: pointer; }
        .nav-link i { display: block; font-size: 18px; color: var(--gold); margin-bottom: 5px; font-style: normal; }
    </style>
</head>
<body>

    <header class="header">
        <h1 class="logo">Maison Luxe</h1>
        <p id="user-greeting" style="font-size: 9px; color: #444; margin-top: 15px; letter-spacing: 3px;">BIENVENUE</p>
    </header>

    <div class="nav-scroller">
        <div class="nav-tabs">
            <button class="tab-item active" onclick="filter('all', this)">Collection</button>
            <button class="tab-item" onclick="filter('habille', this)">Habille Luxe</button>
            <button class="tab-item" onclick="filter('chaussures', this)">Chaussures</button>
            <button class="tab-item" onclick="filter('horlogerie', this)">Horlogerie</button>
            <button class="tab-item" onclick="filter('maroquinerie', this)">Maroquinerie</button>
        </div>
    </div>

    <div class="container">
        <div id="grid" class="grid-container"></div>

        <div id="cart-ui" class="cart-container">
            <div class="cart-title">VOTRE SÉLECTION</div>
            <div id="cart-list"></div>
            <div id="total-price" style="text-align: right; margin-top: 15px; font-weight: 600; color: var(--gold);"></div>
        </div>
    </div>

    <nav class="footer-nav">
        <div class="nav-link" onclick="tg.openTelegramLink('https://t.me/ton_pseudo')"><i>👤</i>CONCIERGE</div>
        <div class="nav-link" onclick="tg.showAlert('LIVRAISON :\n🇫🇷 France : 24h\n🇪🇺 Europe : 48h\n🌎 Monde : 3-5 jours')"><i>📦</i>LOGISTIQUE</div>
        <div class="nav-link" onclick="resetCart()"><i>🗑️</i>VIDER</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let cart = [];
        const products = [
            { id: 1, cat: 'habille', b: 'HERMÈS', n: 'Manteau Cachemire', p: 4200, i: 'https://images.unsplash.com/photo-1539533018447-63fcce2678e3?w=600' },
            { id: 2, cat: 'chaussures', b: 'BERLUTI', n: 'Richelieu Alessandro', p: 1850, i: 'https://images.unsplash.com/photo-1549298916-b41d501d3772?w=600' },
            { id: 3, cat: 'horlogerie', b: 'ROLEX', n: 'Daytona Panda', p: 38500, i: 'https://images.unsplash.com/photo-1523170335258-f5ed11844a49?w=600' },
            { id: 4, cat: 'maroquinerie', b: 'HERMÈS', n: 'Birkin 30 Togo', p: 21500, i: 'https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=600' }
        ];

        function render(cat = 'all') {
            const grid = document.getElementById('grid');
            const items = cat === 'all' ? products : products.filter(x => x.cat === cat);
            grid.innerHTML = items.map(p => `
                <div class="product-item" onclick="addToCart(${p.id})">
                    <img src="${p.img}" class="product-img">
                    <div class="p-brand">${p.b}</div>
                    <div class="p-name">${p.n}</div>
                    <div class="p-price">${p.p.toLocaleString()} €</div>
                </div>
            `).join('');
        }

        function filter(cat, el) {
            document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            render(cat);
            tg.HapticFeedback.impactOccurred('light');
        }

        function addToCart(id) {
            const product = products.find(x => x.id === id);
            cart.push({...product, cartId: Date.now()});
            tg.HapticFeedback.notificationOccurred('success');
            updateUI();
        }

        function removeFromCart(cartId) {
            cart = cart.filter(x => x.cartId !== cartId);
            updateUI();
        }

        function updateUI() {
            const cartUI = document.getElementById('cart-ui');
            const cartList = document.getElementById('cart-list');
            const totalDisplay = document.getElementById('total-price');

            if (cart.length > 0) {
                cartUI.classList.add('active');
                cartList.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-info">${item.b} - ${item.n}</div>
                        <div>${item.p.toLocaleString()} €</div>
                        <div class="remove-btn" onclick="removeFromCart(${item.cartId})">✕</div>
                    </div>
                `).join('');
                
                const total = cart.reduce((s, x) => s + x.p, 0);
                totalDisplay.innerText = `TOTAL : ${total.toLocaleString()} €`;
                
                tg.MainButton.setText(`VALIDER L'ACQUISITION (${total.toLocaleString()} €)`);
                tg.MainButton.show();
            } else {
                cartUI.classList.remove('active');
                tg.MainButton.hide();
            }
        }

        function resetCart() { cart = []; updateUI(); }

        tg.onEvent('mainButtonClicked', () => {
            const total = cart.reduce((s, x) => s + x.p, 0);
            const order = {
                client: tg.initDataUnsafe?.user?.first_name || "Client Privé",
                articles: cart.map(x => `${x.b} ${x.n} (${x.p}€)`),
                total_final: total.toLocaleString() + " €"
            };
            tg.sendData(JSON.stringify(order));
        });

        if (tg.initDataUnsafe?.user) {
            document.getElementById('user-greeting').innerText = `BIENVENUE, ${tg.initDataUnsafe.user.first_name.toUpperCase()}`;
        }
        
        render(); // Affichage forcé au démarrage
    </script>
</body>
</html>
