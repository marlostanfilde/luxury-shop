<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Boutique Officielle</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #c5a059; --bg: #ffffff; --red: #ff4444; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; padding: 15px; background: var(--bg);
            padding-bottom: 120px; 
        }
        
        h2 { text-align: center; font-weight: 300; margin-bottom: 25px; }

        #grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .card { 
            border: 1px solid #f0f0f0; border-radius: 15px; 
            padding: 12px; text-align: center; background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .card img { width: 100%; height: 130px; object-fit: cover; border-radius: 10px; }
        .price { font-weight: bold; color: var(--primary); display: block; margin: 10px 0; }
        
        .btn-action { 
            background: var(--primary); color: white; border: none; 
            border-radius: 8px; width: 35px; height: 35px; font-size: 20px; 
        }

        /* BOUTON SAV IMMOBILE */
        .sav-container {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%); z-index: 999;
            width: 100%; display: flex; justify-content: center;
            pointer-events: none;
        }
        .btn-sav-link {
            pointer-events: auto; background: #1a1a1a; color: white;
            padding: 12px 35px; border-radius: 50px; text-decoration: none;
            font-size: 14px; font-weight: 600; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 2px solid white;
        }

        /* PANIER */
        #cart-modal { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: white; z-index: 10000; padding: 25px; 
            display: none; flex-direction: column; 
        }
        #cart-modal.open { display: flex; }
        
        .cart-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; border-bottom: 1px solid #eee; 
        }
        
        /* BOUTON "RETIRER 1" DANS LE PANIER */
        .btn-minus-cart {
            background: #fff0f0;
            color: var(--red);
            border: 1px solid #ffcccc;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }

        .total-section { margin-top: auto; padding: 20px 0; font-weight: bold; font-size: 1.4em; border-top: 2px solid #eee; }
    </style>
</head>
<body>

    <h2>Notre Collection</h2>
    <div id="grid"></div>

    <div class="sav-container">
        <a href="https://t.me/toulouse315" class="btn-sav-link">💬 CONTACT SAV</a>
    </div>

    <div id="cart-modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <h3 style="margin:0">Votre Panier</h3>
            <span onclick="closeCart()" style="font-size:30px; color:#ccc; cursor:pointer;">✕</span>
        </div>
        <div id="cart-content" style="overflow-y: auto; flex-grow: 1;"></div>
        <div class="total-section">
            Total : <span id="total-price">0</span> €
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.setParams({ color: '#c5a059', text_color: '#ffffff' });

        const products = [
            { id: 1, name: "Veste Signature", price: 280, img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=500" },
            { id: 2, name: "Chemise Lin", price: 120, img: "https://images.unsplash.com/photo-1598033129183-c4f50c717658?w=500" },
            { id: 3, name: "Sac Cuir", price: 450, img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=500" },
            { id: 4, name: "Lunettes", price: 320, img: "https://images.unsplash.com/photo-1511499767390-90342f54b207?w=500" }
        ];

        let cart = {};

        function initialRender() {
            const grid = document.getElementById('grid');
            grid.innerHTML = products.map(p => `
                <div class="card">
                    <img src="${p.img}">
                    <h4>${p.name}</h4>
                    <span class="price">${p.price} €</span>
                    <div id="controls-${p.id}">
                        <button class="btn-action" onclick="updateCart(${p.id}, 1)">+</button>
                    </div>
                </div>
            `).join('');
        }

        // Cette fonction gère TOUT : ajout, retrait de 1, et suppression si 0
        function updateCart(id, delta) {
            cart[id] = (cart[id] || 0) + delta;
            
            // Si on arrive à 0, on supprime carrément l'entrée
            if (cart[id] <= 0) {
                delete cart[id];
            }
            
            // On met à jour la grille de produits (les boutons + / -)
            const controlDiv = document.getElementById(`controls-${id}`);
            if (controlDiv) {
                const count = cart[id] || 0;
                if (count > 0) {
                    controlDiv.innerHTML = `
                        <button class="btn-action" style="background:#f0f0f0;color:#000" onclick="updateCart(${id}, -1)">-</button>
                        <span style="margin:0 10px; font-weight:bold;">${count}</span>
                        <button class="btn-action" onclick="updateCart(${id}, 1)">+</button>
                    `;
                } else {
                    controlDiv.innerHTML = `<button class="btn-action" onclick="updateCart(${id}, 1)">+</button>`;
                }
            }

            updateInterface();
            
            // Si le panier est ouvert, on le rafraîchit en temps réel
            if (document.getElementById('cart-modal').classList.contains('open')) {
                updateCartModal();
            }
        }

        function updateInterface() {
            const count = Object.values(cart).reduce((a, b) => a + b, 0);
            const isCartOpen = document.getElementById('cart-modal').classList.contains('open');
            if (count > 0) {
                tg.MainButton.setText(isCartOpen ? "VALIDER LA COMMANDE" : `VOIR LE PANIER (${count})`);
                tg.MainButton.show();
            } else {
                tg.MainButton.hide();
                if (isCartOpen) closeCart();
            }
        }

        function updateCartModal() {
            const content = document.getElementById('cart-content');
            let total = 0;
            let html = "";
            
            products.forEach(p => {
                if (cart[p.id]) {
                    const quantity = cart[p.id];
                    const subtotal = p.price * quantity;
                    total += subtotal;
                    
                    html += `
                        <div class="cart-item">
                            <div style="flex-grow:1">
                                <strong>${p.name}</strong><br>
                                <span style="color:#888; font-size:13px;">${p.price}€ x ${quantity}</span>
                            </div>
                            <div style="font-weight:bold; margin-right: 10px;">${subtotal}€</div>
                            <button class="btn-minus-cart" onclick="updateCart(${p.id}, -1)">Enlever 1</button>
                        </div>`;
                }
            });
            
            content.innerHTML = html || "<p style='text-align:center; color:#999; margin-top:50px;'>Votre panier est vide</p>";
            document.getElementById('total-price').innerText = total;
        }

        function openCart() {
            updateCartModal();
            document.getElementById('cart-modal').classList.add('open');
            tg.BackButton.show();
            updateInterface();
        }

        function closeCart() {
            document.getElementById('cart-modal').classList.remove('open');
            tg.BackButton.hide();
            updateInterface();
        }

        tg.onEvent('mainButtonClicked', function() {
            if (!document.getElementById('cart-modal').classList.contains('open')) {
                openCart();
            } else {
                tg.sendData(JSON.stringify({commande: cart}));
            }
        });

        tg.onEvent('backButtonClicked', closeCart);
        window.onload = initialRender;
    </script>
</body>
</html>
