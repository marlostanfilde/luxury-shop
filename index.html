<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAISON LUXE</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
 --gold:#C5A059;
 --black:#050505;
 --grey:#1a1a1a;
}

body{
 margin:0;
 font-family:Montserrat;
 background:var(--black);
 color:white;
 padding-bottom:120px;
}

/* HEADER */
.header{
 text-align:center;
 padding:30px 20px;
 border-bottom:1px solid rgba(197,160,89,0.2);
}
.logo{
 font-family:Cinzel;
 letter-spacing:8px;
 color:var(--gold);
}

/* GRID */
.grid{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:12px;
 padding:15px;
}

.card{
 background:var(--grey);
 padding:12px;
 border-radius:8px;
 text-align:center;
}

.card img{
 width:100%;
 border-radius:6px;
}

.add-btn{
 margin-top:8px;
 padding:8px;
 width:100%;
 border:1px solid var(--gold);
 background:transparent;
 color:var(--gold);
 border-radius:4px;
}

/* PANIER BUTTON */
.cart-floating{
 position:fixed;
 bottom:20px;
 right:20px;
 background:var(--gold);
 color:black;
 padding:12px 18px;
 border-radius:30px;
 font-weight:600;
}

/* OVERLAY PANIER */
.overlay{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:#000;
 z-index:100;
 display:none;
 flex-direction:column;
}

.overlay-header{
 padding:20px;
 border-bottom:1px solid #333;
 font-weight:600;
}

.overlay-content{
 flex:1;
 overflow:auto;
 padding:15px;
}

.cart-item{
 background:#111;
 padding:10px;
 margin-bottom:10px;
 border-radius:6px;
 display:flex;
 justify-content:space-between;
}

.remove{
 color:red;
 cursor:pointer;
 font-size:12px;
}

/* FOOTER INFO */
.footer{
 padding:20px;
 border-top:1px solid #222;
 font-size:12px;
 color:#aaa;
}

.support-btn{
 margin-top:10px;
 padding:10px;
 width:100%;
 background:var(--gold);
 border:none;
 border-radius:4px;
 font-weight:600;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">MAISON LUXE</div>
<div id="welcome" style="font-size:12px;color:#777;"></div>
</div>

<div class="grid" id="grid"></div>

<div class="cart-floating" onclick="openCart()" id="cartBtn">
PANIER (0)
</div>

<!-- OVERLAY PANIER -->
<div class="overlay" id="cartOverlay">
<div class="overlay-header">
VOTRE PANIER
<span style="float:right;cursor:pointer" onclick="closeCart()">✕</span>
</div>

<div class="overlay-content" id="cartContent"></div>

<div class="footer">
🚚 Livraison estimée : 3 à 7 jours ouvrés  
🔐 Paiement sécurisé  
📦 Assurance incluse  

<button class="support-btn" onclick="contactSupport()">CONTACTER LE SAV</button>
</div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

/* PRODUITS */
const PRODUCTS=[
{ id:1, name:"Rolex Submariner", price:14500, img:"https://images.unsplash.com/photo-1547996160-81dfa63595dd?w=400" },
{ id:2, name:"Birkin 30", price:22000, img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=400" },
{ id:3, name:"Bracelet Love", price:7800, img:"https://images.unsplash.com/photo-1611591437281-460bfbe1220a?w=400" }
];

let cart=JSON.parse(localStorage.getItem("cart"))||[];

/* RENDER PRODUITS */
function render(){
 const grid=document.getElementById("grid");
 grid.innerHTML="";
 PRODUCTS.forEach(p=>{
  grid.innerHTML+=`
   <div class="card">
    <img src="${p.img}">
    <div>${p.name}</div>
    <div>${p.price.toLocaleString("fr-FR")} €</div>
    <button class="add-btn" onclick="add(${p.id})">AJOUTER</button>
   </div>
  `;
 });
}
render();

/* PANIER */
function add(id){
 const product=PRODUCTS.find(p=>p.id===id);
 cart.push(product);
 save();
 updateCartButton();
 tg.HapticFeedback.notificationOccurred("success");
}

function remove(index){
 cart.splice(index,1);
 save();
 renderCart();
 updateCartButton();
}

function save(){
 localStorage.setItem("cart",JSON.stringify(cart));
}

function updateCartButton(){
 document.getElementById("cartBtn").innerText=
 "PANIER ("+cart.length+")";
}

function openCart(){
 document.getElementById("cartOverlay").style.display="flex";
 renderCart();
}

function closeCart(){
 document.getElementById("cartOverlay").style.display="none";
}

function renderCart(){
 const container=document.getElementById("cartContent");
 container.innerHTML="";
 if(cart.length===0){
  container.innerHTML="<p>Votre panier est vide.</p>";
  return;
 }

 let total=0;
 cart.forEach((item,i)=>{
  total+=item.price;
  container.innerHTML+=`
   <div class="cart-item">
    <div>${item.name}</div>
    <div>
      ${item.price.toLocaleString("fr-FR")} €
      <div class="remove" onclick="remove(${i})">Retirer</div>
    </div>
   </div>
  `;
 });

 container.innerHTML+=`
  <hr>
  <h3>Total : ${total.toLocaleString("fr-FR")} €</h3>
  <button class="support-btn" onclick="checkout(${total})">
   FINALISER LA COMMANDE
  </button>
 `;
}

/* CHECKOUT */
function checkout(total){
 tg.showConfirm("Confirmer la commande ?", ok=>{
  if(ok){
   tg.sendData(JSON.stringify({
    user:tg.initDataUnsafe?.user?.id,
    items:cart,
    total:total
   }));
  }
 });
}

/* SUPPORT */
function contactSupport(){
 tg.openTelegramLink("https://t.me/TON_BOT_OU_SUPPORT");
}

/* INIT */
updateCartButton();
if(tg.initDataUnsafe?.user){
 document.getElementById("welcome").innerText=
 "Bienvenue "+tg.initDataUnsafe.user.first_name;
}
</script>

</body>
</html>
