<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MAISON LUXE | EXCELLENCE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A059; --black: #050505; --dark: #121212; --border: rgba(197, 160, 89, 0.2); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Montserrat', sans-serif; background: var(--black); color: white; margin: 0; padding-bottom: 120px; }

        /* HEADER */
        .header { padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Cinzel', serif; font-size: 26px; letter-spacing: 10px; color: var(--gold); margin: 0; }
        
        /* NAVIGATION ETENDUE */
        .nav-tabs { display: flex; overflow-x: auto; padding: 15px; gap: 20px; position: sticky; top: 0; background: rgba(5,5,5,0.95); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid var(--border); scrollbar-width: none; }
        .nav-tabs::-webkit-scrollbar { display: none; }
        .tab-btn { background: none; border: none; color: #555; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; white-space: nowrap; cursor: pointer; }
        .tab-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        /* GRID */
        .container { padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: var(--dark); border: 1px solid var(--border); padding: 10px; text-align: center; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .p-brand { font-size: 8px; color: var(--gold); letter-spacing: 1px; margin-top: 10px; text-transform: uppercase; }
        .p-name { font-size: 10px; font-weight: 300; margin: 5px 0; height: 25px; overflow: hidden; }
        .p-price { font-size: 11px; font-weight: 700; }

        /* MODALE DETAIL (ZOOM) */
        .modal { position: fixed; inset: 0; background: var(--black); z-index: 2000; display: none; flex-direction: column; overflow-y: auto; padding: 20px; }
        .modal.open { display: flex; }
        .modal img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border: 1px solid var(--border); }
        .btn-add { background: var(--gold); color: black; border: none; padding: 20px; width: 100%; font-weight: 700; letter-spacing: 2px; margin-top: 30px; }

        /* PANIER VISUEL */
        .cart-box { margin-top: 30px; padding: 15px; border: 1px dashed var(--gold); background: #0a0a0a; display: none; }
        .cart-box.active { display: block; }
        .cart-item { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid #222; }
        .del-btn { color: #ff4444; font-weight: bold; margin-left: 10px; }

        /* FOOTER */
        .footer-nav { position: fixed; bottom: 0; width: 100%; background: #080808; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 15px; z-index: 1000; }
        .nav-link { color: #555; text-decoration: none; font-size: 8px; text-align: center; cursor: pointer; }
        .nav-link i { display: block; font-size: 18px; color: var(--gold); margin-bottom: 5px; font-style: normal; }
    </style>
</head>
<body>

    <header class="header">
        <h1 class="logo">MAISON LUXE</h1>
        <div id="user-tag" style="font-size: 9px; color: #444; margin-top: 10px; letter-spacing: 3px;">CHARGEMENT...</div>
    </header>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="filter('all', this)">Collection</button>
        <button class="tab-btn" onclick="filter('Habille', this)">Prêt-à-Porter</button>
        <button class="tab-btn" onclick="filter('Chaussures', this)">Souliers</button>
        <button class="tab-btn" onclick="filter('Horlogerie', this)">Horlogerie</button>
        <button class="tab-btn" onclick="filter('Maroquinerie', this)">Maroquinerie</button>
    </div>

    <div class="container">
        <div id="product-grid" class="grid"></div>

        <div id="cart-recap" class="cart-box">
            <h3 style="font-family:'Cinzel'; font-size:11px; color:var(--gold); margin-top:0;">VOTRE PANIER</h3>
            <div id="cart-list"></div>
            <div id="cart-total" style="text-align:right; font-weight:700; margin-top:10px; color:var(--gold);"></div>
        </div>
    </div>

    <div class="footer-nav">
        <div class="nav-link" onclick="tg.openTelegramLink('https://t.me/ton_pseudo')"><i>👤</i>CONCIERGE</div>
        <div class="nav-link" onclick="tg.showAlert('Livraison sécurisée sous 24-48h par transporteur privé.')"><i>📦</i>LOGISTIQUE</div>
        <div class="nav-link" onclick="clearCart()"><i>🗑️</i>VIDER</div>
    </div>

    <div id="modal" class="modal">
        <img id="modal-img" src="">
        <div style="text-align:center; padding:20px;">
            <div id="modal-brand" class="p-brand"></div>
            <h2 id="modal-name" style="font-family:'Cinzel'; color:var(--gold); margin:10px 0;"></h2>
            <div id="modal-price" style="font-size:22px; font-weight:700; margin-bottom:20px;"></div>
            <button id="add-to-cart-btn" class="btn-add">AJOUTER À LA SÉLECTION</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let cart = [];
        const products = [
            { id: 1, cat: "Habille", brand: "Hermès", name: "Blazer Laine Marine", price: 1250, img: "https://images.unsplash.com/photo-1594932224010-74f43a18652b?w=600" },
            { id: 2, cat: "Chaussures", brand: "Loro Piana", name: "Summer Walk Suède", price: 850, img: "https://images.unsplash.com/photo-1608231387042-66d1773070a5?w=600" },
            { id: 3, cat: "Horlogerie", brand: "Rolex", name: "Daytona Panda", price: 38500, img: "https://images.unsplash.com/photo-1523170335258-f5ed11844a49?w=600" },
            { id: 4, cat: "Maroquinerie", brand: "Hermès", name: "Birkin 30 Togo", price: 21000, img: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=600" },
            { id: 5, cat: "Chaussures", brand: "Berluti", name: "Richelieu Alessandro", price: 1800, img: "https://images.unsplash.com/photo-1549298916-b41d501d3772?w=600" },
            { id: 6, cat: "Habille", brand: "Dior", name: "Manteau Cachemire", price: 4500, img: "https://images.unsplash.com/photo-1539533018447-63fcce2678e3?w=600" }
        ];

        function render(cat = 'all') {
            const grid = document.getElementById('product-grid');
            const items = cat === 'all' ? products : products.filter(p => p.cat === cat);
            grid.innerHTML = items.map(p => `
                <div class="card" onclick="openProduct(${p.id})">
                    <img src="${p.img}">
                    <div class="p-brand">${p.brand}</div>
                    <div class="p-name">${p.name}</div>
                    <div class="p-price">${p.price.toLocaleString()} €</div>
                </div>
            `).join('');
        }

        function filter(cat, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render(cat);
        }

        function openProduct(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('modal-img').src = p.img;
            document.getElementById('modal-brand').innerText = p.brand;
            document.getElementById('modal-name').innerText = p.name;
            document.getElementById('modal-price').innerText = p.price.toLocaleString() + " €";
            
            document.getElementById('add-to-cart-btn').onclick = () => {
                cart.push({...p, uid: Date.now()});
                tg.HapticFeedback.notificationOccurred('success');
                closeM();
                updateUI();
            };
            document.getElementById('modal').classList.add('open');
            tg.BackButton.show();
        }

        function closeM() { document.getElementById('modal').classList.remove('open'); tg.BackButton.hide(); }
        tg.onEvent('backButtonClicked', closeM);

        function remove(uid) {
            cart = cart.filter(i => i.uid !== uid);
            updateUI();
        }

        function updateUI() {
            const recap = document.getElementById('cart-recap');
            const list = document.getElementById('cart-list');
            const totalTxt = document.getElementById('cart-total');
            
            if(cart.length > 0) {
                recap.classList.add('active');
                list.innerHTML = cart.map(i => `
                    <div class="cart-item">
                        <span>${i.brand} ${i.name}</span>
                        <span>${i.price.toLocaleString()}€ <span class="del-btn" onclick="remove(${i.uid})">✕</span></span>
                    </div>
                `).join('');
                const total = cart.reduce((s, i) => s + i.price, 0);
                totalTxt.innerText = "TOTAL : " + total.toLocaleString() + " €";
                
                tg.MainButton.setText(`COMMANDER (${total.toLocaleString()} €)`);
                tg.MainButton.show();
            } else {
                recap.classList.remove('active');
                tg.MainButton.
