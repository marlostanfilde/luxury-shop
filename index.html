<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MAISON LUXE | SYSTÈME AVANCÉ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A059; --black: #050505; --dark-grey: #121212; --accent: #1a1a1a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Montserrat', sans-serif; background: var(--black); color: white; margin: 0; padding-bottom: env(safe-area-inset-bottom); overflow-x: hidden; }

        .app-loader { position: fixed; inset: 0; background: var(--black); z-index: 9999; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        .header { padding: 60px 20px 30px; border-bottom: 1px solid rgba(197, 160, 89, 0.1); text-align: center; background: linear-gradient(180deg, #111 0%, var(--black) 100%); }
        .logo { font-family: 'Cinzel', serif; font-size: 24px; letter-spacing: 12px; color: var(--gold); text-transform: uppercase; }

        .nav-scroller { position: sticky; top: 0; z-index: 100; background: rgba(5,5,5,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-tabs { display: flex; overflow-x: auto; padding: 15px 20px; gap: 25px; scrollbar-width: none; }
        .nav-tabs::-webkit-scrollbar { display: none; }
        .tab-item { color: #666; font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; border: none; background: none; transition: 0.3s; padding-bottom: 5px; cursor: pointer; white-space: nowrap; }
        .tab-item.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: rgba(255,255,255,0.05); border-top: 1px solid rgba(255,255,255,0.05); }
        .product-item { background: var(--black); padding: 25px 15px; text-align: center; transition: 0.4s; }
        .product-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; margin-bottom: 20px; }

        /* ZONE PANIER VISIBLE */
        .cart-box { margin: 20px; padding: 15px; border: 1px dashed var(--gold); background: var(--dark-grey); display: none; }
        .cart-box.active { display: block; }
        .cart-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 8px; border-bottom: 1px solid #222; padding-bottom: 5px; }

        .footer-nav { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around; padding: 15px 10px calc(15px + env(safe-area-inset-bottom)); }
        .nav-link { color: #555; text-decoration: none; font-size: 9px; letter-spacing: 1px; text-align: center; cursor: pointer; }
        .nav-link i { display: block; font-size: 18px; margin-bottom: 5px; color: var(--gold); font-style: normal; }
    </style>
</head>
<body>

    <div id="loader" class="app-loader"><div class="logo" style="font-size: 14px;">Maison Luxe</div></div>

    <header class="header">
        <div class="logo">Maison Luxe</div>
        <p id="welcome-txt" style="font-size: 9px; color: #444; margin-top: 15px; letter-spacing: 3px;">EST. 2026</p>
    </header>

    <div class="nav-scroller">
        <div class="nav-tabs">
            <button class="tab-item active" onclick="switchCategory('all', this)">Tous</button>
            <button class="tab-item" onclick="switchCategory('habille', this)">Habille Luxe</button>
            <button class="tab-item" onclick="switchCategory('chaussures', this)">Chaussures</button>
            <button class="tab-item" onclick="switchCategory('horlogerie', this)">Horlogerie</button>
            <button class="tab-item" onclick="switchCategory('maroquinerie', this)">Maroquinerie</button>
        </div>
    </div>

    <div class="container">
        <div id="main-grid" class="grid-container"></div>

        <div id="cart-box" class="cart-box">
            <h3 style="font-family:'Cinzel'; font-size:12px; color:var(--gold); margin-top:0;">VOTRE SÉLECTION</h3>
            <div id="cart-list"></div>
            <div id="cart-total" style="text-align:right; font-weight:700; margin-top:10px; color:var(--gold); border-top:1px solid #333; padding-top:10px;"></div>
        </div>
    </div>

    <nav class="footer-nav">
        <a href="https://t.me/ton_pseudo" class="nav-link"><i>👤</i>CONCIERGE</a>
        <div class="nav-link" onclick="tg.showAlert('DÉLAIS :\n🇫🇷 France: 24h-48h\n🇪🇺 Europe: 2-3 jours\n🌎 Monde: 5-7 jours')"><i>📦</i>LIVRAISON</div>
        <div class="nav-link" onclick="clearCart()"><i>🗑️</i>VIDER</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const State = {
            products: [
                { id: 1, cat: 'habille', brand: 'Hermès', name: 'Manteau Cachemire', price: 4200, img: 'https://images.unsplash.com/photo-1539533018447-63fcce2678e3?w=600' },
                { id: 2, cat: 'chaussures', brand: 'Berluti', name: 'Richelieu Alessandro', price: 1850, img: 'https://images.unsplash.com/photo-1549298916-b41d501d3772?w=600' },
                { id: 3, cat: 'horlogerie', brand: 'Rolex', name: 'Daytona Panda', price: 38500, img: 'https://images.unsplash.com/photo-1523170335258-f5ed11844a49?w=600' },
                { id: 4, cat: 'maroquinerie', brand: 'Hermès', name: 'Birkin 30 Togo', price: 21500, img: 'https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=600' }
            ],
            cart: [],
            currentFilter: 'all'
        };

        window.onload = () => {
            setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 800);
            if (tg.initDataUnsafe?.user) {
                document.getElementById('welcome-txt').innerText = `BIENVENUE, ${tg.initDataUnsafe.user.first_name.toUpperCase()}`;
            }
            renderProducts();
        };

        function renderProducts() {
            const container = document.getElementById('main-grid');
            const items = State.currentFilter === 'all' ? State.products : State.products.filter(p => p.cat === State.currentFilter);
            container.innerHTML = items.map(p => `
                <div class="product-item" onclick="addToCart(${p.id})">
                    <img src="${p.img}" class="product-img">
                    <div style="font-size:8px; color:var(--gold); letter-spacing:2px;">${p.brand}</div>
                    <div style="font-size:10px; font-weight:200;">${p.name}</div>
                    <div style="font-size:12px; font-weight:600; margin-top:5px;">${p.price.toLocaleString()} €</div>
                </div>
            `).join('');
        }

        function switchCategory(cat, btn) {
            document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            State.currentFilter = cat;
            renderProducts();
        }

        function addToCart(id) {
            const p = State.products.find(x => x.id === id);
            State.cart.push(p);
            tg.HapticFeedback.notificationOccurred('success');
            updateUI();
        }

        function updateUI() {
            const cartBox = document.getElementById('cart-box');
            const cartList = document.getElementById('cart-list');
            const cartTotal = document.getElementById('cart-total');
            
            if (State.cart.length > 0) {
                cartBox.classList.add('active');
                cartList.innerHTML = State.cart.map(i => `
                    <div class="cart-row">
                        <span>${i.brand} ${i.name}</span>
                        <span>${i.price.toLocaleString()} €</span>
                    </div>
                `).join('');
                
                const total = State.cart.reduce((s, i) => s + i.price, 0);
                cartTotal.innerText = `TOTAL : ${total.toLocaleString()} €`;
                
                tg.MainButton.setText(`VALIDER L'ACQUISITION (${total.toLocaleString()} €)`);
                tg.MainButton.show();
            } else {
                cartBox.classList.remove('active');
                tg.MainButton.hide();
            }
        }

        function clearCart() { State.cart = []; updateUI(); }

        tg.onEvent('mainButtonClicked', () => {
            const total = State.cart.reduce((s, i) => s + i.price, 0);
            const data = {
                client: tg.initDataUnsafe?.user?.first_name || "Client",
                commande: State.cart.map(i => `${i.brand} ${i.name}`),
                total: total.toLocaleString() + " €"
            };
            tg.sendData(JSON.stringify(data));
        });
    </script>
</body>
</html>
